name: 同步千帆星座 TLE 数据

on:
  schedule:
    # 每6小时同步一次（Space-Track 每天更新多次）
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 登录 Space-Track.org 并获取 QIANFAN TLE
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: |
          # 查询地址
          QUERY_URL="https://www.space-track.org/basicspacedata/query/class/tle/OBJECT_NAME/QIANFAN~~/orderby/EPOCH%20desc/limit/300/format/tle"

          # 1. 登录（携带 query 参数，一次性完成登录+授权）
          curl -s -c cookies.txt \
            "https://www.space-track.org/ajaxauth/login" \
            -d "identity=${SPACETRACK_USER}&password=${SPACETRACK_PASS}&query=${QUERY_URL}"

          echo "--- cookies.txt ---"
          cat cookies.txt

          # 2. 检查 cookie
          if [ ! -f cookies.txt ] || ! grep -q "JSESSIONID" cookies.txt; then
            echo "❌ Space-Track 登录失败 - 未获取到 JSESSIONID"
            exit 1
          fi
          echo "✅ Space-Track 登录成功"

          # 3. 用同一 session 直接请求（此时已有授权）
          curl -s -b cookies.txt -L "${QUERY_URL}" \
            -o app/src/main/assets/qianfan_tle_backup.txt

          # 4. 调试：查看返回内容
          echo "📝 返回内容前 10 行:"
          head -10 app/src/main/assets/qianfan_tle_backup.txt

          # 4. 验证数据有效性
          if grep -q "^QIANFAN" app/src/main/assets/qianfan_tle_backup.txt; then
            echo "✅ TLE 数据获取成功，共 $(wc -l < app/src/main/assets/qianfan_tle_backup.txt) 行"
          else
            echo "❌ TLE 数据格式异常 - 未找到 QIANFAN"
            cat app/src/main/assets/qianfan_tle_backup.txt
            exit 1
          fi

      - name: 提交更新
        run: |
          git config user.name "TLE Sync Bot"
          git config user.email "bot@github.com"
          git add app/src/main/assets/qianfan_tle_backup.txt
          git diff --quiet || {
            git commit -m "🛰️ 自动同步 QIANFAN 星座 TLE 数据 $(date +%Y-%m-%d)"
            git push
            echo "✅ 已提交并推送更新"
          }