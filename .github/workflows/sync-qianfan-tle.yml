name: 同步千帆星座 TLE 数据

on:
  schedule:
    # 每6小时同步一次（Space-Track 每天更新多次）
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 登录 Space-Track.org 并获取 QIANFAN TLE
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: |
          # 关闭 -e，方便调试
          set +e

          echo "=== 1. 尝试直接登录（不传 query）==="
          HTTP_CODE=$(curl -s -w "%{http_code}" -c cookies1.txt \
            "https://www.space-track.org/ajaxauth/login" \
            -d "identity=${SPACETRACK_USER}&password=${SPACETRACK_PASS}" \
            -o login1_response.txt)
          echo "HTTP状态码: ${HTTP_CODE}"
          echo "--- 登录返回内容 ---"
          head -5 login1_response.txt 2>/dev/null
          echo ""
          echo "--- cookies1.txt ---"
          cat cookies1.txt 2>/dev/null || echo "(空)"

          echo ""
          echo "=== 2. 尝试带 query 参数登录 ==="
          QUERY_URL="https://www.space-track.org/basicspacedata/query/class/tle/OBJECT_NAME/QIANFAN~~/orderby/EPOCH%20desc/limit/300/format/tle"
          HTTP_CODE2=$(curl -s -w "%{http_code}" -c cookies2.txt \
            "https://www.space-track.org/ajaxauth/login" \
            -d "identity=${SPACETRACK_USER}&password=${SPACETRACK_PASS}&query=${QUERY_URL}" \
            -o login2_response.txt)
          echo "HTTP状态码: ${HTTP_CODE2}"
          echo "--- 登录返回内容 ---"
          head -5 login2_response.txt 2>/dev/null
          echo ""
          echo "--- cookies2.txt ---"
          cat cookies2.txt 2>/dev/null || echo "(空)"

          # 3. 只要有一个 cookie 成功就用它
          if [ -f cookies2.txt ] && grep -q "JSESSIONID" cookies2.txt; then
            echo "✅ 方式2登录成功"
            COOKIE_FILE="cookies2.txt"
          elif [ -f cookies1.txt ] && grep -q "JSESSIONID" cookies1.txt; then
            echo "✅ 方式1登录成功"
            COOKIE_FILE="cookies1.txt"
          else
            echo "❌ 两种方式都未获取到 JSESSIONID，登录失败"
            exit 1
          fi

          # 4. 查询 TLE
          curl -b "${COOKIE_FILE}" -L "${QUERY_URL}" -o qianfan_raw.txt 2>&1
          echo ""
          echo "=== 返回内容前 30 行 ==="
          head -30 qianfan_raw.txt 2>/dev/null
          echo ""
          echo "=== 末尾 10 行 ==="
          tail -10 qianfan_raw.txt 2>/dev/null
          echo ""
          echo "=== 总行数 ==="
          wc -l < qianfan_raw.txt 2>/dev/null || echo "文件不存在"

          # 5. 写入目标文件
          cp qianfan_raw.txt app/src/main/assets/qianfan_tle_backup.txt

          # 6. 验证
          if grep -q "^QIANFAN" qianfan_raw.txt; then
            echo "✅ TLE 数据获取成功！"
          else
            echo "❌ 未找到 QIANFAN 卫星数据"
            exit 1
          fi

      - name: 提交更新
        run: |
          git config user.name "TLE Sync Bot"
          git config user.email "bot@github.com"
          git add app/src/main/assets/qianfan_tle_backup.txt
          git diff --quiet || {
            git commit -m "🛰️ 自动同步 QIANFAN 星座 TLE 数据 $(date +%Y-%m-%d)"
            git push
            echo "✅ 已提交并推送更新"
          }