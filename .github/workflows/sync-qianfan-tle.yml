name: 同步千帆星座 TLE 数据

on:
  schedule:
    # 每6小时同步一次（Space-Track 每天更新多次）
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 登录 Space-Track.org 并获取 QIANFAN TLE
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: |
          set +e

          echo "=== 登录 Space-Track ==="
          curl -s -c cookies.txt \
            "https://www.space-track.org/ajaxauth/login" \
            -d "identity=${SPACETRACK_USER}&password=${SPACETRACK_PASS}"

          echo "--- cookies.txt ---"
          cat cookies.txt

          # 检查 cookie 是否成功（新版用 chocolatechip，旧版用 JSESSIONID）
          if grep -qE "chocolatechip|JSESSIONID" cookies.txt; then
            echo "✅ 登录成功"
          else
            echo "❌ 登录失败 - 未获取到有效的 cookie"
            exit 1
          fi

          echo ""
          echo "=== 查询 QIANFAN TLE ==="
          QUERY_URL="https://www.space-track.org/basicspacedata/query/class/tle/OBJECT_NAME/QIANFAN~~/orderby/EPOCH%20desc/limit/300/format/tle"
          curl -s -b cookies.txt -L "${QUERY_URL}" -o qianfan_raw.txt

          echo "=== 返回内容前 30 行 ==="
          head -30 qianfan_raw.txt 2>/dev/null
          echo ""
          echo "=== 末尾 10 行 ==="
          tail -10 qianfan_raw.txt 2>/dev/null
          echo ""
          echo "=== 总行数 ==="
          wc -l < qianfan_raw.txt 2>/dev/null || echo "空文件"

          # 写入目标文件
          cp qianfan_raw.txt app/src/main/assets/qianfan_tle_backup.txt

          # 验证
          if grep -q "^QIANFAN" qianfan_raw.txt; then
            echo "✅ TLE 数据获取成功！"
          else
            echo "❌ 未找到 QIANFAN 卫星数据"
            exit 1
          fi

      - name: 提交更新
        run: |
          git config user.name "TLE Sync Bot"
          git config user.email "bot@github.com"
          git add app/src/main/assets/qianfan_tle_backup.txt
          git diff --quiet || {
            git commit -m "🛰️ 自动同步 QIANFAN 星座 TLE 数据 $(date +%Y-%m-%d)"
            git push
            echo "✅ 已提交并推送更新"
          }