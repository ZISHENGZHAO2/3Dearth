name: 同步低轨卫星 TLE 数据

on:
  schedule:
    # 每6小时同步一次（Space-Track 每天更新多次）
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: pip install spacetrack

      - name: 获取低轨卫星 TLE 数据
        env:
          SPACETRACK_USER: ${{ secrets.SPACETRACK_USER }}
          SPACETRACK_PASS: ${{ secrets.SPACETRACK_PASS }}
        run: python .github/scripts/fetch-leo-tle.py

      - name: 提交更新
        run: |
          git config user.name "TLE Sync Bot"
          git config user.email "bot@github.com"
          git add app/src/main/assets/qianfan_tle_backup.txt
          git diff --quiet || {
            git commit -m "🛰️ 自动同步低轨卫星 TLE 数据 $(date +%Y-%m-%d)"
            git push
            echo "✅ 已提交并推送更新"
          }