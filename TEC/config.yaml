# ==========================================================
# 单时刻全球电离层 TEC 计算配置文件
# ==========================================================
# 本配置文件用于 demo_memory_model_tec_single_time.py
# 每次运行只计算一个指定时刻的全球 TEC。
#
# 注意：
# 1. 本程序不读取 swindex.csv。
# 2. 所有太阳/地磁参数均由用户在本 YAML 中手动填写。
# 3. kp 使用真实 Kp 值，例如 2.3 或 4.0，不要填写 Kp*10。

# ----------------------------------------------------------
# 1. 输入文件路径
# ----------------------------------------------------------
# data_dir 目录下必须包含：
#   eof_maps.csv
#   tec_mean.csv

data_dir: ./uploads

# 训练好的 MEMORY_MODEL 模型文件路径
memory_model_path: ./model/TemporalMemoryEOF_climatology/saved_models/TemporalMemoryEOF-CatBoost.pkl


# ----------------------------------------------------------
# 2. 目标计算时刻
# ----------------------------------------------------------
# year: 年份
# doy:  年积日，范围 1-366
# ut_hour: 世界时小时，范围 0-23

year: 2025
doy: 1
ut_hour: 0


# ----------------------------------------------------------
# 3. 当前目标时刻的太阳/地磁参数
# ----------------------------------------------------------
# f107:  F10.7 太阳射电流量
# f107a: F10.7 太阳射电流量的平滑/平均值
# dst:   Dst 地磁指数，单位 nT
# ap:    Ap 地磁指数
# kp:    Kp 地磁指数，填写真实 Kp 值

drivers:
  f107: 150.0
  f107a: 145.0
  dst: 0.0
  ap: 2.0
  kp: 1.3


# ----------------------------------------------------------
# 4. Dst / Ap / Kp 历史记忆项
# ----------------------------------------------------------
# 单位：小时。
# 例如 dst: 6 表示目标时刻前 6 小时的 Dst。
# 若某个滞后项缺省，脚本会自动用当前 drivers 中对应变量值替代。

memory_lags:
  dst:
    1: 0.0
    3: 0.0
    6: 0.0
    12: 0.0
    24: 0.0
  ap:
    1: 1.0
    3: 1.0
    6: 1.0
    12: 1.0
    24: 1.0
  kp:
    1: 1.0
    3: 1.0
    6: 1.0
    12: 1.0
    24: 1.0


# ----------------------------------------------------------
# 5. F10.7 / F10.7A 历史记忆项
# ----------------------------------------------------------
# 单位：小时。

solar_lags:
  f107:
    24: 148.0
    72: 146.0
    168: 142.0
    648: 138.0
  f107a:
    24: 144.0
    72: 143.0
    168: 140.0
    648: 136.0


# ----------------------------------------------------------
# 6. 绘图参数
# ----------------------------------------------------------

plot:
  vmin: 0
  vmax: 100
  cmap: jet
  dpi: 100
  no_borders: false
  # title 可留空；留空时脚本会自动生成标题。
  title: ""


# ----------------------------------------------------------
# 7. 输出文件
# ----------------------------------------------------------
# figure: 输出图像文件，可为 .png、.jpg、.svg、.pdf 等 matplotlib 支持格式。
# npz: TEC 网格数据输出文件；若不想保存网格数据，可设为 "" 或 null。

output:
  figure: ./figures/fig_memory_tec_2025001_12UT.png
  npz: ./figures/memory_tec_2025001_12UT.npz
