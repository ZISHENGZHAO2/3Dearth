<body>
<div id="app">
    <!-- 左侧 图表面板 -->
    <div id="chart-panel">
        <div id="top-nav">
            <div class="nav-page-btns">
                <a class="page-btn" href="3DNavigation_error.html">🌍 星座信息系统</a>
                <a class="page-btn" href="tec_realtime.html">📊 TEC计算</a>
                <a class="page-btn active" href="orbit_decay.html">🛰️ 轨道衰减计算</a>
            </div>

    <!-- 右侧控制面板 -->
    <div id="control-panel">
        <!-- 卫星参数 -->
        <div class="panel-section">
            <div class="section-title">🛰️ 卫星参数</div>
            <!-- 卫星数量显示与选择 -->
            <div id="satCountDisplay" style="color:#88aacc; font-size:11px; margin-bottom:6px;">卫星列表：加载中...</div>
            <div style="margin-bottom:10px;">
                <select id="satSelector" onchange="onSatSelected(this.value)" style="width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(68,136,170,0.4);color:#fff;padding:6px 8px;border-radius:4px;font-size:12px;outline:none;">
                    <option value="">— 选择卫星查看参数 —</option>
                </select>
                <style>#satSelector option { background: #0a0a2a; color: #ccddee; }</style>
                <div style="color:#667788;font-size:9px;margin-top:4px;">选中后自动填充高度和倾角，可手动修改</div>
            </div>
            
            <div class="param-grid">
                <div class="param-item" id="piHeight">
                    <label>初始轨道高度</label>
                    <input id="pHeight" type="number" value="300" min="100" max="2000" step="10">
                    <span class="unit">km</span>
                </div>
                <div class="param-item" id="piInclination">
                    <label>轨道倾角</label>
                    <input id="pInclination" type="number" value="45" min="0" max="180" step="1">
                    <span class="unit">°</span>
                </div>
                <div class="param-item">
                    <label>卫星质量</label>
                    <input id="pMass" type="number" value="240" min="1" max="10000" step="1">
                    <span class="unit">kg</span>
                </div>
                <div class="param-item">
                    <label>阻力系数 Cd</label>
                    <input id="pCd" type="number" value="2.2" min="1" max="3" step="0.01">
                    <span class="unit"></span>
                </div>
                <div class="param-item">
                    <label>迎风面积</label>
                    <input id="pAdrag" type="number" value="1.5" min="0.01" max="50" step="0.01">
                    <span class="unit">m²</span>
                </div>
                <div class="param-item">
                    <label>光压面积</label>
                    <input id="pAsrp" type="number" value="7" min="0.01" max="50" step="0.01">
                    <span class="unit">m²</span>
                </div>
                <div class="param-item">
                    <label>太阳风动压</label>
                    <input id="pPsrp" type="number" value="4.56" min="1" max="10" step="0.01">
                    <span class="unit">×10⁻⁶ N/m²</span>
                </div>
            </div>
            <div style="margin-top:10px;">
                <button class="btn-primary" id="btnCalc">🛰️ 轨道计算</button>
            </div>
            <div id="resultDisplay" style="margin-top:10px; font-size:11px; color:#88aacc; line-height:1.8;">
                <div><span style="color:#aaccee;">轨道高度：</span><span id="rdInit">--</span></div>
                <div><span style="color:#aaccee;">5年后高度：</span><span id="rd5y">--</span><span style="color:#667788;">（下降 <span id="rdDrop">--</span>）</span></div>
                <div><span style="color:#aaccee;">收起太阳翼高度：</span><span id="rdFolded">--</span><span style="color:#667788;">（下降 <span id="rdDropFolded">--</span>）</span></div>
            </div>
        </div>

<script src="satellite.min.js"></script>
<script>
    // ====================== 物理常量 ======================
    const R_EARTH = 6371000;
    const GRAVITY = 6.67430e-11;
    const M_EARTH = 5.972e24;
    const OMEGA_EARTH = 7.2921159e-5;
    const MU = 3.986004418e14; // 地球引力常数 m³/s²
    const CHART_Y_MAX = 2200;  // 图表 Y 轴最大值 (km)

    function atmosphericDensity(h_km, F10_7 = 150, Ap = 10) {
        let H, rho0;
        if (h_km < 300) {
            H = 35 + 0.05 * (h_km - 100);
            rho0 = 1.0e-10;
            return rho0 * Math.exp(-(h_km - 100) / H) * (1 + 0.3*(F10_7-70)/180) * (1 + 0.2*Math.max(0,Ap-4)/30);
        } else if (h_km < 500) {
            H = 45 + 0.05 * (h_km - 300);
            rho0 = 2.0e-12;
        } else {
            H = 55 + 0.08 * (h_km - 500);
            rho0 = 2.0e-12 * Math.exp(-(500-300)/45);
        }
        return rho0 * Math.exp(-(h_km - 300) / H) * (1 + 0.3*(F10_7-70)/180) * (1 + 0.2*Math.max(0,Ap-4)/30);
    }

    function orbitVelocity(h_m) {
        return Math.sqrt(GRAVITY * M_EARTH / (R_EARTH + h_m));
    }

    // ====================== 从 TLE 计算轨道参数 ======================
    function computeOrbitParamsFromTLE(tle1, tle2) {
        try {
            const satrec = satellite.twoline2satrec(tle1, tle2);
            // 从 satrec 提取 inclination ( radians )
            const incDeg = satrec.inclo * 180 / Math.PI;
            // 从 mean motion (rev/day) 计算 semi-major axis
            const nRadPerSec = satrec.no / 60; // satrec.no 是 rad/min → rad/s
            const a = Math.pow(MU / (nRadPerSec * nRadPerSec), 1/3);
            const altKm = (a - R_EARTH) / 1000;
            return { inclination: incDeg, altitude: altKm, satrec };
        } catch (e) {
            return null;
        }
    }

    // ====================== 从显示列表读取卫星 ======================
    // 存储所有卫星数据
    let allSatellites = []; // [{name, tle1, tle2, altitude, inclination}, ...]
    
    // 多卫星颜色方案
    const SAT_COLORS = [
        '#00aaff', '#ff8844', '#44ff88', '#ff44aa',
        '#ddcc00', '#8844ff', '#44ddff', '#ff6644',
        '#aaff44', '#ff44dd', '#44ffcc', '#cc88ff',
        '#ffaa44', '#66ffaa', '#ff88cc', '#88ccff'
    ];

    // 当前选中的卫星 ID（用于参数覆盖），null = 未选中
    let selectedSatId = null;

    function loadDisplayListSatellites() {
        allSatellites = [];
        const countEl = document.getElementById('satCountDisplay');
        try {
            const raw = localStorage.getItem('tec_display_satellites');
            if (!raw) {
                countEl.textContent = '卫星列表：无数据';
                return;
            }
            const sats = JSON.parse(raw);
            if (!Array.isArray(sats) || sats.length === 0) {
                countEl.textContent = '卫星列表：无数据';
                return;
            }
            for (const sat of sats) {
                if (!sat.tle1 || !sat.tle2) continue;
                const params = computeOrbitParamsFromTLE(sat.tle1, sat.tle2);
                if (!params) continue;
                allSatellites.push({
                    name: sat.name || 'Unknown',
                    id: String(sat.id || ''),
                    tle1: sat.tle1,
                    tle2: sat.tle2,
                    altitude: params.altitude,
                    inclination: params.inclination,
                    constellation: sat.constellation || ''
                });
            }
            countEl.textContent = `卫星列表：${allSatellites.length} 颗卫星`;
            // 填充卫星选择下拉框
            populateSatSelector();
        } catch (e) {
            countEl.textContent = '读取失败';
            console.error('读取显示列表失败:', e);
        }
    }

    // ====================== 卫星选择下拉框 ======================
    function populateSatSelector() {
        const sel = document.getElementById('satSelector');
        if (!sel) return;
        sel.innerHTML = '<option value="">— 选择卫星查看参数 —</option>';
        for (const sat of allSatellites) {
            const opt = document.createElement('option');
            opt.value = String(sat.id || sat.name);
            opt.textContent = '🛰️ ' + sat.name + (sat.constellation ? ' (' + sat.constellation + ')' : '');
            sel.appendChild(opt);
        }
        selectedSatId = null;
    }

    // 卫星选择变更：自动填充高度和倾角，用户可手动修改覆盖
    function onSatSelected(val) {
        if (!val) {
            selectedSatId = null;
            document.getElementById('pHeight').value = 300;
            document.getElementById('pInclination').value = 45;
            return;
        }
        selectedSatId = val;
        const sat = allSatellites.find(s => String(s.id || s.name) === val);
        if (sat) {
            document.getElementById('pHeight').value = Math.round(sat.altitude);
            document.getElementById('pInclination').value = Math.round(sat.inclination);
        }
    }

    // ====================== 轨道衰减计算 ======================
    function calculateOrbitDecay(h0_km, mass, Cd, A_drag, A_srp, P_SRP, incDeg, simYears) {
        const months = simYears * 12 + 1;
        const dt_sec = 30 * 86400;
        const h_m = new Float64Array(months);
        const inc = new Float64Array(months);
        h_m[0] = h0_km * 1000;
        inc[0] = incDeg * Math.PI / 180;
        let a = R_EARTH + h_m[0];
        let e = 0.001;

        for (let idx = 1; idx < months; idx++) {
            const cur_h = h_m[idx - 1];
            const cur_i = inc[idx - 1];
            const rho = atmosphericDensity(cur_h / 1000);
            const v = orbitVelocity(cur_h);
            const v_rel = v - OMEGA_EARTH * a * Math.cos(cur_i);
            const B = Cd * A_drag / mass;
            const da_dt_drag = -2 * B * rho * v_rel * a / (1 + e);
            let da_dt_srp = cur_h / 1000 > 200 ? -(2 * (P_SRP * A_srp / mass) * a) / v : 0;
            const da_dt = da_dt_drag + da_dt_srp;
            a += da_dt * dt_sec;
            h_m[idx] = a - R_EARTH;
            e = Math.max(0.0001, Math.min(0.01, e + (-2 * B * rho * v_rel * (1 - e) / a) * dt_sec));
            const n = Math.sqrt(GRAVITY * M_EARTH / Math.pow(a, 3));
            let delta_inc = 0.75 * 1.08263e-3 * Math.pow(R_EARTH, 2) / Math.pow(a, 2) * n * Math.sin(2 * cur_i) * dt_sec * 0.001;
            delta_inc = Math.max(-0.005, Math.min(0.005, delta_inc));
            inc[idx] = Math.max(0.1 * Math.PI / 180, Math.min(89.9 * Math.PI / 180, cur_i + delta_inc));
        }
        return { h_m, inc, months };
    }

    // ====================== 多卫星独立图表绘制 ======================
    function drawAllCharts(results, simYears) {
        const container = document.getElementById('charts-container');
        if (!container) return;
        container.innerHTML = '';

        if (!results || results.length === 0) {
            container.style.display = 'flex';
            container.style.alignItems = 'center';
            container.style.justifyContent = 'center';
            container.innerHTML = '<div style="color:#445566;font-size:14px;text-align:center;">等待卫星数据...</div>';
            return;
        }
        container.style.display = 'grid';

        const years = simYears || 5;
        const yMin = 0, yMax = CHART_Y_MAX;
        const yRange = yMax - yMin;

        // 为每颗卫星创建一个图表卡片
        for (let idx = 0; idx < results.length; idx++) {
            const r = results[idx];
            const card = document.createElement('div');
            card.className = 'chart-card';

            // 标题
            const title = document.createElement('div');
            title.className = 'chart-card-title';
            title.textContent = '🛰️ ' + r.name;
            card.appendChild(title);

            // 图例
            const legend = document.createElement('div');
            legend.className = 'chart-legend';
            legend.innerHTML =
                '<span class="legend-item"><span class="legend-dot" style="background:#ff4466;"></span> 理想</span>' +
                '<span class="legend-item"><span class="legend-dot" style="background:' + r.color + ';"></span> 实际</span>' +
                '<span class="legend-item"><span class="legend-dot" style="background:' + r.color + ';opacity:0.55;"></span> 收拢</span>';
            card.appendChild(legend);

            // Canvas 包装器
            const wrap = document.createElement('div');
            wrap.className = 'chart-card-canvas-wrap';
            const canvas = document.createElement('canvas');
            canvas.id = 'chSat_' + idx;
            wrap.appendChild(canvas);
            card.appendChild(wrap);

            container.appendChild(card);
        }

        // 等待布局完成后绘制每张图表
        requestAnimationFrame(function () {
            for (let idx = 0; idx < results.length; idx++) {
                drawSingleChart('chSat_' + idx, results[idx], years, yMin, yMax, yRange);
            }
        });
    }

    function drawSingleChart(canvasId, satResult, years, yMin, yMax, yRange) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const wrap = canvas.parentElement;
        const dpr = window.devicePixelRatio || 1;
        const w = wrap.clientWidth || 300;
        const h = wrap.clientHeight || 200;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);

        const padding = { top: 10, bottom: 24, left: 44, right: 10 };
        const plotW = w - padding.left - padding.right;
        const plotH = h - padding.top - padding.bottom;

        // 背景
        ctx.fillStyle = '#080820';
        ctx.fillRect(0, 0, w, h);

        const N = satResult.h_km.length;

        // 网格
        ctx.strokeStyle = 'rgba(68,136,170,0.10)';
        ctx.lineWidth = 0.5;
        const yGridLines = CHART_Y_MAX / 200;
        const xGridLines = years;
        for (let gi = 0; gi <= yGridLines; gi++) {
            const y = padding.top + (gi / yGridLines) * plotH;
            ctx.beginPath(); ctx.moveTo(padding.left, y); ctx.lineTo(padding.left + plotW, y); ctx.stroke();
        }
        for (let gi = 0; gi <= xGridLines; gi++) {
            const x = padding.left + (gi / xGridLines) * plotW;
            ctx.beginPath(); ctx.moveTo(x, padding.top); ctx.lineTo(x, padding.top + plotH); ctx.stroke();
        }

        // Y 轴刻度
        ctx.fillStyle = '#556677';
        ctx.font = '9px Consolas, monospace';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for (let gi = 0; gi <= yGridLines; gi++) {
            const y = padding.top + (gi / yGridLines) * plotH;
            const val = yMax - (gi / yGridLines) * yRange;
            ctx.fillText(val + '', padding.left - 4, y);
        }
        // Y 轴标签
        ctx.save();
        ctx.translate(8, padding.top + plotH / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillStyle = '#667788';
        ctx.font = '9px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('km', 0, 0);
        ctx.restore();

        // X 轴刻度
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        for (let gi = 0; gi <= xGridLines; gi++) {
            const x = padding.left + (gi / xGridLines) * plotW;
            ctx.fillText(gi + '年', x, padding.top + plotH + 4);
        }

        // 红色理想轨道曲线（恒定初始高度）
        ctx.strokeStyle = '#ff0909';
        ctx.globalAlpha = 0.8;
        ctx.lineWidth = 1.8;
        ctx.setLineDash([]);
        ctx.beginPath();
        const idY0 = padding.top + (1 - (satResult.initAlt - yMin) / yRange) * plotH;
        ctx.moveTo(padding.left, idY0);
        ctx.lineTo(padding.left + plotW, idY0);
        ctx.stroke();
        ctx.globalAlpha = 1;

        // 实际衰减曲线（实线）
        ctx.strokeStyle = satResult.color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        let hasDrawn = false;
        for (let i = 0; i < N; i++) {
            if (!isFinite(satResult.h_km[i])) continue;
            const x = padding.left + (i / (N - 1)) * plotW;
            const y = padding.top + (1 - (satResult.h_km[i] - yMin) / yRange) * plotH;
            if (!hasDrawn) { ctx.moveTo(x, y); hasDrawn = true; }
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // 太阳翼收拢曲线（虚线）
        if (satResult.hFolded_km && satResult.hFolded_km.length >= 2) {
            ctx.strokeStyle = satResult.color;
            ctx.globalAlpha = 0.55;
            ctx.lineWidth = 1.3;
            ctx.setLineDash([2, 3]);
            ctx.beginPath();
            let hasDFolded = false;
            for (let i = 0; i < satResult.hFolded_km.length; i++) {
                if (!isFinite(satResult.hFolded_km[i])) continue;
                const x = padding.left + (i / (satResult.hFolded_km.length - 1)) * plotW;
                const y = padding.top + (1 - (satResult.hFolded_km[i] - yMin) / yRange) * plotH;
                if (!hasDFolded) { ctx.moveTo(x, y); hasDFolded = true; }
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;
        }

        // 再入大气层标记线（100km）
        const reentryY = padding.top + (1 - (100 - yMin) / yRange) * plotH;
        if (reentryY > padding.top && reentryY < padding.top + plotH) {
            ctx.strokeStyle = 'rgba(255,60,60,0.25)';
            ctx.lineWidth = 0.8;
            ctx.setLineDash([1, 5]);
            ctx.beginPath();
            ctx.moveTo(padding.left, reentryY);
            ctx.lineTo(padding.left + plotW, reentryY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(255,60,60,0.5)';
            ctx.font = '8px Consolas, monospace';
            ctx.textAlign = 'left';
            ctx.fillText('再入(100km)', padding.left + 3, reentryY - 3);
        }
    }

    // ====================== 仿真逻辑（多卫星） ======================
    let allSatResults = []; // [{name, h_km, hFolded_km, initAlt, color}, ...]

    function readParams() {
        return {
            mass: parseFloat(document.getElementById('pMass').value),
            Cd: parseFloat(document.getElementById('pCd').value),
            Ad: parseFloat(document.getElementById('pAdrag').value),
            As: parseFloat(document.getElementById('pAsrp').value),
            Ps: parseFloat(document.getElementById('pPsrp').value) * 1e-6,
            years: 5
        };
    }

    function runSimulation() {
        const p = readParams();
        if (allSatellites.length === 0) {
            drawAllCharts([], 5);
            return;
        }
        allSatResults = [];
        for (let idx = 0; idx < allSatellites.length; idx++) {
            const sat = allSatellites[idx];
            const color = SAT_COLORS[idx % SAT_COLORS.length];
            // 如果选中了这颗卫星，使用输入框中的所有参数进行覆盖
            const satId = String(sat.id || sat.name);
            let h0, inc, mass, Cd, Ad, As, Ps;
            if (selectedSatId && selectedSatId === satId) {
                // 选中卫星：使用输入框参数（全部覆盖）
                h0 = parseFloat(document.getElementById('pHeight').value);
                inc = parseFloat(document.getElementById('pInclination').value);
                mass = p.mass;
                Cd = p.Cd;
                Ad = p.Ad;
                As = p.As;
                Ps = p.Ps;
            } else {
                // 未选中本卫星（或未选中任何卫星）：使用 TLE 自带高度/倾角 + 默认参数
                h0 = sat.altitude;
                inc = sat.inclination;
                mass = 240;
                Cd = 2.2;
                Ad = 1.5;
                As = 7;
                Ps = 4.56e-6;
            }
            const data = calculateOrbitDecay(h0, mass, Cd, Ad, As, Ps, inc, p.years);
            const dataFolded = calculateOrbitDecay(h0, mass, Cd, Ad * 0.2, As * 0.05, Ps, inc, p.years);
            const { h_m, months } = data;
            const h_km = new Float64Array(months);
            for (let i = 0; i < months; i++) h_km[i] = h_m[i] / 1000;
            const { h_m: hf } = dataFolded;
            const hFolded_km = new Float64Array(months);
            for (let i = 0; i < months; i++) hFolded_km[i] = hf[i] / 1000;
            allSatResults.push({
                name: sat.name,
                id: sat.id,
                constellation: sat.constellation,
                color: color,
                h_km: h_km,
                hFolded_km: hFolded_km,
                initAlt: h0
            });
        }
        redrawChart();
    }

    function redrawChart() {
        drawAllCharts(allSatResults, 5);
        // 更新结果显示：显示最高和最低的最终高度
        if (allSatResults.length > 0) {
            const initHs = allSatResults.map(r => r.initAlt);
            const finalHs = allSatResults.map(r => r.h_km[r.h_km.length - 1]);
            const maxInit = Math.max(...initHs);
            const minFinal = Math.min(...finalHs);
            document.getElementById('rdInit').textContent = maxInit.toFixed(1) + ' km（最高）';
            document.getElementById('rd5y').textContent = minFinal.toFixed(1) + ' km（最低）';
            document.getElementById('rdDrop').textContent = '多卫星（见曲线）';
            document.getElementById('rdFolded').textContent = '—（多卫星）';
            document.getElementById('rdDropFolded').textContent = '—';
        }
    }

    // 轨道计算按钮
    document.getElementById('btnCalc').addEventListener('click', runSimulation);

    // 页面加载完成后自动执行一次计算
    setTimeout(() => { runSimulation(); }, 100);

    // ====================== 北京时间时钟 ======================
    function updateBeijingClock() {
        const now = new Date();
        const h = now.getHours().toString().padStart(2, '0');
        const m = now.getMinutes().toString().padStart(2, '0');
        const s = now.getSeconds().toString().padStart(2, '0');
        const el = document.getElementById('beijingClock');
        if (el) el.textContent = `北京时间 ${h}:${m}:${s}`;
    }
    setInterval(updateBeijingClock, 1000);
    updateBeijingClock();

    // ====================== 窗口自适应 ======================
    let resizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (allSatResults.length > 0) {
                drawAllCharts(allSatResults, 5);
            } else {
                const container = document.getElementById('charts-container');
                if (container) container.innerHTML = '<div style="color:#445566;font-size:14px;text-align:center;padding:40px;">等待卫星数据...</div>';
            }
        }, 200);
    });

    // ====================== 初始化 ======================
    const container = document.getElementById('charts-container');
    if (container) container.innerHTML = '<div style="color:#445566;font-size:14px;text-align:center;padding:40px;">加载卫星数据中...</div>';
    loadDisplayListSatellites();
    // 自动执行多卫星轨道衰减计算
    setTimeout(() => { runSimulation(); }, 200);

    // 监听显示列表变化（当从其他标签页添加卫星后返回时）
    window.addEventListener('storage', (e) => {
        if (e.key === 'tec_display_satellites') {
            loadDisplayListSatellites();
            runSimulation();
        }
    });
</script>
