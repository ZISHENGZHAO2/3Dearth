<body>
<div id="app">
    <!-- 左侧 图表面板 -->
    <div id="chart-panel">
        <div id="top-nav">
            <div class="nav-page-btns">
                <a class="page-btn" href="3DNavigation_error.html">🌍 星座信息系统</a>
                <a class="page-btn" href="tec_realtime.html">📊 TEC计算</a>
                <a class="page-btn active" href="orbit_decay.html">🛰️ 轨道衰减计算</a>
            </div>
            <span class="nav-time" id="beijingClock">--:--:--</span>
        </div>
        <div id="chart-area">

                    <span class="legend-item"><span class="legend-dot" style="background:#00aaff;"></span> 实际高度</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#ff4466;"></span> 理想高度</span>
                    <span class="legend-item"><span class="legend-dot" style="background:#00ddcc;"></span> 太阳翼收拢</span>
                </div>
                <div class="chart-canvas-wrap"><canvas id="chMain"></canvas></div>

    <!-- 右侧控制面板 -->
    <div id="control-panel">
        <!-- 卫星参数 -->
        <div class="panel-section">
            <div class="section-title">🛰️ 卫星参数</div>
            <!-- 卫星选择器 -->
            <select class="sat-selector" id="satSelector">
                <option value="">-- 从显示列表选择卫星 --</option>
            </select>
            
            <div class="param-grid">
                <div class="param-item" id="piHeight">
                    <label>初始轨道高度</label>
                    <input id="pHeight" type="number" value="300" min="100" max="2000" step="10">
                    <span class="unit">km</span>
                </div>
                <div class="param-item" id="piInclination">
                    <label>轨道倾角</label>
                    <input id="pInclination" type="number" value="45" min="0" max="180" step="1">
                    <span class="unit">°</span>
                </div>
                <div class="param-item">
                    <label>卫星质量</label>
                    <input id="pMass" type="number" value="240" min="1" max="10000" step="1">
                    <span class="unit">kg</span>
                </div>
                <div class="param-item">
                    <label>阻力系数 Cd</label>
                    <input id="pCd" type="number" value="2.2" min="1" max="3" step="0.01">
                    <span class="unit"></span>
                </div>
                <div class="param-item">
                    <label>迎风面积</label>
                    <input id="pAdrag" type="number" value="1.5" min="0.01" max="50" step="0.01">
                    <span class="unit">m²</span>
                </div>
                <div class="param-item">
                    <label>光压面积</label>
                    <input id="pAsrp" type="number" value="7" min="0.01" max="50" step="0.01">
                    <span class="unit">m²</span>
                </div>
                <div class="param-item">
                    <label>太阳风动压</label>
                    <input id="pPsrp" type="number" value="4.56" min="1" max="10" step="0.01">
                    <span class="unit">×10⁻⁶ N/m²</span>
                </div>
            </div>
            <div style="margin-top:10px;">
                <button class="btn-primary" id="btnCalc">🛰️ 轨道计算</button>
            </div>
            <div id="resultDisplay" style="margin-top:10px; font-size:11px; color:#88aacc; line-height:1.8;">
                <div><span style="color:#aaccee;">轨道高度：</span><span id="rdInit">--</span></div>
                <div><span style="color:#aaccee;">5年后高度：</span><span id="rd5y">--</span><span style="color:#667788;">（下降 <span id="rdDrop">--</span>）</span></div>
                <div><span style="color:#aaccee;">收起太阳翼高度：</span><span id="rdFolded">--</span><span style="color:#667788;">（下降 <span id="rdDropFolded">--</span>）</span></div>
            </div>
        </div>

<script src="satellite.min.js"></script>
<script>
    // ====================== 物理常量 ======================
    const R_EARTH = 6371000;
    const GRAVITY = 6.67430e-11;
    const M_EARTH = 5.972e24;
    const OMEGA_EARTH = 7.2921159e-5;
    const MU = 3.986004418e14; // 地球引力常数 m³/s²

    function atmosphericDensity(h_km, F10_7 = 150, Ap = 10) {
        let H, rho0;
        if (h_km < 300) {
            H = 35 + 0.05 * (h_km - 100);
            rho0 = 1.0e-10;
            return rho0 * Math.exp(-(h_km - 100) / H) * (1 + 0.3*(F10_7-70)/180) * (1 + 0.2*Math.max(0,Ap-4)/30);
        } else if (h_km < 500) {
            H = 45 + 0.05 * (h_km - 300);
            rho0 = 2.0e-12;
        } else {
            H = 55 + 0.08 * (h_km - 500);
            rho0 = 2.0e-12 * Math.exp(-(500-300)/45);
        }
        return rho0 * Math.exp(-(h_km - 300) / H) * (1 + 0.3*(F10_7-70)/180) * (1 + 0.2*Math.max(0,Ap-4)/30);
    }

    function orbitVelocity(h_m) {
        return Math.sqrt(GRAVITY * M_EARTH / (R_EARTH + h_m));
    }

    // ====================== 从 TLE 计算轨道参数 ======================
    function computeOrbitParamsFromTLE(tle1, tle2) {
        try {
            const satrec = satellite.twoline2satrec(tle1, tle2);
            // 从 satrec 提取 inclination ( radians )
            const incDeg = satrec.inclo * 180 / Math.PI;
            // 从 mean motion (rev/day) 计算 semi-major axis
            const nRadPerSec = satrec.no / 60; // satrec.no 是 rad/min → rad/s
            const a = Math.pow(MU / (nRadPerSec * nRadPerSec), 1/3);
            const altKm = (a - R_EARTH) / 1000;
            return { inclination: incDeg, altitude: altKm, satrec };
        } catch (e) {
            return null;
        }
    }

    // ====================== 从显示列表自动填充 ======================
    function loadDisplayListSatellites() {
        const selector = document.getElementById('satSelector');
        // 保留第一个选项
        selector.innerHTML = '<option value="">-- 从显示列表选择卫星 --</option>';
        try {
            const raw = localStorage.getItem('tec_display_satellites');
            if (!raw) return;
            const sats = JSON.parse(raw);
            if (!Array.isArray(sats) || sats.length === 0) return;
            for (const sat of sats) {
                if (sat.tle1 && sat.tle2) {
                    const opt = document.createElement('option');
                    opt.value = sat.id || sat.name;
                    opt.dataset.tle1 = sat.tle1;
                    opt.dataset.tle2 = sat.tle2;
                    opt.dataset.name = sat.name || 'Unknown';
                    opt.textContent = '🛰️ ' + (sat.name || 'Unknown') + ' [' + (sat.constellation || '?') + ']';
                    selector.appendChild(opt);
                }
            }
            // 自动选择第一个
            if (selector.options.length > 1) {
                selector.selectedIndex = 1;
                selector.dispatchEvent(new Event('change'));
            }
        } catch (e) {
            console.error('读取显示列表失败:', e);
        }
    }

    document.getElementById('satSelector').addEventListener('change', function() {
        const opt = this.options[this.selectedIndex];
        if (!opt || !opt.value || !opt.dataset.tle1) {
            document.getElementById('piHeight').classList.remove('auto-filled');
            document.getElementById('piInclination').classList.remove('auto-filled');
            return;
        }
        const params = computeOrbitParamsFromTLE(opt.dataset.tle1, opt.dataset.tle2);
        if (!params) return;
        // 填充参数
        document.getElementById('pHeight').value = Math.round(params.altitude);
        document.getElementById('pInclination').value = params.inclination.toFixed(1);
        // 高亮已自动填充的字段
        document.getElementById('piHeight').classList.add('auto-filled');
        document.getElementById('piInclination').classList.add('auto-filled');
    });

    // ====================== 轨道衰减计算 ======================
    function calculateOrbitDecay(h0_km, mass, Cd, A_drag, A_srp, P_SRP, incDeg, simYears) {
        const months = simYears * 12 + 1;
        const dt_sec = 30 * 86400;
        const h_m = new Float64Array(months);
        const inc = new Float64Array(months);
        h_m[0] = h0_km * 1000;
        inc[0] = incDeg * Math.PI / 180;
        let a = R_EARTH + h_m[0];
        let e = 0.001;

        for (let idx = 1; idx < months; idx++) {
            const cur_h = h_m[idx - 1];
            const cur_i = inc[idx - 1];
            const rho = atmosphericDensity(cur_h / 1000);
            const v = orbitVelocity(cur_h);
            const v_rel = v - OMEGA_EARTH * a * Math.cos(cur_i);
            const B = Cd * A_drag / mass;
            const da_dt_drag = -2 * B * rho * v_rel * a / (1 + e);
            let da_dt_srp = cur_h / 1000 > 200 ? -(2 * (P_SRP * A_srp / mass) * a) / v : 0;
            const da_dt = da_dt_drag + da_dt_srp;
            a += da_dt * dt_sec;
            h_m[idx] = a - R_EARTH;
            e = Math.max(0.0001, Math.min(0.01, e + (-2 * B * rho * v_rel * (1 - e) / a) * dt_sec));
            const n = Math.sqrt(GRAVITY * M_EARTH / Math.pow(a, 3));
            let delta_inc = 0.75 * 1.08263e-3 * Math.pow(R_EARTH, 2) / Math.pow(a, 2) * n * Math.sin(2 * cur_i) * dt_sec * 0.001;
            delta_inc = Math.max(-0.005, Math.min(0.005, delta_inc));
            inc[idx] = Math.max(0.1 * Math.PI / 180, Math.min(89.9 * Math.PI / 180, cur_i + delta_inc));
        }
        return { h_m, inc, months };
    }

    // ====================== 单图表绘制（固定轴：X=0~5年, Y=0~2200km） ======================
    const CHART_Y_MAX = 2200; // km
    const CHART_X_MAX = 5;    // 年

    function initChart() {
        const canvas = document.getElementById('chMain');
        const wrap = canvas.parentElement;
        canvas.width = wrap.clientWidth || 400;
        canvas.height = wrap.clientHeight || 300;
    }

    function drawMainChart(h_km, simYears, hFolded_km) {
        const canvas = document.getElementById('chMain');
        if (!canvas) return;
        const wrap = canvas.parentElement;
        const dpr = window.devicePixelRatio || 1;
        const w = wrap.clientWidth || 400;
        const h = wrap.clientHeight || 300;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        ctx.fillStyle = '#080820';
        ctx.fillRect(0, 0, w, h);

        const padding = { top: 16, bottom: 32, left: 56, right: 20 };
        const plotW = w - padding.left - padding.right;
        const plotH = h - padding.top - padding.bottom;

        const N = h_km ? h_km.length : 0;
        const years = simYears || 5;

        // Y轴范围：0~2200 km
        const yMin = 0, yMax = CHART_Y_MAX;
        const yRange = yMax - yMin;

        // 网格线
        ctx.strokeStyle = 'rgba(68,136,170,0.12)';
        ctx.lineWidth = 0.5;
        const yGridLines = CHART_Y_MAX / 200; // 每200km一条
        const xGridLines = years;
        for (let gi = 0; gi <= yGridLines; gi++) {
            const y = padding.top + (gi / yGridLines) * plotH;
            ctx.beginPath();
            ctx.moveTo(padding.left, y);
            ctx.lineTo(padding.left + plotW, y);
            ctx.stroke();
        }
        for (let gi = 0; gi <= xGridLines; gi++) {
            const x = padding.left + (gi / xGridLines) * plotW;
            ctx.beginPath();
            ctx.moveTo(x, padding.top);
            ctx.lineTo(x, padding.top + plotH);
            ctx.stroke();
        }

        // Y轴刻度（km）
        ctx.fillStyle = '#556677';
        ctx.font = '10px Consolas, monospace';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for (let gi = 0; gi <= yGridLines; gi++) {
            const y = padding.top + (gi / yGridLines) * plotH;
            const val = yMax - (gi / yGridLines) * yRange;
            ctx.fillText(val + '', padding.left - 6, y);
        }
        // Y轴标签
        ctx.save();
        ctx.translate(10, padding.top + plotH / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillStyle = '#8899aa';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('轨道高度 (km)', 0, 0);
        ctx.restore();

        // X轴刻度（年）
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        for (let gi = 0; gi <= xGridLines; gi++) {
            const x = padding.left + (gi / xGridLines) * plotW;
            ctx.fillText(gi + '年', x, padding.top + plotH + 6);
        }

        // 无数据
        if (!h_km || N < 2) {
            ctx.fillStyle = '#445566';
            ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('等待卫星数据...', w / 2, h / 2);
            return;
        }

        // 理想曲线（红色实线）：恒定初始高度
        const idealAlt = h_km[0];
        ctx.strokeStyle = '#ff4466';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        const idealX0 = padding.left;
        const idealY0 = padding.top + (1 - (idealAlt - yMin) / yRange) * plotH;
        ctx.moveTo(idealX0, idealY0);
        const idealX1 = padding.left + plotW;
        ctx.lineTo(idealX1, idealY0);
        ctx.stroke();

        // 实际衰减曲线（蓝色）
        ctx.strokeStyle = '#00aaff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        let hasDrawn = false;
        for (let i = 0; i < N; i++) {
            if (!isFinite(h_km[i])) continue;
            const x = padding.left + (i / (N - 1)) * plotW;
            const y = padding.top + (1 - (h_km[i] - yMin) / yRange) * plotH;
            if (!hasDrawn) { ctx.moveTo(x, y); hasDrawn = true; }
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // 太阳翼收拢曲线（青色）
        if (hFolded_km && hFolded_km.length >= 2) {
            ctx.strokeStyle = '#00ddcc';
            ctx.lineWidth = 2;
            ctx.beginPath();
            let hasDFolded = false;
            for (let i = 0; i < hFolded_km.length; i++) {
                if (!isFinite(hFolded_km[i])) continue;
                const x = padding.left + (i / (hFolded_km.length - 1)) * plotW;
                const y = padding.top + (1 - (hFolded_km[i] - yMin) / yRange) * plotH;
                if (!hasDFolded) { ctx.moveTo(x, y); hasDFolded = true; }
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // 再入大气层标记线（100km）
        const reentryY = padding.top + (1 - (100 - yMin) / yRange) * plotH;
        if (reentryY > padding.top && reentryY < padding.top + plotH) {
            ctx.strokeStyle = 'rgba(255,60,60,0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 6]);
            ctx.beginPath();
            ctx.moveTo(padding.left, reentryY);
            ctx.lineTo(padding.left + plotW, reentryY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(255,60,60,0.7)';
            ctx.font = '9px Consolas, monospace';
            ctx.textAlign = 'left';
            ctx.fillText('再入大气层 (100km)', padding.left + 4, reentryY - 4);
        }
    }

    // ====================== 仿真逻辑 ======================
    let simData = null;
    let simDataFolded = null;

    function readParams() {
        return {
            h0: parseFloat(document.getElementById('pHeight').value),
            inc: parseFloat(document.getElementById('pInclination').value),
            mass: parseFloat(document.getElementById('pMass').value),
            Cd: parseFloat(document.getElementById('pCd').value),
            Ad: parseFloat(document.getElementById('pAdrag').value),
            As: parseFloat(document.getElementById('pAsrp').value),
            Ps: parseFloat(document.getElementById('pPsrp').value) * 1e-6,
            years: 5
        };
    }

    function runSimulation() {
        const p = readParams();
        if (p.h0 < 100 || p.h0 > 2000 || p.inc < 0 || p.inc > 180 || p.mass < 1 || p.mass > 10000) return;
        // 正常衰减
        simData = calculateOrbitDecay(p.h0, p.mass, p.Cd, p.Ad, p.As, p.Ps, p.inc, p.years);
        // 太阳翼收拢：迎风面积降80%，光压面积降95%
        simDataFolded = calculateOrbitDecay(p.h0, p.mass, p.Cd, p.Ad * 0.2, p.As * 0.05, p.Ps, p.inc, p.years);
        redrawChart();
    }

    function redrawChart() {
        if (!simData) return;
        const { h_m, months } = simData;
        const h_km = new Float64Array(months);
        for (let i = 0; i < months; i++) h_km[i] = h_m[i] / 1000;
        // 太阳翼收拢高度数据
        let hFolded_km = null;
        if (simDataFolded) {
            const { h_m: hf } = simDataFolded;
            hFolded_km = new Float64Array(months);
            for (let i = 0; i < months; i++) hFolded_km[i] = hf[i] / 1000;
        }
        drawMainChart(h_km, 5, hFolded_km);
        // 更新结果显示
        const initH = h_km[0];
        const finalH = h_km[h_km.length - 1];
        document.getElementById('rdInit').textContent = initH.toFixed(1) + ' km';
        document.getElementById('rd5y').textContent = finalH.toFixed(1) + ' km';
        document.getElementById('rdDrop').textContent = (initH - finalH).toFixed(1) + ' km';
        if (hFolded_km) {
            const finalHF = hFolded_km[hFolded_km.length - 1];
            document.getElementById('rdFolded').textContent = finalHF.toFixed(1) + ' km';
            document.getElementById('rdDropFolded').textContent = (initH - finalHF).toFixed(1) + ' km';
        }
    }

    // 轨道计算按钮
    document.getElementById('btnCalc').addEventListener('click', runSimulation);

    // 页面加载完成后自动执行一次计算
    setTimeout(() => { runSimulation(); }, 100);

    // ====================== 北京时间时钟 ======================
    function updateBeijingClock() {
        const now = new Date();
        const h = now.getHours().toString().padStart(2, '0');
        const m = now.getMinutes().toString().padStart(2, '0');
        const s = now.getSeconds().toString().padStart(2, '0');
        const el = document.getElementById('beijingClock');
        if (el) el.textContent = `北京时间 ${h}:${m}:${s}`;
    }
    setInterval(updateBeijingClock, 1000);
    updateBeijingClock();

    // ====================== 窗口自适应 ======================
    let resizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (simData) {
                redrawChart();
            } else {
                initChart();
            }
        }, 200);
    });

    // ====================== 初始化 ======================
    initChart();
    loadDisplayListSatellites();

    // 监听显示列表变化（当从其他标签页添加卫星后返回时）
    window.addEventListener('storage', (e) => {
        if (e.key === 'tec_display_satellites') {
            loadDisplayListSatellites();
        }
    });
</script>
</body>
</html>
