    <!-- 主容器 -->
    <div id="main-container">
        <!-- 左侧 - 3D地球 -->

                <div id="sat-dashboard-search">

                </div>
                <div id="sat-dashboard-list">
                    <div id="sat-dashboard-empty">🛰️ 点击 3D 地球上的卫星光点<br>即可在此显示卫星数据</div>

    <script src="three.min.js"></script>
    <script src="OrbitControls.js"></script>
    <script src="satellite.min.js"></script>

    <script>
        // ====================== Three.js 场景初始化 ======================
        const sceneArea = document.getElementById('scene-area');
        const sceneAreaRect = sceneArea.getBoundingClientRect();
        const containerWidth = sceneAreaRect.width || window.innerWidth * 0.65;
        const containerHeight = sceneAreaRect.height || window.innerHeight - 36;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, containerWidth / containerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(containerWidth, containerHeight);
        renderer.setPixelRatio(1);
        sceneArea.insertBefore(renderer.domElement, sceneArea.firstChild);
        renderer.domElement.style.display = 'block';

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;

        // ====================== 光源 ======================
        // 基础环境光 — 极微弱，仅让背光面不至于全黑
        const ambientLight = new THREE.AmbientLight(0x224466, 0.08);
        scene.add(ambientLight);

        // 天球光 — 微弱方向渐变，让阴影区有深蓝层次
        const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x001133, 0.2);
        scene.add(hemiLight);

        // 太阳光 — 强平行光，向阳面明亮
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // ====================== 地球 ======================
        const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
        const textureLoader = new THREE.TextureLoader();

        // 生成一个简易程序化等距柱状地球纹理（作为兜底，永远不会黑）
        function createFallbackEarthTexture() {
            const c = document.createElement('canvas');
            c.width = 1024; c.height = 512;
            const ctx = c.getContext('2d');
            // 深蓝色海洋
            const grad = ctx.createLinearGradient(0, 0, 0, 512);
            grad.addColorStop(0, '#1a3a5c');   // 北极
            grad.addColorStop(0.5, '#1a5276'); // 赤道
            grad.addColorStop(1, '#1a3a5c');   // 南极
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1024, 512);
            // 简单的经线/纬线网格，标示这是地图
            ctx.strokeStyle = 'rgba(100,180,255,0.15)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= 1024; x += 1024/24) { // 每15度经线
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke();
            }
            for (let y = 0; y <= 512; y += 512/12) { // 每15度纬线
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1024, y); ctx.stroke();
            }
            // 赤道加粗
            ctx.strokeStyle = 'rgba(100,200,255,0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, 256); ctx.lineTo(1024, 256); ctx.stroke();
            // 大陆轮廓（简化为一些色块区域，便于肉眼识别地图方向）
            ctx.fillStyle = 'rgba(60,140,60,0.4)';
            // 模拟欧亚大陆
            ctx.fillRect(480, 140, 200, 80);
            ctx.fillRect(560, 120, 80, 30);
            // 模拟非洲
            ctx.fillRect(490, 240, 50, 80);
            // 模拟北美
            ctx.fillRect(200, 120, 80, 60);
            // 模拟南美
            ctx.fillRect(250, 240, 30, 80);
            // 模拟澳洲
            ctx.fillRect(780, 300, 30, 25);
            // 模拟南极
            ctx.fillStyle = 'rgba(200,220,255,0.3)';
            ctx.fillRect(0, 490, 1024, 22);
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            return tex;
        }

        const fallbackTex = createFallbackEarthTexture();
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: fallbackTex,
            shininess: 0,
            specular: new THREE.Color(0x000000)
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // 异步加载真实地球纹理：先尝试 Three.js 官方 CDN（标准等距柱状图），失败则回退本地文件
        (async function loadRealEarthTex() {
            const tryLoad = (url) => new Promise((resolve) => {
                textureLoader.load(url, (tex) => resolve(tex), undefined, () => resolve(null));
            });
            let realTex = await tryLoad('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
            if (!realTex) {
                console.warn('[Earth] CDN 纹理加载失败，尝试本地文件');
                realTex = await tryLoad('textures/earth_atmos_2048.jpg');
            }
            if (realTex) {
                console.log('[Earth] 真实地球纹理加载成功');
                earthMaterial.map = realTex;
                earthMaterial.needsUpdate = true;
            } else {
                console.warn('[Earth] 所有纹理加载失败，使用程序化兜底纹理');
            }
        })();

        // 大气层光晕
        const atmosphereGeometry = new THREE.SphereGeometry(1.02, 64, 64);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
            color: 0x4488ff,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);

        // ====================== 云层系统（程序化+真实卫星云图双重保障） ======================
        // 策略:
        //   1. 立即生成程序化云纹理（保证始终有云可见）
        //   2. 异步尝试加载CDN真实卫星云图（加载成功后替换）
        //   3. 异步获取Open-Meteo密度数据叠加（增强动态感）
        const cloudSystem = {
            enabled: false,
            sphere: null,
            material: null,
            texture: null,
            canvas: null,
            ctx: null,
            updateIntervalMs: 60 * 60 * 1000,
            lastUpdateTime: null,
            isLoading: false,
            hasRealData: false,
            gridLats: [],
            gridLons: []
        };

        for (let lat = -85; lat <= 85; lat += 10) cloudSystem.gridLats.push(lat);
        for (let lon = -180; lon < 180; lon += 10) cloudSystem.gridLons.push(lon);

        // ============ 核心：程序化云纹理（高密度厚重云层） ============
        // 设计目标: 覆盖全球60%+面积，alpha均值120+，边缘清晰
        function generateCloudTexture() {
            const canvas = cloudSystem.canvas;
            if (!canvas) return;
            const ctx = cloudSystem.ctx;
            const w = canvas.width, h = canvas.height;
            const imageData = ctx.createImageData(w, h);
            const pixels = imageData.data;

            // 8层噪声，振幅总和=1.80，平均噪声≈0.90
            const octaves = [
                {fl:0.007, fo:0.006, amp:0.36, ph:0},
                {fl:0.013, fo:0.012, amp:0.32, ph:1.8},
                {fl:0.022, fo:0.020, amp:0.26, ph:3.5},
                {fl:0.035, fo:0.032, amp:0.22, ph:5.2},
                {fl:0.050, fo:0.045, amp:0.18, ph:7.0},
                {fl:0.070, fo:0.062, amp:0.14, ph:9.0},
                {fl:0.010, fo:0.025, amp:0.20, ph:2.2},
                {fl:0.040, fo:0.055, amp:0.12, ph:6.5}
            ];

            for (let py = 0; py < h; py++) {
                const lat = 90 - (py / h) * 180;
                const absLat = Math.abs(lat);
                // 气候因子：大幅放宽限制，极地也不削减太多
                const itcz = Math.exp(-Math.pow(lat / 20, 2));
                const storm = Math.exp(-Math.pow((absLat - 52) / 14, 2));
                const polar = absLat > 70 ? Math.max(0.5, 1 - (absLat - 70) / 25) : 1;
                const latFactor = Math.max(0.40, itcz * 0.50 + storm * 0.50) * polar;

                for (let px = 0; px < w; px++) {
                    const lon = (px / w) * 360 - 180;

                    // 域扭曲：双频高振幅扭曲，产生有机漩涡
                    const warp = Math.sin(lat * 0.006 + lon * 0.005) * 2.5 +
                                 Math.sin(lat * 0.012 + lon * 0.010 + 2.0) * 1.5;
                    const wLat = lat + warp * 0.40;
                    const wLon = lon + warp * 0.40;

                    // 8层噪声叠加（无循环展开，保持代码简洁）
                    let value = 0;
                    for (let o = 0; o < octaves.length; o++) {
                        const oc = octaves[o];
                        value += oc.amp * (Math.sin(wLat * oc.fl + wLon * oc.fo + oc.ph) * 0.5 + 0.5);
                    }
                    // value 现在在 [0, 1.60] 范围

                    // 应用气候因子
                    value *= latFactor;

                    // ====== 极低阈值 + 高亮度映射 ======
                    // 阈值低至0.02，几乎所有像素都保留
                    const th = 0.02 + (1 - latFactor) * 0.04;
                    if (value < th) {
                        // 阈值以下：线性淡入到0.20
                        value = (value / Math.max(th, 0.001)) * 0.20;
                    } else {
                        // 阈值以上：线性映射到[0.20, 1.0]并用pow<1大幅增亮
                        const t = (value - th) / Math.max(1 - th, 0.001);
                        value = 0.20 + t * 0.80;
                        // pow(0.72) 使中间值显著变亮（0.5→0.61）
                        value = Math.pow(value, 0.72);
                    }

                    // 高频毛绒细节（在所有可见云区域叠加）
                    if (value > 0.08) {
                        const f1 = Math.sin(wLat * 0.12 + wLon * 0.10 + 11.0) * 0.5 + 0.5;
                        const f2 = Math.sin(wLat * 0.18 + wLon * 0.15 + 15.0) * 0.5 + 0.5;
                        const f3 = Math.sin(wLat * 0.25 + wLon * 0.22 + 20.0) * 0.5 + 0.5;
                        const detailBoost = (f1 * 0.40 + f2 * 0.30 + f3 * 0.30) * 0.15;
                        value += detailBoost * Math.min(value * 2.0, 1.0);
                    }

                    value = Math.max(0, Math.min(1, value));

                    const idx = (py * w + px) * 4;
                    pixels[idx] = 255;
                    pixels[idx + 1] = 255;
                    pixels[idx + 2] = 255;
                    pixels[idx + 3] = Math.floor(value * 255);
                }
            }
            ctx.putImageData(imageData, 0, 0);
            cloudSystem.texture.needsUpdate = true;
            if (cloudSystem.material) {
                cloudSystem.material.map = cloudSystem.texture;
                cloudSystem.material.needsUpdate = true;
            }
            console.log('[Cloud] ✅ 程序化云纹理已生成');
        }

        // ============ 增强：尝试加载CDN真实卫星云图纹理 ============
        function tryLoadRealCloudTexture() {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            let timedOut = false;
            const timer = setTimeout(() => { timedOut = true; }, 8000);

            img.onload = () => {
                clearTimeout(timer);
                if (timedOut) return;
                try {
                    const canvas = cloudSystem.canvas;
                    const ctx = cloudSystem.ctx;
                    // 直接覆盖画布
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    cloudSystem.texture.needsUpdate = true;
                    if (cloudSystem.material) {
                        cloudSystem.material.map = cloudSystem.texture;
                        cloudSystem.material.needsUpdate = true;
                    }
                    cloudSystem._cdnLoaded = true;
                    console.log('[Cloud] ✅ CDN真实卫星云图已覆盖');
                    updateCloudStatus('☁️ 真实卫星云图 · 获取实时密度中...');
                    // 纹理加载成功后再获取密度数据
                    setTimeout(() => fetchCloudDensity(), 300);
                } catch(e) {
                    console.warn('[Cloud] CDN纹理绘制失败:', e.message);
                }
            };
            // 两个备选URL
            const urls = [
                'https://threejs.org/examples/textures/planets/earth_clouds_1024.png',
                'https://threejs.org/examples/textures/planets/cloud_1024.png'
            ];
            let urlIndex = 0;
            img.onerror = () => {
                urlIndex++;
                if (urlIndex < urls.length) {
                    img.src = urls[urlIndex];
                } else {
                    clearTimeout(timer);
                    console.warn('[Cloud] 所有CDN纹理均不可达');
                    updateCloudStatus('☁️ 程序化云图 · 获取实时密度中...');
                    setTimeout(() => fetchCloudDensity(), 300);
                }
            };
            img.src = urls[0];
        }

        // ============ 从 Open-Meteo 获取云密度数据并叠加 ============
        async function fetchCloudDensity() {
            // 防止同时多次请求
            if (cloudSystem.isLoading) return;
            const now = Date.now();
            const lastFetch = cloudSystem._lastFetchTime || 0;
            if (now - lastFetch < 60000) return; // 至少间隔60秒
            cloudSystem.isLoading = true;
            cloudSystem._lastFetchTime = now;

            updateCloudStatus(cloudSystem._cdnLoaded
                ? '☁️ 真实卫星云图 · 获取实时密度...'
                : '☁️ 程序化云图 · 获取实时密度...');

            try {
                const allLatList = [], allLonList = [];
                for (let i = 0; i < cloudSystem.gridLats.length; i++)
                    for (let j = 0; j < cloudSystem.gridLons.length; j++) {
                        allLatList.push(cloudSystem.gridLats[i]);
                        allLonList.push(cloudSystem.gridLons[j]);
                    }

                const latStr = allLatList.join(',');
                const lonStr = allLonList.join(',');
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${latStr}&longitude=${lonStr}&hourly=cloud_cover&forecast_hours=1&timezone=UTC`;

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                const resp = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!resp.ok) {
                    if (resp.status === 429) {
                        updateCloudStatus('☁️ API限流，1分钟后重试...');
                        cloudSystem.isLoading = false;
                        setTimeout(() => fetchCloudDensity(), 60000);
                        return;
                    }
                    throw new Error(`HTTP ${resp.status}`);
                }

                const data = await resp.json();
                const results = Array.isArray(data) ? data : (data?.latitude !== undefined ? [data] : []);
                if (results.length === 0) throw new Error('无数据');

                // 构建网格查询表
                const cloudGrid = {};
                for (const item of results) {
                    const lat = Math.round((typeof item.latitude === 'number' ? item.latitude : parseFloat(item.latitude)) / 10) * 10;
                    const lon = Math.round((typeof item.longitude === 'number' ? item.longitude : parseFloat(item.longitude)) / 10) * 10;
                    if (!isNaN(lat) && !isNaN(lon)) {
                        cloudGrid[`${lat}_${lon}`] = item.hourly?.cloud_cover?.[0] ?? 50;
                    }
                }

                // 叠加密度到画布纹理
                applyDensityOverlay(cloudGrid);
                cloudSystem.hasRealData = true;
                cloudSystem.lastUpdateTime = new Date();
                const ts = formatTimeForStatus(cloudSystem.lastUpdateTime);
                console.log(`[Cloud] ✅ 云密度数据更新: ${ts}`);
                updateCloudStatus(cloudSystem._cdnLoaded
                    ? `☁️ 真实云图 · ${ts} · 每小时更新`
                    : `☁️ 程序化云图 · ${ts} · 每小时更新`);

            } catch (e) {
                console.warn('[Cloud] 获取云密度失败:', e.message);
                if (cloudSystem.lastUpdateTime) {
                    updateCloudStatus(cloudSystem._cdnLoaded
                        ? `☁️ 真实云图 · ${formatTimeForStatus(cloudSystem.lastUpdateTime)}`
                        : `☁️ 程序化云图 · ${formatTimeForStatus(cloudSystem.lastUpdateTime)}`);
                } else {
                    updateCloudStatus(cloudSystem._cdnLoaded ? '☁️ 真实卫星云图' : '☁️ 程序化云图');
                }
            } finally {
                cloudSystem.isLoading = false;
            }
        }

        // 叠加密度：在现有纹理的基础上调整透明度
        function applyDensityOverlay(cloudGrid) {
            const canvas = cloudSystem.canvas;
            if (!canvas) return;
            const ctx = cloudSystem.ctx;
            const w = canvas.width, h = canvas.height;
            let imageData;
            try {
                imageData = ctx.getImageData(0, 0, w, h);
            } catch(e) {
                console.warn('[Cloud] 无法读取画布像素:', e.message);
                return;
            }
            const pixels = imageData.data;
            const lats = cloudSystem.gridLats;
            const lons = cloudSystem.gridLons;

            for (let py = 0; py < h; py++) {
                const lat = 90 - (py / h) * 180;
                for (let px = 0; px < w; px++) {
                    const lon = (px / w) * 360 - 180;
                    const idx = (py * w + px) * 4;

                    // 查找最近的网格点（简化版双线性插值）
                    let latIdx = 0;
                    for (let i = 0; i < lats.length - 1; i++) {
                        if (lat >= lats[i] && lat <= lats[i + 1]) { latIdx = i; break; }
                    }
                    let lonIdx = 0;
                    for (let j = 0; j < lons.length - 1; j++) {
                        if (lon >= lons[j] && lon <= lons[j + 1]) { lonIdx = j; break; }
                    }

                    const gl = (lt, ln) => cloudGrid[`${Math.round(lt/10)*10}_${Math.round(ln/10)*10}`] ?? 50;
                    const lat0 = lats[latIdx], lat1 = lats[Math.min(latIdx+1, lats.length-1)];
                    const lon0 = lons[lonIdx], lon1 = lons[(lonIdx+1) % lons.length];
                    const v00 = gl(lat0,lon0), v10 = gl(lat1,lon0), v01 = gl(lat0,lon1), v11 = gl(lat1,lon1);
                    const tx = ((lon - lon0 + 360) % 360) / ((lon1 - lon0 + 360) % 360 || 1);
                    const ty = (lat - lat0) / (lat1 - lat0 || 1);
                    let density = v00*(1-tx)*(1-ty) + v10*(1-tx)*ty + v01*tx*(1-ty) + v11*tx*ty;
                    density = Math.max(0, Math.min(100, density)) / 100;

                    // 用密度调整透明度：density=0 → 半透明，density=1 → 保持原样
                    const factor = 0.4 + density * 0.6;
                    pixels[idx + 3] = Math.min(255, Math.floor(pixels[idx + 3] * factor));
                }
            }

            ctx.putImageData(imageData, 0, 0);
            cloudSystem.texture.needsUpdate = true;
            if (cloudSystem.material) {
                cloudSystem.material.map = cloudSystem.texture;
                cloudSystem.material.needsUpdate = true;
            }
        }

        // ============ 工具函数 ============
        function formatTimeForStatus(date) {
            return [date.getHours(), date.getMinutes(), date.getSeconds()]
                .map(n => n.toString().padStart(2, '0')).join(':');
        }

        function updateCloudStatus(text) {
            const el = document.getElementById('cloud-status');
            if (el) { el.textContent = text; el.style.display = cloudSystem.enabled ? 'block' : 'none'; }
        }

        // ============ 创建云层 ============
        function createCloudLayer() {
            const geometry = new THREE.SphereGeometry(1.012, 64, 64);
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            cloudSystem.canvas = canvas; cloudSystem.ctx = ctx;

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.ClampToEdgeWrapping;
            cloudSystem.texture = texture;

            const material = new THREE.MeshPhongMaterial({
                map: texture,
                transparent: true,
                opacity: 0.82,
                blending: THREE.NormalBlending,
                depthWrite: false,
                side: THREE.DoubleSide
            });
            cloudSystem.material = material;

            const sphere = new THREE.Mesh(geometry, material);
            cloudSystem.sphere = sphere;
            scene.add(sphere);

            // 默认隐藏云层（从关闭状态开始）
            sphere.visible = false;

            // 第1步：立即生成程序化纹理（保证可见）
            generateCloudTexture();
            updateCloudStatus('☁️ 程序化云图 · 尝试加载真实纹理...');

            // 第2步：异步尝试CDN真实云图（可选增强）
            setTimeout(() => {
                tryLoadRealCloudTexture();
            }, 200);

            // 第3步：每小时尝试更新密度数据
            setInterval(() => {
                if (!cloudSystem.isLoading) fetchCloudDensity();
            }, cloudSystem.updateIntervalMs);
        }

        // ============ 云层开关 ============
        document.getElementById('btnCloud').addEventListener('click', () => {
            cloudSystem.enabled = !cloudSystem.enabled;
            const btn = document.getElementById('btnCloud');
            btn.textContent = cloudSystem.enabled ? '关闭云层' : '开启云层';
            btn.classList.toggle('active', cloudSystem.enabled);
            if (cloudSystem.sphere) cloudSystem.sphere.visible = cloudSystem.enabled;
            if (cloudSystem.enabled) {
                const t = cloudSystem.lastUpdateTime
                    ? `☁️ 实时云 · ${formatTimeForStatus(cloudSystem.lastUpdateTime)} · 每小时更新`
                    : '☁️ 卫星云图 · 加载中...';
                updateCloudStatus(t);
            } else {
                updateCloudStatus('');
            }
        });

        // 创建云层
        createCloudLayer();

        // ====================== 经纬线网格 ======================
        const gridGroup = new THREE.Group();
        scene.add(gridGroup);

        function createGridLines() {
            const radius = 1.005;
            const segments = 90;
            const gridColor = 0x4488aa;

            for (let lon = -180; lon <= 180; lon += 10) {
                const points = [];
                const theta = THREE.MathUtils.degToRad(lon);
                for (let lat = -80; lat <= 80; lat += 2) {
                    const phi = THREE.MathUtils.degToRad(90 - lat);
                    const x = -radius * Math.sin(phi) * Math.cos(theta);
                    const y = radius * Math.cos(phi);
                    const z = radius * Math.sin(phi) * Math.sin(theta);
                    points.push(new THREE.Vector3(x, y, z));
                }
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({
                    color: gridColor, transparent: true, opacity: 0.35
                });
                gridGroup.add(new THREE.Line(geo, mat));
            }

            for (let lat = -80; lat <= 80; lat += 10) {
                const points = [];
                const phi = THREE.MathUtils.degToRad(90 - lat);
                for (let i = 0; i <= segments; i++) {
                    const theta = (i / segments) * Math.PI * 2;
                    const x = -radius * Math.sin(phi) * Math.cos(theta);
                    const y = radius * Math.cos(phi);
                    const z = radius * Math.sin(phi) * Math.sin(theta);
                    points.push(new THREE.Vector3(x, y, z));
                }
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.LineBasicMaterial({
                    color: gridColor, transparent: true, opacity: 0.35
                });
                gridGroup.add(new THREE.Line(geo, mat));
            }
        }
        createGridLines();

        // ====================== 星空背景（satellitemap.space 风格） ======================
        renderer.setClearColor(0x000008, 1);

        // 用 Canvas 生成星点纹理（带柔边）
        function makeStarTexture(size, feather) {
            const c = document.createElement('canvas');
            c.width = c.height = size;
            const ctx = c.getContext('2d');
            const half = size / 2;
            const grad = ctx.createRadialGradient(half, 0, half, half, half, half);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(feather, 'rgba(255,255,255,0.5)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            const tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        const starTex32 = makeStarTexture(32, 0.25);
        const starTex64 = makeStarTexture(64, 0.2);

        function createStarLayer(count, radius, size, tex, opacity) {
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = radius * (0.85 + Math.random() * 0.15);
                positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({
                map: tex,
                size: size,
                transparent: true,
                opacity: opacity,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                color: 0xffffff
            });
            return new THREE.Points(geo, mat);
        }

        // 第1层：密集远景微星
        scene.add(createStarLayer(8000, 80, 0.6, starTex32, 0.8));

        // 第2层：中等亮度
        scene.add(createStarLayer(2500, 60, 1.2, starTex32, 0.9));

        // 第3层：亮星
        scene.add(createStarLayer(500, 50, 2.0, starTex64, 1.0));

        // 第4层：一等星（大而亮，带光晕）
        (function () {
            const count = 50;
            const pos = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 45;
                pos[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
                pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i * 3 + 2] = r * Math.cos(phi);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({
                map: starTex64,
                size: 4.0,
                transparent: true,
                opacity: 1.0,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                color: 0xfff8e8
            });
            scene.add(new THREE.Points(geo, mat));
        })();


        // ====================== 颜色映射（备用） ======================
        function errorToColor(error) {
            const t = Math.min(error / 15, 1);
            const color = new THREE.Color();
            // jet colormap: 蓝→青→绿→黄→红
            if (t < 0.25) { color.setRGB(0, t * 4, 1);
            } else if (t < 0.5) { color.setRGB(0, 1, 1 - (t - 0.25) * 4);
            } else if (t < 0.75) { color.setRGB((t - 0.5) * 4, 1, 0);
            } else { color.setRGB(1, 1 - (t - 0.75) * 4, 0); }
            return color;
        }

        // ====================== JavaScript 误差计算引擎 ======================
        // 基于 navigation_error_calculator.py 的算法

        const R_EARTH = 6371000;  // 地球半径 (m)
        const GRAVITY = 6.67430e-11;
        const M_EARTH = 5.972e24;
        const OMEGA_EARTH = 7.2921159e-5;

        // 大气密度模型
        function atmosphericDensity(h_km, F10_7 = 150, Ap = 10) {
            let H, rho0;
            if (h_km < 300) {
                H = 35 + 0.05 * (h_km - 100);
                rho0 = 1.0e-10;
                return rho0 * Math.exp(-(h_km - 100) / H) *
                    (1.0 + 0.3 * (F10_7 - 70) / 180.0) *
                    (1.0 + 0.2 * Math.max(0, Ap - 4) / 30.0);
            } else if (h_km < 500) {
                H = 45 + 0.05 * (h_km - 300);
                rho0 = 2.0e-12;
            } else {
                H = 55 + 0.08 * (h_km - 500);
                rho0 = 2.0e-12 * Math.exp(-(500 - 300) / 45);
            }
            const solar_factor = 1.0 + 0.3 * (F10_7 - 70) / 180.0;
            const geomag_factor = 1.0 + 0.2 * Math.max(0, Ap - 4) / 30.0;
            return rho0 * Math.exp(-(h_km - 300) / H) * solar_factor * geomag_factor;
        }

        // 轨道速度
        function orbitVelocity(h_m) {
            const r = R_EARTH + h_m;
            return Math.sqrt(GRAVITY * M_EARTH / r);
        }

        // 导航误差计算类
        class NavigationErrorBudget {
            constructor(h_km, inc_deg = 45, mass = 80, Cd = 2.2, A_drag = 0.08, A_srp = 0.5) {
                this.h = h_km;
                this.inc = inc_deg * Math.PI / 180;
                this.mass = mass;
                this.Cd = Cd;
                this.A_drag = A_drag;
                this.A_srp = A_srp;
                this.r = R_EARTH + h_km * 1000;
                this.v = orbitVelocity(this.r);
                this.n = Math.sqrt(GRAVITY * M_EARTH / Math.pow(this.r, 3));
                const n_max = 70;
                this.gravity_model_error = 0.02 * Math.pow(R_EARTH / this.r, n_max - 10);
            }

            atmosphericDragError() {
                const base_along = 3.0;
                const height_factor = this.h < 1000 ? Math.min(Math.pow(500 / this.h, 1.5), 4.0) : 0.5;
                const solar_factor = 1 + 0.2 * (150 - 70) / 180;
                const along = base_along * height_factor * solar_factor;
                return { radial: along * 0.4, along: along, cross: along * 0.5 };
            }

            solarRadiationError() {
                const factor = (this.A_srp / this.mass) / 0.01;
                const base = 1.5;
                return { radial: base * factor, cross: base * factor * 0.8, along: base * factor * 0.3 };
            }

            gravityModelError() {
                const radial = this.gravity_model_error * 100;
                return { radial: radial, along: radial * 2.0, cross: radial * 1.5 };
            }

            gnssNoiseError(lat_deg) {
                const lat = lat_deg * Math.PI / 180;
                const base = 0.3;
                const gdop = 1.0 + 0.3 * Math.abs(Math.sin(lat));
                const vis = 1.0 - 0.2 * Math.abs(Math.sin(lat));
                return base * gdop / vis;
            }

            getNonIono3DError(lat_deg) {
                const drag = this.atmosphericDragError();
                const srp = this.solarRadiationError();
                const grav = this.gravityModelError();
                const gnss = this.gnssNoiseError(lat_deg);
                const radial = Math.sqrt(drag.radial ** 2 + srp.radial ** 2 + grav.radial ** 2 + gnss ** 2);
                const along = Math.sqrt(drag.along ** 2 + srp.along ** 2 + grav.along ** 2 + gnss ** 2);
                const cross = Math.sqrt(drag.cross ** 2 + srp.cross ** 2 + grav.cross ** 2 + gnss ** 2);
                return Math.sqrt(radial ** 2 + along ** 2 + cross ** 2);
            }
        }

        // 电离层残余误差
        function ionoResidualFromVtec(vtec, elevation_deg = 90) {
            if (isNaN(vtec) || vtec === null) return 0.0;
            const slant_factor = 1.0 / Math.sin(elevation_deg * Math.PI / 180);
            return 0.10 * vtec * slant_factor;
        }

        // TEC 插值器（使用纬度依赖模型，不再依赖外部 GloTEC 数据）
        let tecInterpolator = {
            getVtec: function(lat, lon) {
                const latRad = lat * Math.PI / 180;
                const baseTec = 30 + 30 * Math.pow(Math.cos(latRad), 2);
                const lonRad = lon * Math.PI / 180;
                const variation = 10 * Math.sin(2 * lonRad) * Math.cos(latRad);
                return Math.max(5, baseTec + variation);
            }
        };
        console.log('[Info] 使用默认 TEC 模型（GloTEC 数据已移除）');

        // 计算指定高度的全球误差网格
        function calculateErrorGrid(height_km, latCount = 30, lonCount = 60) {
            const budget = new NavigationErrorBudget(height_km);
            const lats = [];
            const lons = [];
            const errors = [];

            for (let i = 0; i < latCount; i++) {
                const lat = -90 + (180 * i) / (latCount - 1);
                lats.push(lat);
            }
            for (let j = 0; j < lonCount; j++) {
                const lon = -180 + (360 * j) / (lonCount - 1);
                lons.push(lon);
            }

            for (let i = 0; i < latCount; i++) {
                errors[i] = [];
                for (let j = 0; j < lonCount; j++) {
                    const lat = lats[i];
                    const lon = lons[j];
                    const nonIonoErr = budget.getNonIono3DError(lat);
                    const vtec = tecInterpolator ? tecInterpolator.getVtec(lat, lon) : 30;
                    const ionoErr = ionoResidualFromVtec(vtec);
                    const totalErr = Math.min(Math.sqrt(nonIonoErr ** 2 + ionoErr ** 2), 15.0);
                    errors[i][j] = totalErr;
                }
            }

            return { lats, lons, errors, height_km };
        }

        // 生成 3D 热力图数据点
        function generate3DHeatmapData(errorGrid) {
            const points = [];
            const { lats, lons, errors, height_km } = errorGrid;

            for (let i = 0; i < lats.length; i++) {
                for (let j = 0; j < lons.length; j++) {
                    const lat = lats[i];
                    const lon = lons[j];
                    const error = errors[i][j];

                    // 经纬度 → 3D球面坐标
                    const phi = (90 - lat) * Math.PI / 180;
                    const theta = (lon + 180) * Math.PI / 180;
                    const r = 1.0 + error / 100;

                    points.push({
                        lat: lat,
                        lon: lon,
                        error: error,
                        vtec: tecInterpolator ? tecInterpolator.getVtec(lat, lon) : 30,
                        x: -r * Math.sin(phi) * Math.cos(theta),
                        y: r * Math.cos(phi),
                        z: r * Math.sin(phi) * Math.sin(theta),
                        height: height_km
                    });
                }
            }

            return {
                orbit_height_km: height_km,
                points: points
            };
        }

        // ====================== 真实时间与地球自转 ======================
        // 计算太阳位置（基于真实时间）
        function updateSunPosition() {
            const now = new Date();
            // 北京时间（本地时间）
            const localHours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
            // UTC = 北京时间 - 8
            const utcHours = localHours - 8;

            // 更新时间显示（北京时间 和 UTC）
            const beijingTimeStr = now.getHours().toString().padStart(2, '0') + ':' +
                                   now.getMinutes().toString().padStart(2, '0') + ':' +
                                   now.getSeconds().toString().padStart(2, '0');
            const utcH = ((now.getHours() - 8) % 24 + 24) % 24;
            const utcTimeStr = utcH.toString().padStart(2, '0') + ':' +
                               now.getMinutes().toString().padStart(2, '0') + ':' +
                               now.getSeconds().toString().padStart(2, '0');

            const utcEl = document.getElementById('utcTime');
            const beijingEl = document.getElementById('beijingClock');
            if (utcEl) utcEl.textContent = utcTimeStr;
            if (beijingEl) beijingEl.textContent = beijingTimeStr;

            // 太阳位置基于UTC时间，考虑时差方程（Equation of Time）
            const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            const gamma = 2 * Math.PI * (dayOfYear - 1) / 365;
            // 时差方程（分钟），经典 Spencer 公式
            const equationOfTime = 229.18 * (0.000075 + 0.001868 * Math.cos(gamma)
                - 0.032077 * Math.sin(gamma) - 0.014615 * Math.cos(2 * gamma) - 0.040849 * Math.sin(2 * gamma));
            // 太阳时 = UTC + 时差方程（转换为小时）
            const solarHours = utcHours + equationOfTime / 60;
            // 太阳时角：每小时15度，12:00太阳时为0（太阳在子午线正上方）
            const sunAngle = (solarHours - 12) * (Math.PI / 12);

            // 太阳距离（用于场景）
            const sunDistance = 5;

            // 太阳赤纬（declination）：δ = 23.44° × sin(360°/365 × (dayOfYear - 81))
            const declination = 23.44 * Math.sin(2 * Math.PI * (dayOfYear - 81) / 365) * Math.PI / 180;
            const cosDec = Math.cos(declination);
            const sinDec = Math.sin(declination);

            // 太阳位置：时角 → XZ 方位，赤纬 → Y 高度
            sunLight.position.set(
                sunDistance * cosDec * Math.cos(sunAngle),
                sunDistance * sinDec,
                sunDistance * cosDec * Math.sin(sunAngle)
            );

            // 地球纹理默认朝向已正确（u=0.5=0°经线在 +x 方向）
            // 太阳灯光位置变化已正确创建晨昏线，无需旋转地球网格

            return sunAngle;
        }

        // ---------- 2. 从全部 TLE 中自动检测星座 ----------
        function detectConstellations(rawText) {
            const lines = rawText.trim().split('\n').filter(l => {
                const t = l.trim();
                return t.length > 0 && !t.startsWith('#');
            });
            _allTLEData = lines;

            // 提取所有 name line，解析出星座前缀
            const nameLines = [];
            for (let i = 0; i <= lines.length - 3; i += 3) {
                nameLines.push(lines[i].trim());
            }

            // 统计各星座卫星数
            const constMap = new Map(); // prefix -> { count, names:[] }
            for (const name of nameLines) {
                const prefix = extractConstellation(name);
                if (!constMap.has(prefix)) {
                    constMap.set(prefix, { count: 0, names: [] });
                }
                constMap.get(prefix).count++;
                if (constMap.get(prefix).names.length < 3) constMap.get(prefix).names.push(name);
            }

            // 转为 cfg 数组（按数量降序）
            const sorted = [...constMap.entries()]
                .sort((a, b) => b[1].count - a[1].count);

            const result = [];
            let colorIdx = 0;
            for (const [prefix, info] of sorted) {
                if (info.count < 1) continue;
                const cfg = {
                    id: prefix.toLowerCase(),
                    label: prefix,
                    color: CONST_COLORS[colorIdx % CONST_COLORS.length],
                    count: info.count,
                    satrecs: [],
                    visible: true, // 默认全部显示
                    _pointsObj: null,
                    _positions: null,
                    _hidden: null, // Uint8Array: 0=visible
                    _startIdx: 0,  // 在全局索引中的起始位置
                };
                result.push(cfg);
                colorIdx++;

            // 设置友好的显示标签

            return result;
        }

        // 从卫星名称行提取星座前缀
        function extractConstellation(nameLine) {
            const u = nameLine.toUpperCase().trim();
            // 去掉开头的 '0 ' 或数字前缀
            const clean = u.replace(/^\d+\s*/, '');
            // 特殊匹配列表（长名称优先）
            const specials = ['GLOBALSTAR', 'STARLINK', 'ONEWEB', 'QIANFAN',
                'IRIDIUM', 'ORBCOMM', 'KUIPER', 'LEMUR', 'SWARM',
                'TIANMU', 'FENGYUN', 'YAOGAN', 'GAOFEN', 'JILIN', 'LUOJIA',
                'HST', 'LANDSAT', 'SENTINEL', 'AISTECH', 'AST', 'NAVSTAR',
                'BEIDOU', 'GALILEO', 'GLONASS', 'COSMOS', 'NOAA', 'METOP',
                'TDRS', 'XW', 'TEC', 'SPACEBEE', 'FLOCK', 'DOVE',
                'CENTAURI', 'ROBUSTA', 'SUCHAI', 'GOMX', 'SALSAT',
                'NUSAT', 'LIGHTSAIL', 'NANOSATC', 'SERPENS', 'AAUSAT',
                'RAINCUBE', 'ICEYE', 'CAPELLA', 'UMBRA', 'PLANET',
                'SKYSAT', 'RAPIDEYE', 'EARLYBIRD', 'TEMPEST', 'CYGNSS',
                'GRACE', 'SWARM', 'SMAP', 'AQUA', 'TERRA', 'AURA',
                'CALIPSO', 'CLOUDSAT', 'OSTM', 'JASON', 'TOPEX',
                'ENVISAT', 'ERS', 'CRYOSAT', 'GOCE', 'AEOLUS',
                'BIOMASS', 'EARTHCARE', 'FIREBIRD', 'ELANA', 'NORSAT',
                'SEALION', 'PATHFINDER', 'TARANIS', 'ANGELS',
                'OUFTI', 'ESEO', 'E-STAR', 'FUNSAIL', 'SKYCUBE',
                'LUNAR', 'MARS', 'TIANZHOU', 'SHENZHOU', 'CHANG\'E',
                'TIANWEN', 'ZHENGHE', 'MACAU', 'HISUI', 'ASNARO',
                'ALOS', 'DAICHI', 'IGS', 'KOMPSAT', 'ARIRANG',
                'DMC', 'UKDMC', 'BILSAT', 'RASAT', 'GOKTURK',
                'EGYPTSAT', 'ALSAT', 'NIGERIASAT', 'RAPEYE', 'TACSAT'];

            for (const s of specials) {
                if (clean.startsWith(s)) return s;
            }

            // 通用规则：取第一个 '-' 或 '(' 或空格之前的词
            const m = clean.match(/^([A-Z][A-Z0-9]+)/);
            if (m) return m[1];

            // 最后 fallback：取前两个字符
            return clean.substring(0, Math.min(6, clean.length)) || 'OTHER';
        }

        // ---------- 3. 为星座分配卫星（解析 TLE） ----------
        function assignSatellites(cfgs) {
            const lines = _allTLEData;
            let globalIdx = 0;
            const satMap = new Map();
            let nextId = 0;

            for (let i = 0; i <= lines.length - 3; i += 3) {
                const nameLine = lines[i].trim();
                const line1 = lines[i+1].trim();
                const line2 = lines[i+2].trim();
                if (!line1.startsWith('1 ') || !line2.startsWith('2 ')) { globalIdx++; continue; }

                const prefix = extractConstellation(nameLine);
                const cfg = cfgs.find(c => c.label.toUpperCase() === prefix || c.id === prefix.toLowerCase());
                try {
                    const satrec = satellite.twoline2satrec(line1, line2);
                    satrec.name = nameLine;
                    satrec._satId = nextId; // 标记唯一 ID
                    if (cfg) {
                        cfg.satrecs.push(satrec);
                        satMap.set(nextId, { cfg, localIdx: cfg.satrecs.length - 1, name: nameLine });
                        nextId++;
                    }
                } catch(_) {}
                globalIdx++;
            }

            // 保存全局映射
            _satMap = satMap;
            _totalSats = nextId;

            // 去掉没有卫星的星座
            return cfgs.filter(c => c.satrecs.length > 0);
        }

        // 生成圆形纹理（实心圆，无边缘柔化）
        function createCircleTexture() {
            const size = 64;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const center = size / 2;
            const radius = size / 2 - 1;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(center, center, radius, 0, Math.PI * 2);
            ctx.fill();
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }
        const _circleTex = createCircleTexture();

        // ---------- 4. 为每个星座创建 Points ----------
        function createConstellationPoints(cfg) {
            const count = cfg.satrecs.length;
            const positions = new Float32Array(count * 3);
            // 初始全隐藏（等待第一次位置更新）
            positions.fill(99999);

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: new THREE.Color(cfg.color),
                size: 0.023,
                map: _circleTex,
                transparent: true,
                opacity: 1.0,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            const pointsObj = new THREE.Points(geometry, material);
            pointsObj.userData.constId = cfg.id;
            scene.add(pointsObj);

            cfg._pointsObj = pointsObj;
            cfg._positions = positions;
            cfg._hidden = new Uint8Array(count); // 全 0 = 全显示
            cfg._highlighted = new Uint8Array(count); // 额外高亮标记
        }

        // ---------- 5. 更新所有卫星位置（每帧） ----------
        function updateAllSatPositions(now) {
            const gmst = satellite.gstime(now);
            for (const cfg of CONSTELLATIONS) {
                // 列表模式下即使 cfg.visible=false 也要更新位置（由 _hidden 控制）
                if (!_listMode && !cfg.visible) continue;
                if (!cfg._positions || !cfg._pointsObj) continue;
                const positions = cfg._positions;
                const satrecs = cfg.satrecs;
                const hidden = cfg._hidden;
                for (let i = 0; i < satrecs.length; i++) {
                    if (hidden[i]) {
                        positions[i*3] = 99999;
                        positions[i*3+1] = 99999;
                        positions[i*3+2] = 99999;
                        continue;
                    }
                    const pv = satellite.propagate(satrecs[i], now);
                    if (pv.position) {
                        const gd = satellite.eciToGeodetic(pv.position, gmst);
                        const r = (1.0 + gd.height / 6371.0) * orbitScaleFactor;
                        const phi = Math.PI / 2 - gd.latitude;
                        const theta = gd.longitude + Math.PI;
                        positions[i*3] = -r * Math.sin(phi) * Math.cos(theta);
                        positions[i*3+1] = r * Math.cos(phi);
                        positions[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
                    } else {
                        positions[i*3] = 99999;
                        positions[i*3+1] = 99999;
                        positions[i*3+2] = 99999;
                    }
                }
                cfg._pointsObj.geometry.attributes.position.needsUpdate = true;
            }
        }

        // ---------- 6. 构建星座选择面板 UI ----------
        function buildConstPanel(cfgs) {
            const panel = document.getElementById('const-panel');
            panel.innerHTML = '';

            // 全选/取消 → 全部显示/全部隐藏（来回切换）
            const allBtn = document.createElement('button');
            allBtn.className = 'const-check-all';
            // 初始状态：全部可见 → "全部隐藏"，否则 → "全部显示"
            {
                const allVisible = cfgs.every(c => c.visible);
                allBtn.textContent = allVisible ? '🔘 全部隐藏' : '◯ 全部显示';
            }
            allBtn.addEventListener('click', () => {
                const anyOff = cfgs.some(c => !c.visible);
                if (anyOff) {
                    // 有隐藏的 → 全部显示：退出列表模式
                    for (const cfg of cfgs) {
                        cfg.visible = true;
                        if (cfg._pointsObj) cfg._pointsObj.visible = true;
                    }
                    _listMode = false;
                    _displayList.clear();
                    syncDisplayList();
                    updateDisplayListBtns();
                    // 显示所有轨道线和光晕
                    for (const [, sel] of selectedSats) {
                        if (sel.orbitLine) sel.orbitLine.visible = true;
                        if (sel.sprite) sel.sprite.visible = true;
                    }
                    allBtn.textContent = '🔘 全部隐藏';
                } else {
                    // 全部显示中 → 全部隐藏：进入列表模式
                    for (const cfg of cfgs) {
                        cfg.visible = false;
                        if (cfg._pointsObj) cfg._pointsObj.visible = false;
                    }
                    _listMode = true;
                    // 列表模式下强制所有 Points 可见（由 _hidden 控制具体卫星）
                    for (const cfg of cfgs) {
                        if (cfg._pointsObj) cfg._pointsObj.visible = true;
                    }
                    syncDisplayList();
                    updateDisplayListBtns();
                    // 隐藏所有轨道线和光晕（列表模式由用户控制）
                    for (const [, sel] of selectedSats) {
                        if (sel.orbitLine) sel.orbitLine.visible = false;
                        if (sel.sprite) sel.sprite.visible = false;
                    }
                    allBtn.textContent = '◯ 全部显示';
                }
                buildConstPanel(cfgs);
            });
            panel.appendChild(allBtn);

            // 每个星座一个 checkbox
            for (const cfg of cfgs) {
                const el = document.createElement('label');
                el.className = 'const-check' + (cfg.visible ? ' checked' : '');
                el.style.setProperty('--cc', cfg.color);

                const dot = document.createElement('span');
                dot.className = 'cc-dot';
                dot.style.background = cfg.color;
                el.appendChild(dot);

                const lbl = document.createElement('span');
                lbl.className = 'cc-label';
                lbl.textContent = cfg.label;
                el.appendChild(lbl);

                const cnt = document.createElement('span');
                cnt.className = 'cc-count';
                cnt.textContent = `${cfg.count}`;
                el.appendChild(cnt);

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = cfg.visible;
                el.appendChild(cb);

                // 仅通过 checkbox change 事件控制显示状态（浏览器的 label 默认行为会自动转发点击到 checkbox）
                cb.addEventListener('change', () => {
                    cfg.visible = cb.checked;
                    if (cfg._pointsObj) cfg._pointsObj.visible = cfg.visible;
                    el.classList.toggle('checked', cfg.visible);
                    // 同步该星座选中的轨道线和光晕可见性
                    for (const [, sel] of selectedSats) {
                        if (sel.cfg === cfg) {
                            if (sel.orbitLine) sel.orbitLine.visible = cfg.visible;
                            if (sel.sprite) sel.sprite.visible = cfg.visible;
                        }
                    }
                });

                panel.appendChild(el);
            }

            // 注册收起/展开按钮（只注册一次）
            const toggleBtn = document.getElementById('constToggle');
            if (toggleBtn && !toggleBtn._registered) {
                toggleBtn._registered = true;
                toggleBtn.addEventListener('click', () => {
                    const wrapper = document.getElementById('const-panel-wrapper');
                    wrapper.classList.toggle('collapsed');
                    const arrow = toggleBtn.querySelector('.arrow');
                    if (arrow) arrow.textContent = wrapper.classList.contains('collapsed') ? '▶' : '◀';
                });
            }
        }

        // ---------- 7. 主初始化流程 ----------
        async function initSatelliteSystem() {
            const raw = await loadAllTLE();
            if (!raw) {
                console.error('[Sat] 无法加载 TLE 备份数据');
                return;
            }
            const detected = detectConstellations(raw);
            console.log(`[Sat] 检测到 ${detected.length} 个星座，总计 ${_allTLEData.length/3} 颗卫星`);
            for (const d of detected) {
                console.log(`  ${d.label}: ${d.count}`);
            }

            CONSTELLATIONS = assignSatellites(detected);
            console.log(`[Sat] 分配后 ${CONSTELLATIONS.length} 个星座有卫星数据`);

            for (const cfg of CONSTELLATIONS) {
                createConstellationPoints(cfg);
            }

            buildConstPanel(CONSTELLATIONS);

            // 首次位置更新
            updateAllSatPositions(new Date());

            // 构建全卫星仪表盘列表
            buildAllSatelliteList();
        }

        // ---------- 8. 选中/取消选中卫星 ----------
        function deselectSat(globalIdx) {
            const sel = selectedSats.get(globalIdx);
            if (!sel) return;
            if (sel.orbitLine) {
                scene.remove(sel.orbitLine);
                sel.orbitLine.geometry.dispose();
                sel.orbitLine.material.dispose();
            }
            if (sel.sprite) {
                scene.remove(sel.sprite);
                sel.sprite.material.dispose();
                sel.sprite = null;
            }
            selectedSats.delete(globalIdx);
        }

        function clearAllSatSelections() {
            for (const idx of [...selectedSats.keys()]) deselectSat(idx);
        }

        // 绘制选中卫星的轨道线
        function drawSatOrbit(satrec) {
            const now = new Date();
            const meanMotion = satrec.no_kozai || satrec.no;
            const periodMin = meanMotion ? (2 * Math.PI) / meanMotion : 90;
            const periodMs = periodMin * 60 * 1000;
            const steps = 128;
            const points = [];
            for (let s = 0; s <= steps; s++) {
                const t = new Date(now.getTime() + (s / steps) * periodMs);
                const pv = satellite.propagate(satrec, t);
                if (pv.position) {
                    const gd = satellite.eciToGeodetic(pv.position, satellite.gstime(t));
                    const r = (1.0 + gd.height / 6371.0) * orbitScaleFactor;
                    const phi = Math.PI / 2 - gd.latitude;
                    const theta = gd.longitude + Math.PI;
                    points.push(new THREE.Vector3(
                        -r * Math.sin(phi) * Math.cos(theta),
                        r * Math.cos(phi),
                        r * Math.sin(phi) * Math.sin(theta)
                    ));
                }
            }
            if (points.length < 2) return null;
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.7 });
            const line = new THREE.Line(geometry, material);
            line.rotation.y = earth.rotation.y;
            scene.add(line);
            return line;
        }

        // 高亮精灵（选中卫星的标记）
        function createHighlightSprite(color) {
            const c = document.createElement('canvas');
            c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 4, 32, 32, 32);
            grad.addColorStop(0, color);
            grad.addColorStop(0.3, color + 'cc');
            grad.addColorStop(0.7, color + '44');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 64, 64);
            const tex = new THREE.CanvasTexture(c);
            const mat = new THREE.SpriteMaterial({
                map: tex, transparent: true, depthTest: false,
                blending: THREE.AdditiveBlending
            });
            const sprite = new THREE.Sprite(mat);
            sprite.scale.set(0.12, 0.12, 1);
            scene.add(sprite);
            return sprite;
        }

        // ---------- 9. 卫星点击处理（Raycaster on Points） ----------
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        function onSatelliteClick(event) {
            if (event.target !== renderer.domElement) return;

            const allPoints = CONSTELLATIONS
                .filter(c => c.visible && c._pointsObj)
                .map(c => c._pointsObj);
            if (allPoints.length === 0) return;

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            // 调高阈值提升点击精度
            raycaster.params.Points = { threshold: 0.04 };
            const intersects = raycaster.intersectObjects(allPoints, false);
            if (intersects.length === 0) return;

            const hit = intersects[0];
            const pointIdx = hit.index;
            const constId = hit.object.userData.constId;
            const cfg = CONSTELLATIONS.find(c => c.id === constId);
            if (!cfg || pointIdx === undefined || pointIdx >= cfg.satrecs.length) return;

            const satrec = cfg.satrecs[pointIdx];
            if (!satrec) return;

            // 使用 satrec._satId 作为全局唯一索引（来自 _satMap）
            const globalIdx = satrec._satId;
            if (globalIdx === undefined) return;

            if (selectedSats.has(globalIdx)) {
                deselectSat(globalIdx);
            } else {
                // 先清除其他选中
                // clearAllSatSelections(); // 可选：是否允许多选
                const orbitLine = drawSatOrbit(satrec);
                const hlSprite = createHighlightSprite(cfg.color);
                // 立即放到卫星位置
                const now = new Date();
                const gmst = satellite.gstime(now);
                const pv = satellite.propagate(satrec, now);
                if (pv.position) {
                    const gd = satellite.eciToGeodetic(pv.position, gmst);
                    const r = (1.0 + gd.height / 6371.0) * orbitScaleFactor;
                    const phi = Math.PI / 2 - gd.latitude;
                    const theta = gd.longitude + Math.PI;
                    hlSprite.position.set(
                        -r * Math.sin(phi) * Math.cos(theta),
                        r * Math.cos(phi),
                        r * Math.sin(phi) * Math.sin(theta)
                    );
                }
                selectedSats.set(globalIdx, { orbitLine, constId: cfg.id, sprite: hlSprite, satrec, cfg });
            }

            switchToSatTab();
            updateSatDashboard();
        }

        sceneArea.addEventListener('pointerup', onSatelliteClick);

        // ---------- 10. 仪表盘——全卫星列表（折叠型） ----------
        /** 通过全局索引找到星座配置和卫星数据（使用直接映射表） */
        function findSatelliteByGlobalIdx(globalIdx) {
            const entry = _satMap ? _satMap.get(globalIdx) : null;
            if (!entry) return null;
            const satrec = entry.cfg.satrecs[entry.localIdx];
            return { cfg: entry.cfg, satrec };
        }

        /** 创建一颗卫星的卡片（仅头部 + 空详情体，展开时懒填充） */
        function createSatCard(globalIdx) {
            const info = findSatelliteByGlobalIdx(globalIdx);
            if (!info) return null;
            const { cfg, satrec } = info;
            const name = (satrec.name || 'UNKNOWN').trim();

            const card = document.createElement('div');
            card.className = 'sat-card';
            card.id = 'sat-card-' + globalIdx;
            card.dataset.idx = globalIdx;
            card._bodyPopulated = false;

            // --- 头部 ---
            const header = document.createElement('div');
            header.className = 'sat-card-header';
            header.innerHTML = `
                <button class="sat-card-expand" title="展开详情">▶</button>
                <span class="sat-card-name">🛰️ ${name}</span>
            `;
            const closeBtn = document.createElement('button');
            closeBtn.className = 'sat-card-close';
            closeBtn.title = '取消选中';
            closeBtn.textContent = '×';
            closeBtn.style.display = 'none';
            header.appendChild(closeBtn);
            card.appendChild(header);

            // --- 详情体（空，展开时懒填充） ---
            card.appendChild(document.createElement('div'));
            card.querySelector(':scope > div:last-child').className = 'sat-card-body';

            // --- 展开/折叠 ---
            header.addEventListener('click', (e) => {
                if (e.target.closest('.sat-card-close')) return;
                const wasExpanded = card.classList.contains('expanded');
                if (!wasExpanded) {
                    if (!card._bodyPopulated) {
                        populateSatCardBody(card, globalIdx, cfg, satrec);
                        card._bodyPopulated = true;
                    }
                    card.classList.add('expanded');
                } else {
                    card.classList.remove('expanded');
                }
            });

            // --- × 关闭按钮（取消选中） ---
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (selectedSats.has(globalIdx)) deselectSat(globalIdx);
                card.classList.remove('expanded');
                closeBtn.style.display = 'none';
            });

            return card;
        }

        /** 懒填充卫星详细数据 */
        function populateSatCardBody(card, globalIdx, cfg, satrec) {
            const now = new Date();
            const pv = satellite.propagate(satrec, now);
            if (!pv.position) {
                card.querySelector('.sat-card-body').innerHTML = '<div style="color:#667;font-size:11px;padding:4px;">暂无数据</div>';
                return;
            }
            const gmst = satellite.gstime(now);
            const gd = satellite.eciToGeodetic(pv.position, gmst);
            const alt = gd.height;
            const latDeg = gd.latitude * 180 / Math.PI;
            const lonDeg = gd.longitude * 180 / Math.PI;
            const velKm = pv.velocity ? Math.sqrt(pv.velocity.x**2 + pv.velocity.y**2 + pv.velocity.z**2) : 0;
            const noradId = satrec.satnum;
            const meanMotion = satrec.no_kozai || satrec.no;
            const periodMin = meanMotion ? (2 * Math.PI) / meanMotion : 0;
            const inclDeg = satrec.inclo ? satrec.inclo * 180 / Math.PI : 0;

            const body = card.querySelector('.sat-card-body');
            body.innerHTML = `
                <div class="sat-card-row">
                    <span class="sat-card-label">星座</span>
                    <span class="sat-card-value" style="color:${cfg.color}">${cfg.label}</span>
                </div>
                <div class="sat-card-row"><span class="sat-card-label">NORAD ID</span><span class="sat-card-value">${noradId}</span></div>
                <div class="sat-card-row"><span class="sat-card-label">轨道高度</span><span class="sat-card-value">${alt.toFixed(1)} km</span></div>
                <div class="sat-card-row"><span class="sat-card-label">运行速度</span><span class="sat-card-value">${velKm.toFixed(2)} km/s</span></div>
                <div class="sat-card-row"><span class="sat-card-label">轨道周期</span><span class="sat-card-value">${periodMin.toFixed(1)} min</span></div>
                <div class="sat-card-row"><span class="sat-card-label">轨道倾角</span><span class="sat-card-value">${inclDeg.toFixed(1)}°</span></div>
                <div class="sat-card-row"><span class="sat-card-label">纬度</span><span class="sat-card-value">${latDeg >= 0 ? latDeg.toFixed(2)+'°N' : Math.abs(latDeg).toFixed(2)+'°S'}</span></div>
                <div class="sat-card-row"><span class="sat-card-label">经度</span><span class="sat-card-value">${lonDeg >= 0 ? lonDeg.toFixed(2)+'°E' : Math.abs(lonDeg).toFixed(2)+'°W'}</span></div>
                <div style="display:flex;gap:4px;margin-top:6px">
                    <button class="sat-card-action dlist-btn" data-action="toggle-dlist" data-idx="${globalIdx}" style="flex:1;font-size:10px;background:rgba(68,136,255,0.15);border:1px solid rgba(68,136,255,0.3);color:#6688ff;padding:3px 6px;border-radius:3px;cursor:pointer">加入显示列表</button>
                    <button class="sat-card-action toggle-hide" data-action="toggle-hide" data-idx="${globalIdx}" style="flex:1;font-size:10px;background:rgba(255,68,68,0.15);border:1px solid rgba(255,68,68,0.3);color:#ff6666;padding:3px 6px;border-radius:3px;cursor:pointer">隐藏卫星</button>
                </div>
            `;
            body.querySelectorAll('.sat-card-action').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(e.target.dataset.idx);
                    const action = e.target.dataset.action;
                    const entry = _satMap ? _satMap.get(idx) : null;
                    if (!entry) return;
                    const c = entry.cfg;
                    const localIdx = entry.localIdx;
                    if (localIdx < 0) return;
                    if (action === 'toggle-hide') {
                        const hidden = c._hidden[localIdx];
                        const sel = selectedSats.get(idx);
                        if (hidden) {
                            c._hidden[localIdx] = 0;
                            if (sel) {
                                if (sel.orbitLine) sel.orbitLine.visible = true;
                                if (sel.sprite) sel.sprite.visible = true;
                            }
                            e.target.textContent = '隐藏卫星';
                            e.target.style.color = '#ff6666';
                            e.target.style.borderColor = 'rgba(255,68,68,0.3)';
                            e.target.style.background = 'rgba(255,68,68,0.15)';
                        } else {
                            c._hidden[localIdx] = 1;
                            if (sel) {
                                if (sel.orbitLine) sel.orbitLine.visible = false;
                                if (sel.sprite) sel.sprite.visible = false;
                            }
                            e.target.textContent = '显示卫星';
                            e.target.style.color = '#66ff88';
                            e.target.style.borderColor = 'rgba(68,255,136,0.3)';
                            e.target.style.background = 'rgba(68,255,136,0.15)';
                        }
                    } else if (action === 'toggle-dlist') {
                        // 显示列表模式
                        if (!_listMode) {
                            showToast('请先点击左侧星座选择界面中的<b>全部隐藏</b>按钮');
                            return;
                        }
                        if (_displayList.has(idx)) {
                            _displayList.delete(idx);
                        } else {
                            _displayList.add(idx);
                        }
                        syncDisplayList();
                        updateDisplayListBtns();
                    }
                });
            });
        }

        /** 构建全卫星列表（扁平列表，所有卡片一次创建） */
        function buildAllSatelliteList() {
            const container = document.getElementById('sat-dashboard-list');
            const emptyMsg = document.getElementById('sat-dashboard-empty');
            if (emptyMsg) emptyMsg.style.display = 'none';
            container.innerHTML = '';

            // 初始化卡片引用
            for (const cfg of CONSTELLATIONS) cfg._cards = [];

            const frag = document.createDocumentFragment();
            // 使用 _satMap 顺序创建卡片（确保 ID 与实际卫星一一对应）
            for (let id = 0; id < _totalSats; id++) {
                const entry = _satMap ? _satMap.get(id) : null;
                if (!entry) continue;
                const cfg = entry.cfg;
                const card = createSatCard(id);
                if (card) {
                    cfg._cards.push(card);
                    frag.appendChild(card);
                }
            }
            container.appendChild(frag);

            // 注册搜索过滤
            setupSatSearch();
        }

        /** 卫星搜索过滤 */
        let _searchRegistered = false;
        function setupSatSearch() {
            if (_searchRegistered) return;
            _searchRegistered = true;
            const input = document.getElementById('sat-search-input');
            if (!input) return;
            input.addEventListener('input', () => {
                const q = input.value.trim().toLowerCase();
                const container = document.getElementById('sat-dashboard-list');
                const cards = container.querySelectorAll('.sat-card');
                let visible = 0;
                for (const card of cards) {
                    const nameEl = card.querySelector('.sat-card-name');
                    const name = nameEl ? nameEl.textContent.toLowerCase() : '';
                    const match = !q || name.includes(q);
                    card.style.display = match ? '' : 'none';
                    if (match) visible++;
                }
                const empty = document.getElementById('sat-dashboard-empty');
                if (empty) empty.style.display = visible > 0 ? 'none' : 'block';
            });
        }

        /** 选中/取消选中时：展开/折叠 + 置顶 */
        function updateSatDashboard() {
            if (selectedSats.size === 0) return;

            const container = document.getElementById('sat-dashboard-list');

            // 1. 展开已选中卫星 + 填充详情 + 置顶
            for (const [idx] of selectedSats) {
                const card = document.getElementById('sat-card-' + idx);
                if (!card) continue;

                if (!card._bodyPopulated) {
                    const info = findSatelliteByGlobalIdx(idx);
                    if (info) {
                        populateSatCardBody(card, idx, info.cfg, info.satrec);
                        card._bodyPopulated = true;
                    }
                }
                card.classList.add('expanded');
                const cb = card.querySelector('.sat-card-close');
                if (cb) cb.style.display = '';

                // 置顶
                if (card.parentNode === container) {
                    container.insertBefore(card, container.firstChild);
                }
            }

            // 2. 非选中卫星折叠 + 隐藏 × 按钮
            document.querySelectorAll('.sat-card').forEach(c => {
                const idx = parseInt(c.dataset.idx);
                if (!isNaN(idx) && !selectedSats.has(idx)) {
                    c.classList.remove('expanded');
                    const cb = c.querySelector('.sat-card-close');
                    if (cb) cb.style.display = 'none';
                }
            });

            // 3. 滚动到顶部
            container.scrollTop = 0;
        }

        /** 弹出提示框 */
        function showToast(msg) {
            const old = document.querySelector('.sat-toast');
            if (old) old.remove();
            const div = document.createElement('div');
            div.className = 'sat-toast';
            div.innerHTML = `<p>${msg}</p><button>知道了</button>`;
            div.querySelector('button').addEventListener('click', () => div.remove());
            document.body.appendChild(div);
        }

        /** 同步显示列表 → _hidden 数组 */
        function syncDisplayList() {
            for (const cfg of CONSTELLATIONS) {
                if (!cfg._hidden) continue;
                for (let i = 0; i < cfg.satrecs.length; i++) {
                    const satId = cfg.satrecs[i]._satId;
                    if (_listMode) {
                        cfg._hidden[i] = _displayList.has(satId) ? 0 : 1;
                    } else {
                        cfg._hidden[i] = 0;
                    }
                }
                if (cfg._pointsObj && cfg._pointsObj.geometry.attributes.position) {
                    cfg._pointsObj.geometry.attributes.position.needsUpdate = true;
                }
            }
        }

        /** 更新所有仪表盘卡片的显示列表按钮文字 */
        function updateDisplayListBtns() {
            document.querySelectorAll('.sat-card').forEach(card => {
                const idx = parseInt(card.dataset.idx);
                const btn = card.querySelector('.dlist-btn');
                if (!btn) return;
                if (_displayList.has(idx)) {
                    btn.textContent = '取消显示';
                    btn.style.background = 'rgba(255,136,68,0.2)';
                    btn.style.borderColor = 'rgba(255,136,68,0.3)';
                    btn.style.color = '#ff8844';
                } else {
                    btn.textContent = '加入显示列表';
                    btn.style.background = 'rgba(68,136,255,0.15)';
                    btn.style.borderColor = 'rgba(68,136,255,0.3)';
                    btn.style.color = '#6688ff';
                }
            });
        }

        // ---------- 11. 右侧标签页 ----------
        document.querySelectorAll('.right-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.right-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.right-tab-content').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + btn.dataset.rtab).classList.add('active');
            });
        });

        function switchToSatTab() {
            document.querySelectorAll('.right-tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.right-tab-content').forEach(p => p.classList.remove('active'));
            const tab = document.querySelector('[data-rtab="satdb"]');
            if (tab) tab.classList.add('active');
            const content = document.getElementById('tab-satdb');
            if (content) content.classList.add('active');
        }

        // ====================== 动画循环 ======================
        let lastFrameTime = performance.now();
        let _frameCount = 0;

        function animate() {
            requestAnimationFrame(animate);

            const currentTime = performance.now();
            const frameDeltaTime = (currentTime - lastFrameTime) / 1000;
            lastFrameTime = currentTime;

                // 更新太阳位置 + 地球旋转（每帧从真实 UTC 时间计算，重启不丢失）
            updateSunPosition();

            // 相机环绕
            if (cameraOrbitMode > 0) {
                cameraOrbitAngle += orbitSpeeds[cameraOrbitMode] * frameDeltaTime;

                // 计算相机位置（圆形轨道）
                camera.position.x = cameraOrbitRadius * Math.cos(cameraOrbitAngle);
                camera.position.z = cameraOrbitRadius * Math.sin(cameraOrbitAngle);
                camera.position.y = cameraOrbitHeight;
            }

            // 卫星轨道动画（DEMO 示例卫星）
            updateSatellitePosition();

            // 降低更新频率：每 3 帧更新一次所有卫星位置（减轻低端 GPU 负载）
            _frameCount++;
            if (_frameCount % 3 === 0) {
                updateAllSatPositions(new Date());
            }

            // 更新高亮精灵位置 + 呼吸闪烁
            if (selectedSats.size > 0) {
                const breath = 0.08 + 0.06 * (0.5 + 0.5 * Math.sin(currentTime / 400));
                const now = new Date();
                const gmst = satellite.gstime(now);
                for (const [, sel] of selectedSats) {
                    if (sel.sprite && sel.satrec) {
                        const pv = satellite.propagate(sel.satrec, now);
                        if (pv.position) {
                            const gd = satellite.eciToGeodetic(pv.position, gmst);
                            const r = (1.0 + gd.height / 6371.0) * orbitScaleFactor;
                            const phi = Math.PI / 2 - gd.latitude;
                            const theta = gd.longitude + Math.PI;
                            sel.sprite.position.set(
                                -r * Math.sin(phi) * Math.cos(theta),
                                r * Math.cos(phi),
                                r * Math.sin(phi) * Math.sin(theta)
                            );
                            sel.sprite.scale.set(breath, breath, 1);
                        }
                    }
                    if (sel.orbitLine) sel.orbitLine.rotation.y = earth.rotation.y;
                }
            }

            // 始终更新 OrbitControls，允许用户在环绕时控制视角
            controls.update();

            renderer.render(scene, camera);
        }

        // 窗口自适应
        window.addEventListener('resize', () => {
            const r = document.getElementById('scene-area').getBoundingClientRect();
            const w = r.width;
            const h = r.height;
            if (w > 0 && h > 0) {
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            }
        });

        // 启动应用
        async function startApp() {
            // TEC 插值器已在声明时初始化，无需加载 GloTEC 数据

            // 初始化星座系统
            await initSatelliteSystem();

            // 加载预计算数据（动画已在底部启动）
            await loadData();

            console.log('[Info] 应用启动完成');
        }

        // 控制面板展开/收起（与星座面板相同逻辑）
        function toggleControlsPanel() {
            const wrapper = document.getElementById('controls-wrapper');
            const box = document.getElementById('controls');
            const toggle = document.getElementById('controlsToggle');
            if (!wrapper || !box || !toggle) return;
            if (wrapper._state === 'collapsed') {
                // 展开：恢复到初始位置
                wrapper.style.left = (wrapper._expandLeft || 15) + 'px';
                wrapper._state = 'expanded';
                toggle.textContent = '▶';
            } else {
                // 收起：测量 controls 宽度，左移使 toggle 按钮刚好贴在右边界
                const w = box.offsetWidth;
                wrapper._expandLeft = wrapper.offsetLeft;
                wrapper.style.left = (wrapper._expandLeft - w - 4) + 'px';
                wrapper._state = 'collapsed';
                toggle.textContent = '◀';
            }
        }

        // 注册控制面板收起/展开按钮点击事件
        (function initControlsToggle() {
            const toggleBtn = document.getElementById('controlsToggle');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', toggleControlsPanel);
            }
        })();

        startApp();

        // 延迟启动动画，确保布局完成
        window.addEventListener('load', () => {
            const r = document.getElementById('scene-area').getBoundingClientRect();
            const w = r.width;
            const h = r.height;
            if (w > 0 && h > 0) {
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            }
            updateSunPosition();
            animate();
        });

    </script>
</body>
