    <script src="three.min.js"></script>
    <script src="OrbitControls.js"></script>
    <script src="satellite.min.js"></script>

    <script>
        // ====================== Three.js 场景初始化 ======================
        const sceneArea = document.getElementById('scene-area');
        const sceneAreaRect = sceneArea.getBoundingClientRect();
        const containerWidth = sceneAreaRect.width || window.innerWidth * 0.65;
        const containerHeight = sceneAreaRect.height || window.innerHeight - 36;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, containerWidth / containerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(containerWidth, containerHeight);
        renderer.setPixelRatio(1);
        sceneArea.insertBefore(renderer.domElement, sceneArea.firstChild);
        renderer.domElement.style.display = 'block';

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;

        // ====================== 光源 ======================
        // 基础环境光 — 极微弱，仅让背光面不至于全黑
        const ambientLight = new THREE.AmbientLight(0x224466, 0.08);
        scene.add(ambientLight);

        // 天球光 — 微弱方向渐变，让阴影区有深蓝层次
        const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x001133, 0.2);
        scene.add(hemiLight);

        // 太阳光 — 强平行光，向阳面明亮
        const sunLight = new THREE.DirectionalLight(0xffffff, 2.0);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // ====================== 地球 ======================
        const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
        const textureLoader = new THREE.TextureLoader();

        // 生成一个简易程序化等距柱状地球纹理（作为兜底，永远不会黑）
        function createFallbackEarthTexture() {
            const c = document.createElement('canvas');
            c.width = 1024; c.height = 512;
            const ctx = c.getContext('2d');
            // 深蓝色海洋
            const grad = ctx.createLinearGradient(0, 0, 0, 512);
            grad.addColorStop(0, '#1a3a5c');   // 北极
            grad.addColorStop(0.5, '#1a5276'); // 赤道
            grad.addColorStop(1, '#1a3a5c');   // 南极
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1024, 512);
            // 简单的经线/纬线网格，标示这是地图
            ctx.strokeStyle = 'rgba(100,180,255,0.15)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= 1024; x += 1024/24) { // 每15度经线
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke();
            }
            for (let y = 0; y <= 512; y += 512/12) { // 每15度纬线
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(1024, y); ctx.stroke();
            }
            // 赤道加粗
            ctx.strokeStyle = 'rgba(100,200,255,0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(0, 256); ctx.lineTo(1024, 256); ctx.stroke();
            // 大陆轮廓（简化为一些色块区域，便于肉眼识别地图方向）
            ctx.fillStyle = 'rgba(60,140,60,0.4)';
            // 模拟欧亚大陆
            ctx.fillRect(480, 140, 200, 80);
            ctx.fillRect(560, 120, 80, 30);
            // 模拟非洲
            ctx.fillRect(490, 240, 50, 80);
            // 模拟北美
            ctx.fillRect(200, 120, 80, 60);
            // 模拟南美
            ctx.fillRect(250, 240, 30, 80);
            // 模拟澳洲
            ctx.fillRect(780, 300, 30, 25);
            // 模拟南极
            ctx.fillStyle = 'rgba(200,220,255,0.3)';
            ctx.fillRect(0, 490, 1024, 22);
            const tex = new THREE.CanvasTexture(c);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.ClampToEdgeWrapping;
            return tex;
        }

        const fallbackTex = createFallbackEarthTexture();
        const earthMaterial = new THREE.MeshPhongMaterial({
            map: fallbackTex,
            shininess: 0,
            specular: new THREE.Color(0x000000)
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // 异步加载真实地球纹理：先尝试 Three.js 官方 CDN（标准等距柱状图），失败则回退本地文件
        (async function loadRealEarthTex() {
            const tryLoad = (url) => new Promise((resolve) => {
                textureLoader.load(url, (tex) => resolve(tex), undefined, () => resolve(null));
            });
            let realTex = await tryLoad('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
            if (!realTex) {
                console.warn('[Earth] CDN 纹理加载失败，尝试本地文件');
                realTex = await tryLoad('textures/earth_atmos_2048.jpg');
            }
            if (realTex) {
                console.log('[Earth] 真实地球纹理加载成功');
                earthMaterial.map = realTex;
                earthMaterial.needsUpdate = true;
            } else {
                console.warn('[Earth] 所有纹理加载失败，使用程序化兜底纹理');
            }
        })();

        // 大气层光晕
        const atmosphereGeometry = new THREE.SphereGeometry(1.02, 64, 64);
        const atmosphereMaterial = new THREE.MeshPhongMaterial({
            color: 0x4488ff,
            transparent: true,
            opacity: 0.08,
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending
        });
        const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
        scene.add(atmosphere);

        // ====================== 云层系统（程序化+真实卫星云图双重保障） ======================
        // 策略:
        //   1. 立即生成程序化云纹理（保证始终有云可见）
        //   2. 异步尝试加载CDN真实卫星云图（加载成功后替换）
        //   3. 异步获取Open-Meteo密度数据叠加（增强动态感）
        const cloudSystem = {
            enabled: false,
            sphere: null,
            material: null,
            texture: null,
            canvas: null,
            ctx: null,
            updateIntervalMs: 60 * 60 * 1000,
            lastUpdateTime: null,
            isLoading: false,
            hasRealData: false,
            gridLats: [],
            gridLons: []
        };

        for (let lat = -85; lat <= 85; lat += 10) cloudSystem.gridLats.push(lat);
        for (let lon = -180; lon < 180; lon += 10) cloudSystem.gridLons.push(lon);

        // ============ 核心：程序化云纹理（高密度厚重云层） ============
        // 设计目标: 覆盖全球60%+面积，alpha均值120+，边缘清晰
        function generateCloudTexture() {
            const canvas = cloudSystem.canvas;
            if (!canvas) return;
            const ctx = cloudSystem.ctx;
            const w = canvas.width, h = canvas.height;
            const imageData = ctx.createImageData(w, h);
            const pixels = imageData.data;

            // 8层噪声，振幅总和=1.80，平均噪声≈0.90
            const octaves = [
                {fl:0.007, fo:0.006, amp:0.36, ph:0},
                {fl:0.013, fo:0.012, amp:0.32, ph:1.8},
                {fl:0.022, fo:0.020, amp:0.26, ph:3.5},
                {fl:0.035, fo:0.032, amp:0.22, ph:5.2},
                {fl:0.050, fo:0.045, amp:0.18, ph:7.0},
                {fl:0.070, fo:0.062, amp:0.14, ph:9.0},
                {fl:0.010, fo:0.025, amp:0.20, ph:2.2},
                {fl:0.040, fo:0.055, amp:0.12, ph:6.5}
            ];

            for (let py = 0; py < h; py++) {
                const lat = 90 - (py / h) * 180;
                const absLat = Math.abs(lat);
                // 气候因子：大幅放宽限制，极地也不削减太多
                const itcz = Math.exp(-Math.pow(lat / 20, 2));
                const storm = Math.exp(-Math.pow((absLat - 52) / 14, 2));
                const polar = absLat > 70 ? Math.max(0.5, 1 - (absLat - 70) / 25) : 1;
                const latFactor = Math.max(0.40, itcz * 0.50 + storm * 0.50) * polar;

                for (let px = 0; px < w; px++) {
                    const lon = (px / w) * 360 - 180;

                    // 域扭曲：双频高振幅扭曲，产生有机漩涡
                    const warp = Math.sin(lat * 0.006 + lon * 0.005) * 2.5 +
                                 Math.sin(lat * 0.012 + lon * 0.010 + 2.0) * 1.5;
                    const wLat = lat + warp * 0.40;
                    const wLon = lon + warp * 0.40;

                    // 8层噪声叠加（无循环展开，保持代码简洁）
                    let value = 0;
                    for (let o = 0; o < octaves.length; o++) {
                        const oc = octaves[o];
                        value += oc.amp * (Math.sin(wLat * oc.fl + wLon * oc.fo + oc.ph) * 0.5 + 0.5);
                    }
                    // value 现在在 [0, 1.60] 范围

                    // 应用气候因子
                    value *= latFactor;

                    // ====== 极低阈值 + 高亮度映射 ======
                    // 阈值低至0.02，几乎所有像素都保留
                    const th = 0.02 + (1 - latFactor) * 0.04;
                    if (value < th) {
                        // 阈值以下：线性淡入到0.20
                        value = (value / Math.max(th, 0.001)) * 0.20;
                    } else {
                        // 阈值以上：线性映射到[0.20, 1.0]并用pow<1大幅增亮
                        const t = (value - th) / Math.max(1 - th, 0.001);
                        value = 0.20 + t * 0.80;
                        // pow(0.72) 使中间值显著变亮（0.5→0.61）
                        value = Math.pow(value, 0.72);
                    }

                    // 高频毛绒细节（在所有可见云区域叠加）
                    if (value > 0.08) {
                        const f1 = Math.sin(wLat * 0.12 + wLon * 0.10 + 11.0) * 0.5 + 0.5;
                        const f2 = Math.sin(wLat * 0.18 + wLon * 0.15 + 15.0) * 0.5 + 0.5;
                        const f3 = Math.sin(wLat * 0.25 + wLon * 0.22 + 20.0) * 0.5 + 0.5;
                        const detailBoost = (f1 * 0.40 + f2 * 0.30 + f3 * 0.30) * 0.15;
                        value += detailBoost * Math.min(value * 2.0, 1.0);
                    }

                    value = Math.max(0, Math.min(1, value));

                    const idx = (py * w + px) * 4;
                    pixels[idx] = 255;
                    pixels[idx + 1] = 255;
                    pixels[idx + 2] = 255;
                    pixels[idx + 3] = Math.floor(value * 255);
                }
            }
            ctx.putImageData(imageData, 0, 0);
            cloudSystem.texture.needsUpdate = true;
            if (cloudSystem.material) {
                cloudSystem.material.map = cloudSystem.texture;
                cloudSystem.material.needsUpdate = true;
            }
            console.log('[Cloud] ✅ 程序化云纹理已生成');
        }

        // ============ 增强：尝试加载CDN真实卫星云图纹理 ============
        function tryLoadRealCloudTexture() {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            let timedOut = false;
            const timer = setTimeout(() => { timedOut = true; }, 8000);

            img.onload = () => {
                clearTimeout(timer);
                if (timedOut) return;
                try {
                    const canvas = cloudSystem.canvas;
                    const ctx = cloudSystem.ctx;
                    // 直接覆盖画布
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    cloudSystem.texture.needsUpdate = true;
                    if (cloudSystem.material) {
                        cloudSystem.material.map = cloudSystem.texture;
                        cloudSystem.material.needsUpdate = true;
                    }
                    cloudSystem._cdnLoaded = true;
                    console.log('[Cloud] ✅ CDN真实卫星云图已覆盖');
                    updateCloudStatus('☁️ 真实卫星云图 · 获取实时密度中...');
                    // 纹理加载成功后再获取密度数据
                    setTimeout(() => fetchCloudDensity(), 300);
                } catch(e) {
                    console.warn('[Cloud] CDN纹理绘制失败:', e.message);
                }
            };
            // 两个备选URL
            const urls = [
                'https://threejs.org/examples/textures/planets/earth_clouds_1024.png',
                'https://threejs.org/examples/textures/planets/cloud_1024.png'
            ];
            let urlIndex = 0;
            img.onerror = () => {
                urlIndex++;
                if (urlIndex < urls.length) {
                    img.src = urls[urlIndex];
                } else {
                    clearTimeout(timer);
                    console.warn('[Cloud] 所有CDN纹理均不可达');
                    updateCloudStatus('☁️ 程序化云图 · 获取实时密度中...');
                    setTimeout(() => fetchCloudDensity(), 300);
                }
            };
            img.src = urls[0];
        }

        // ============ 从 Open-Meteo 获取云密度数据并叠加 ============
        async function fetchCloudDensity() {
            // 防止同时多次请求
            if (cloudSystem.isLoading) return;
            const now = Date.now();
            const lastFetch = cloudSystem._lastFetchTime || 0;
            if (now - lastFetch < 60000) return; // 至少间隔60秒
            cloudSystem.isLoading = true;
            cloudSystem._lastFetchTime = now;

            updateCloudStatus(cloudSystem._cdnLoaded
                ? '☁️ 真实卫星云图 · 获取实时密度...'
                : '☁️ 程序化云图 · 获取实时密度...');

            try {
                const allLatList = [], allLonList = [];
                for (let i = 0; i < cloudSystem.gridLats.length; i++)
                    for (let j = 0; j < cloudSystem.gridLons.length; j++) {
                        allLatList.push(cloudSystem.gridLats[i]);
                        allLonList.push(cloudSystem.gridLons[j]);
                    }

                const latStr = allLatList.join(',');
                const lonStr = allLonList.join(',');
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${latStr}&longitude=${lonStr}&hourly=cloud_cover&forecast_hours=1&timezone=UTC`;

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                const resp = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!resp.ok) {
                    if (resp.status === 429) {
                        updateCloudStatus('☁️ API限流，1分钟后重试...');
                        cloudSystem.isLoading = false;
                        setTimeout(() => fetchCloudDensity(), 60000);
                        return;
                    }
                    throw new Error(`HTTP ${resp.status}`);
                }

                const data = await resp.json();
                const results = Array.isArray(data) ? data : (data?.latitude !== undefined ? [data] : []);
                if (results.length === 0) throw new Error('无数据');

                // 构建网格查询表
                const cloudGrid = {};
                for (const item of results) {
                    const lat = Math.round((typeof item.latitude === 'number' ? item.latitude : parseFloat(item.latitude)) / 10) * 10;
                    const lon = Math.round((typeof item.longitude === 'number' ? item.longitude : parseFloat(item.longitude)) / 10) * 10;
                    if (!isNaN(lat) && !isNaN(lon)) {
                        cloudGrid[`${lat}_${lon}`] = item.hourly?.cloud_cover?.[0] ?? 50;
                    }
                }

                // 叠加密度到画布纹理
                applyDensityOverlay(cloudGrid);
                cloudSystem.hasRealData = true;
                cloudSystem.lastUpdateTime = new Date();
                const ts = formatTimeForStatus(cloudSystem.lastUpdateTime);
                console.log(`[Cloud] ✅ 云密度数据更新: ${ts}`);
                updateCloudStatus(cloudSystem._cdnLoaded
                    ? `☁️ 真实云图 · ${ts} · 每小时更新`
                    : `☁️ 程序化云图 · ${ts} · 每小时更新`);

            } catch (e) {
                console.warn('[Cloud] 获取云密度失败:', e.message);
                if (cloudSystem.lastUpdateTime) {
                    updateCloudStatus(cloudSystem._cdnLoaded
                        ? `☁️ 真实云图 · ${formatTimeForStatus(cloudSystem.lastUpdateTime)}`
                        : `☁️ 程序化云图 · ${formatTimeForStatus(cloudSystem.lastUpdateTime)}`);
                } else {
                    updateCloudStatus(cloudSystem._cdnLoaded ? '☁️ 真实卫星云图' : '☁️ 程序化云图');
                }
            } finally {
                cloudSystem.isLoading = false;
            }
        }

        // 叠加密度：在现有纹理的基础上调整透明度
        function applyDensityOverlay(cloudGrid) {
            const canvas = cloudSystem.canvas;
            if (!canvas) return;
            const ctx = cloudSystem.ctx;
            const w = canvas.width, h = canvas.height;
            let imageData;
            try {
                imageData = ctx.getImageData(0, 0, w, h);
            } catch(e) {
                console.warn('[Cloud] 无法读取画布像素:', e.message);
                return;
            }
            const pixels = imageData.data;
            const lats = cloudSystem.gridLats;
            const lons = cloudSystem.gridLons;

            for (let py = 0; py < h; py++) {
                const lat = 90 - (py / h) * 180;
                for (let px = 0; px < w; px++) {
                    const lon = (px / w) * 360 - 180;
                    const idx = (py * w + px) * 4;

                    // 查找最近的网格点（简化版双线性插值）
                    let latIdx = 0;
                    for (let i = 0; i < lats.length - 1; i++) {
                        if (lat >= lats[i] && lat <= lats[i + 1]) { latIdx = i; break; }
                    }
                    let lonIdx = 0;
                    for (let j = 0; j < lons.length - 1; j++) {
                        if (lon >= lons[j] && lon <= lons[j + 1]) { lonIdx = j; break; }
                    }

                    const gl = (lt, ln) => cloudGrid[`${Math.round(lt/10)*10}_${Math.round(ln/10)*10}`] ?? 50;
                    const lat0 = lats[latIdx], lat1 = lats[Math.min(latIdx+1, lats.length-1)];
                    const lon0 = lons[lonIdx], lon1 = lons[(lonIdx+1) % lons.length];
                    const v00 = gl(lat0,lon0), v10 = gl(lat1,lon0), v01 = gl(lat0,lon1), v11 = gl(lat1,lon1);
                    const tx = ((lon - lon0 + 360) % 360) / ((lon1 - lon0 + 360) % 360 || 1);
                    const ty = (lat - lat0) / (lat1 - lat0 || 1);
                    let density = v00*(1-tx)*(1-ty) + v10*(1-tx)*ty + v01*tx*(1-ty) + v11*tx*ty;
                    density = Math.max(0, Math.min(100, density)) / 100;

                    // 用密度调整透明度：density=0 → 半透明，density=1 → 保持原样
                    const factor = 0.4 + density * 0.6;
                    pixels[idx + 3] = Math.min(255, Math.floor(pixels[idx + 3] * factor));
                }
            }

            ctx.putImageData(imageData, 0, 0);
            cloudSystem.texture.needsUpdate = true;
            if (cloudSystem.material) {
                cloudSystem.material.map = cloudSystem.texture;
                cloudSystem.material.needsUpdate = true;
            }
        }

        // 用 Canvas 生成星点纹理（带柔边）
        function makeStarTexture(size, feather) {
            const c = document.createElement('canvas');

            const half = size / 2;
            const grad = ctx.createRadialGradient(half, 0, half, half, half, half);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(feather, 'rgba(255,255,255,0.5)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            const tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        // ====================== 颜色映射（备用） ======================
        function errorToColor(error) {
            const t = Math.min(error / 15, 1);
            const color = new THREE.Color();
            // jet colormap: 蓝→青→绿→黄→红
            if (t < 0.25) { color.setRGB(0, t * 4, 1);
            } else if (t < 0.5) { color.setRGB(0, 1, 1 - (t - 0.25) * 4);
            } else if (t < 0.75) { color.setRGB((t - 0.5) * 4, 1, 0);

        // ====================== JavaScript 误差计算引擎 ======================
        // 基于 navigation_error_calculator.py 的算法

        const R_EARTH = 6371000;  // 地球半径 (m)
        const GRAVITY = 6.67430e-11;
        const M_EARTH = 5.972e24;
        const OMEGA_EARTH = 7.2921159e-5;

        // 大气密度模型
        function atmosphericDensity(h_km, F10_7 = 150, Ap = 10) {
            let H, rho0;
            if (h_km < 300) {
                H = 35 + 0.05 * (h_km - 100);
                rho0 = 1.0e-10;
                return rho0 * Math.exp(-(h_km - 100) / H) *
                    (1.0 + 0.3 * (F10_7 - 70) / 180.0) *
                    (1.0 + 0.2 * Math.max(0, Ap - 4) / 30.0);
            } else if (h_km < 500) {
                H = 45 + 0.05 * (h_km - 300);
                rho0 = 2.0e-12;
            } else {
                H = 55 + 0.08 * (h_km - 500);
                rho0 = 2.0e-12 * Math.exp(-(500 - 300) / 45);
            }
            const solar_factor = 1.0 + 0.3 * (F10_7 - 70) / 180.0;
            const geomag_factor = 1.0 + 0.2 * Math.max(0, Ap - 4) / 30.0;
            return rho0 * Math.exp(-(h_km - 300) / H) * solar_factor * geomag_factor;
        }

        // 轨道速度
        function orbitVelocity(h_m) {
            const r = R_EARTH + h_m;
            return Math.sqrt(GRAVITY * M_EARTH / r);
        }

        // 导航误差计算类
        class NavigationErrorBudget {
            constructor(h_km, inc_deg = 45, mass = 80, Cd = 2.2, A_drag = 0.08, A_srp = 0.5) {
                this.h = h_km;
                this.inc = inc_deg * Math.PI / 180;
                this.mass = mass;
                this.Cd = Cd;
                this.A_drag = A_drag;
                this.A_srp = A_srp;
                this.r = R_EARTH + h_km * 1000;
                this.v = orbitVelocity(this.r);
                this.n = Math.sqrt(GRAVITY * M_EARTH / Math.pow(this.r, 3));
                const n_max = 70;
                this.gravity_model_error = 0.02 * Math.pow(R_EARTH / this.r, n_max - 10);
            }

            atmosphericDragError() {
                const base_along = 3.0;
                const height_factor = this.h < 1000 ? Math.min(Math.pow(500 / this.h, 1.5), 4.0) : 0.5;
                const solar_factor = 1 + 0.2 * (150 - 70) / 180;
                const along = base_along * height_factor * solar_factor;
                return { radial: along * 0.4, along: along, cross: along * 0.5 };
            }

            solarRadiationError() {
                const factor = (this.A_srp / this.mass) / 0.01;
                const base = 1.5;
                return { radial: base * factor, cross: base * factor * 0.8, along: base * factor * 0.3 };
            }

            gravityModelError() {
                const radial = this.gravity_model_error * 100;
                return { radial: radial, along: radial * 2.0, cross: radial * 1.5 };
            }

            gnssNoiseError(lat_deg) {
                const lat = lat_deg * Math.PI / 180;
                const base = 0.3;
                const gdop = 1.0 + 0.3 * Math.abs(Math.sin(lat));
                const vis = 1.0 - 0.2 * Math.abs(Math.sin(lat));
                return base * gdop / vis;
            }

            getNonIono3DError(lat_deg) {
                const drag = this.atmosphericDragError();
                const srp = this.solarRadiationError();
                const grav = this.gravityModelError();
                const gnss = this.gnssNoiseError(lat_deg);
                const radial = Math.sqrt(drag.radial ** 2 + srp.radial ** 2 + grav.radial ** 2 + gnss ** 2);
                const along = Math.sqrt(drag.along ** 2 + srp.along ** 2 + grav.along ** 2 + gnss ** 2);
                const cross = Math.sqrt(drag.cross ** 2 + srp.cross ** 2 + grav.cross ** 2 + gnss ** 2);
                return Math.sqrt(radial ** 2 + along ** 2 + cross ** 2);
            }
        }

        // 电离层残余误差
        function ionoResidualFromVtec(vtec, elevation_deg = 90) {
            if (isNaN(vtec) || vtec === null) return 0.0;
            const slant_factor = 1.0 / Math.sin(elevation_deg * Math.PI / 180);
            return 0.10 * vtec * slant_factor;
        }

        // TEC 插值器（使用纬度依赖模型，不再依赖外部 GloTEC 数据）
        let tecInterpolator = {
            getVtec: function(lat, lon) {
                const latRad = lat * Math.PI / 180;
                const baseTec = 30 + 30 * Math.pow(Math.cos(latRad), 2);
                const lonRad = lon * Math.PI / 180;
                const variation = 10 * Math.sin(2 * lonRad) * Math.cos(latRad);
                return Math.max(5, baseTec + variation);
            }
        };
        console.log('[Info] 使用默认 TEC 模型（GloTEC 数据已移除）');

        // 计算指定高度的全球误差网格
        function calculateErrorGrid(height_km, latCount = 30, lonCount = 60) {
            const budget = new NavigationErrorBudget(height_km);
            const lats = [];
            const lons = [];
            const errors = [];

            for (let i = 0; i < latCount; i++) {
                const lat = -90 + (180 * i) / (latCount - 1);
                lats.push(lat);
            }
            for (let j = 0; j < lonCount; j++) {
                const lon = -180 + (360 * j) / (lonCount - 1);
                lons.push(lon);
            }

            for (let i = 0; i < latCount; i++) {
                errors[i] = [];
                for (let j = 0; j < lonCount; j++) {
                    const lat = lats[i];
                    const lon = lons[j];
                    const nonIonoErr = budget.getNonIono3DError(lat);
                    const vtec = tecInterpolator ? tecInterpolator.getVtec(lat, lon) : 30;
                    const ionoErr = ionoResidualFromVtec(vtec);
                    const totalErr = Math.min(Math.sqrt(nonIonoErr ** 2 + ionoErr ** 2), 15.0);
                    errors[i][j] = totalErr;
                }
            }

            return { lats, lons, errors, height_km };
        }

        // 生成 3D 热力图数据点
        function generate3DHeatmapData(errorGrid) {
            const points = [];
            const { lats, lons, errors, height_km } = errorGrid;

            for (let i = 0; i < lats.length; i++) {
                for (let j = 0; j < lons.length; j++) {
                    const lat = lats[i];
                    const lon = lons[j];
                    const error = errors[i][j];

                    // 经纬度 → 3D球面坐标
                    const phi = (90 - lat) * Math.PI / 180;
                    const theta = (lon + 180) * Math.PI / 180;
                    const r = 1.0 + error / 100;

                    points.push({
                        lat: lat,
                        lon: lon,
                        error: error,
                        vtec: tecInterpolator ? tecInterpolator.getVtec(lat, lon) : 30,
                        x: -r * Math.sin(phi) * Math.cos(theta),
                        y: r * Math.cos(phi),
                        z: r * Math.sin(phi) * Math.sin(theta),
                        height: height_km
                    });
                }
            }

            return {
                orbit_height_km: height_km,
                points: points
            };
        }

        // 初始化（TEC 插值器已内联初始化，无需同步加载）
        console.log('[Info] TEC 数据初始化完成（GloTEC 已移除）');

        // ====================== 交互控制 ======================

        // 相机环绕功能
        let cameraOrbitMode = 0; // 0: 停止, 1: 一档(60秒), 2: 二档(30秒)
        let cameraOrbitAngle = 0;
        const cameraOrbitRadius = 3;  // 相机到地球的距离
        const cameraOrbitHeight = 1.5; // 相机高度

        // 速度档位: 每秒转动的角度（弧度）
        const orbitSpeeds = [
            0,                          // 0档: 停止
            (2 * Math.PI) / 60,        // 1档: 60秒一圈
            (2 * Math.PI) / 30         // 2档: 30秒一圈
        ];

        const orbitModeTexts = [
            '相机环绕',        // 0档
            '环绕×1',  // 1档

        // ====================== 真实时间与地球自转 ======================
        // 计算太阳位置（基于真实时间）
        function updateSunPosition() {
            const now = new Date();
            // 北京时间（本地时间）
            const localHours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
            // UTC = 北京时间 - 8
            const utcHours = localHours - 8;

            // 更新时间显示（北京时间 和 UTC）
            const beijingTimeStr = now.getHours().toString().padStart(2, '0') + ':' +
                                   now.getMinutes().toString().padStart(2, '0') + ':' +
                                   now.getSeconds().toString().padStart(2, '0');
            const utcH = ((now.getHours() - 8) % 24 + 24) % 24;
            const utcTimeStr = utcH.toString().padStart(2, '0') + ':' +
                               now.getMinutes().toString().padStart(2, '0') + ':' +
                               now.getSeconds().toString().padStart(2, '0');

            const utcEl = document.getElementById('utcTime');
            const beijingEl = document.getElementById('beijingTime');
            if (utcEl) utcEl.textContent = utcTimeStr;
            if (beijingEl) beijingEl.textContent = beijingTimeStr;

            // 太阳位置基于UTC时间，考虑时差方程（Equation of Time）
            const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
            const gamma = 2 * Math.PI * (dayOfYear - 1) / 365;
            // 时差方程（分钟），经典 Spencer 公式
            const equationOfTime = 229.18 * (0.000075 + 0.001868 * Math.cos(gamma)
                - 0.032077 * Math.sin(gamma) - 0.014615 * Math.cos(2 * gamma) - 0.040849 * Math.sin(2 * gamma));
            // 太阳时 = UTC + 时差方程（转换为小时）
            const solarHours = utcHours + equationOfTime / 60;
            // 太阳时角：每小时15度，12:00太阳时为0（太阳在子午线正上方）
            const sunAngle = (solarHours - 12) * (Math.PI / 12);

            // 太阳距离（用于场景）
            const sunDistance = 5;

            // 太阳赤纬（declination）：δ = 23.44° × sin(360°/365 × (dayOfYear - 81))
            const declination = 23.44 * Math.sin(2 * Math.PI * (dayOfYear - 81) / 365) * Math.PI / 180;
            const cosDec = Math.cos(declination);
            const sinDec = Math.sin(declination);

            // 太阳位置：时角 → XZ 方位，赤纬 → Y 高度
            sunLight.position.set(
                sunDistance * cosDec * Math.cos(sunAngle),
                sunDistance * sinDec,
                sunDistance * cosDec * Math.sin(sunAngle)
            );

            // 地球纹理默认朝向已正确（u=0.5=0°经线在 +x 方向）
            // 太阳灯光位置变化已正确创建晨昏线，无需旋转地球网格

            return sunAngle;
        }

        // ====================== 卫星轨道系统 ======================

        // 轨道参数（可被衰减计算更新）
        let ORBIT_RADIUS = 1.3;        // 轨道半径（地球=1）
        let ORBIT_INCLINATION = 45;     // 轨道倾角（度）
        const ORBIT_SPEED = 0.5;        // 轨道角速度
        let isOrbitExpanded = false;    // LEO展开视图模式

        // 获取当前显示半径

            return ORBIT_RADIUS * orbitScaleFactor;

        // 轨道高度 → 3D半径（地球=1）

        // 创建轨道线
        function createOrbitPath() {
            if (satelliteOrbit) {
                scene.remove(satelliteOrbit);
                satelliteOrbit.geometry.dispose();
                satelliteOrbit.material.dispose();
            }

            const points = [];
            const segments = 128;
            const inc = THREE.MathUtils.degToRad(ORBIT_INCLINATION);
            const displayRadius = getDisplayRadius();

            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const x = Math.cos(angle) * displayRadius;
                const y = Math.sin(angle) * displayRadius * Math.sin(inc);
                const z = Math.sin(angle) * displayRadius * Math.cos(inc);
                points.push(new THREE.Vector3(x, y, z));
            }

            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({
                color: 0x00ffff, transparent: true, opacity: 0.6
            });
            satelliteOrbit = new THREE.Line(geometry, material);
            satelliteOrbit.visible = true;
            scene.add(satelliteOrbit);
        }

            const panelMat = new THREE.MeshBasicMaterial({ color: 0x2244aa, transparent: true, opacity: 0.8 });
            const panel1 = new THREE.Mesh(panelGeo, panelMat);
            panel1.position.y = 0.015;
            const panel2 = new THREE.Mesh(panelGeo, panelMat);
            panel2.position.y = -0.015;
            body.add(panel1);
            body.add(panel2);

            // 发光效果
            const glowGeo = new THREE.SphereGeometry(0.03, 16, 16);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.5 });
            body.add(new THREE.Mesh(glowGeo, glowMat));

            satelliteBody = body;
            scene.add(satelliteBody);
        }

        // 卫星动画
        let orbitAngle = 0;

        function updateSatellitePosition() {
            if (!satelliteBody) return;
            const inc = THREE.MathUtils.degToRad(ORBIT_INCLINATION);
            const displayRadius = getDisplayRadius();

            orbitAngle += ORBIT_SPEED * 0.01;
            const x = Math.cos(orbitAngle) * displayRadius;
            const y = Math.sin(orbitAngle) * displayRadius * Math.sin(inc);
            const z = Math.sin(orbitAngle) * displayRadius * Math.cos(inc);
            satelliteBody.position.set(x, y, z);

            const nextAngle = orbitAngle + 0.01;
            satelliteBody.lookAt(
                Math.cos(nextAngle) * displayRadius,
                Math.sin(nextAngle) * displayRadius * Math.sin(inc),
                Math.sin(nextAngle) * displayRadius * Math.cos(inc)
            );
        }

        // 创建各星座圆点纹理（不同颜色）
        function createConstellationDotTexture(color) {
            const c = document.createElement('canvas');
            c.width = 32; c.height = 32;
            const ctx = c.getContext('2d');
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(16, 16, 10, 0, Math.PI * 2);
            ctx.fill();
            // 光晕效果
            const grad = ctx.createRadialGradient(16, 16, 4, 16, 16, 16);
            grad.addColorStop(0, color);
            grad.addColorStop(0.5, color + '88');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(16, 16, 16, 0, Math.PI * 2);
            ctx.fill();
            const tex = new THREE.CanvasTexture(c);
            tex.needsUpdate = true;
            return tex;
        }

        // 从 Celestrak 获取 TLE（通过 Android 桥接）
        async function fetchTLE(name) {
            if (window.AndroidBridge && AndroidBridge['get' + name + 'TLE']) {
                try {
                    const raw = AndroidBridge['get' + name + 'TLE']();
                    if (raw && raw.startsWith(name)) {
                        console.log(`[${name}] 通过 Android 桥接获取 TLE 数据`);
                        return raw;
                    }
                } catch (e) {
                    console.warn(`[${name}] Android 桥接获取失败:`, e);
                }
            }
            try {
                const resp = await fetch(`https://celestrak.org/NORAD/elements/gp.php?NAME=${name}&FORMAT=tle`);
                if (resp.ok) {
                    const text = await resp.text();
                    if (text.startsWith(name)) return text;
                }
            } catch (e) {
                console.warn(`[${name}] 直接 fetch 失败:`, e);
            }
            return null;
        }

        // 解析 TLE 文本为 satrec 数组
        function parseTLE(tleText) {
            const lines = tleText.trim().split('\n').map(l => l.trimEnd());
            const satrecs = [];
            for (let i = 0; i < lines.length - 2; i += 3) {
                const name = lines[i];
                const line1 = lines[i + 1];
                const line2 = lines[i + 2];
                if (line1 && line1.startsWith('1 ') && line2 && line2.startsWith('2 ')) {
                    try {
                        const satrec = satellite.twoline2satrec(line1, line2);
                        satrec.name = name;
                        satrecs.push(satrec);
                    } catch (e) { /* 跳过解析失败的 */ }
                }
            }
            return satrecs;
        }

        // 为某个星座创建 Sprite 群组（基于其配置）
        function createConstellationSprites(cfg) {
            if (!cfg.dotTexture) cfg.dotTexture = createConstellationDotTexture(cfg.color);
            const group = new THREE.Group();
            const sprites = [];
            const material = new THREE.SpriteMaterial({
                map: cfg.dotTexture,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
            for (let i = 0; i < cfg.satrecs.length; i++) {
                const sprite = new THREE.Sprite(material.clone());
                sprite.scale.set(0.03, 0.03, 1);
                sprite.userData.satIndex = i;
                sprite.userData.constId = cfg.id;
                sprite.userData.selected = false;
                sprite.position.set(9999, 9999, 9999);
                group.add(sprite);
                sprites.push(sprite);
            }
            group.rotation.y = earth.rotation.y;
            return { group, sprites };
        }

        // 更新某星座所有卫星位置（每帧调用）
        function updateConstellationPositions(cfg, now) {
            if (!cfg.visible || !cfg.sprites.length || !cfg.satrecs.length) return;
            const gmst = satellite.gstime(now);
            for (let i = 0; i < cfg.satrecs.length; i++) {
                const satrec = cfg.satrecs[i];
                const sprite = cfg.sprites[i];
                const posVel = satellite.propagate(satrec, now);
                if (posVel.position) {
                    const gd = satellite.eciToGeodetic(posVel.position, gmst);
                    const r = (1.0 + gd.height / 6371.0) * orbitScaleFactor;
                    const phi = Math.PI / 2 - gd.latitude;
                    const theta = gd.longitude + Math.PI;
                    sprite.position.set(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));
                    if (!sprite.userData.selected) sprite.scale.set(0.03, 0.03, 1);
                } else {
                    sprite.position.set(9999, 9999, 9999);
                }
            }
        }

            const { group, sprites } = createConstellationSprites(cfg);
            cfg.group = group;

        // ====================== 卫星仪表盘卡片管理 ======================
        function createSatCard(satrec, index) {
            const now = new Date();
            const pv = satellite.propagate(satrec, now);
            if (!pv.position) return null;
            const gmst = satellite.gstime(now);
            const gd = satellite.eciToGeodetic(pv.position, gmst);
            const alt = gd.height;
            const latDeg = gd.latitude * 180 / Math.PI;
            const lonDeg = gd.longitude * 180 / Math.PI;
            const velKm = pv.velocity ? Math.sqrt(pv.velocity.x**2 + pv.velocity.y**2 + pv.velocity.z**2) : 0;
            const name = (satrec.name || 'UNKNOWN').trim();
            const noradId = satrec.satnum;
            const meanMotion = satrec.no_kozai || satrec.no;
            const periodMin = (2 * Math.PI) / meanMotion;

            const card = document.createElement('div');
            card.className = 'sat-card';
            card.id = 'sat-card-' + index;
            card.innerHTML = `

                <div class="sat-card-row"><span class="sat-card-label">轨道周期</span><span class="sat-card-value">${periodMin.toFixed(1)} min</span></div>
                <div class="sat-card-row"><span class="sat-card-label">纬度</span><span class="sat-card-value">${latDeg >= 0 ? latDeg.toFixed(2)+'°N' : Math.abs(latDeg).toFixed(2)+'°S'}</span></div>

        }

        // ====================== 卫星点击选中/轨道显示 ======================
        const selectedSats = new Map(); // Map<index, {orbitLine, constId}>
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function deselectSat(index) {
            const sel = selectedSats.get(index);
            if (!sel) return;
            if (sel.orbitLine) {
                scene.remove(sel.orbitLine);
                sel.orbitLine.geometry.dispose();
                sel.orbitLine.material.dispose();
            }
            // 在所有星座中取消选中标记
            for (const cfg of CONSTELLATIONS) {
                const sprite = cfg.sprites[index];
                if (sprite) {
                    sprite.userData.selected = false;
                    sprite.scale.set(0.03, 0.03, 1);
                    break;
                }
            }
            selectedSats.delete(index);
        }

        function clearAllSatSelections() {
            for (const index of [...selectedSats.keys()]) {
                deselectSat(index);
            }
        }

        // 绘制选中卫星的轨道线
        function drawSatOrbit(satrec) {
            const now = new Date();
            const meanMotion = satrec.no_kozai || satrec.no;
            const periodMin = (2 * Math.PI) / meanMotion;
            const periodMs = periodMin * 60 * 1000;
            const steps = 128;
            const points = [];
            for (let s = 0; s <= steps; s++) {
                const t = new Date(now.getTime() + (s / steps) * periodMs);
                const pv = satellite.propagate(satrec, t);
                if (pv.position) {
                    const gd = satellite.eciToGeodetic(pv.position, satellite.gstime(t));
                    const r = (1.0 + gd.height / 6371.0) * orbitScaleFactor;
                    const phi = Math.PI / 2 - gd.latitude;
                    const theta = gd.longitude + Math.PI;
                    points.push(new THREE.Vector3(
                        -r * Math.sin(phi) * Math.cos(theta),
                        r * Math.cos(phi),
                        r * Math.sin(phi) * Math.sin(theta)
                    ));
                }
            }
            if (points.length < 2) return null;
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.7 });
            const line = new THREE.Line(geometry, material);
            line.rotation.y = earth.rotation.y;
            scene.add(line);
            return line;
        }

        // 处理卫星点击（Sprite 射线检测，精确匹配屏幕位置）
        function onSatelliteClick(event) {
            if (event.target !== renderer.domElement) return; // 只响应 canvas 点击

            // 收集所有可见星座的 sprite
            const allSprites = [];
            CONSTELLATIONS.forEach(cfg => { if (cfg.visible && cfg.sprites.length) allSprites.push(...cfg.sprites); });
            if (allSprites.length === 0) return;

            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(allSprites, false);
            if (intersects.length === 0) return;

            const hitSprite = intersects[0].object;
            const idx = hitSprite.userData.satIndex;
            const constId = hitSprite.userData.constId;
            const cfg = CONSTELLATIONS.find(c => c.id === constId);
            if (!cfg || idx === undefined || idx < 0 || idx >= cfg.satrecs.length) return;

            // 跳过传播失败的卫星（位置在远处）
            if (Math.abs(hitSprite.position.x) > 100) return;

            if (selectedSats.has(idx)) {
                // 再次点击 → 取消选中
                deselectSat(idx);
            } else {
                // 选中新卫星
                const satrec = cfg.satrecs[idx];
                if (!satrec) return;
                hitSprite.userData.selected = true;
                const orbitLine = drawSatOrbit(satrec);
                selectedSats.set(idx, { orbitLine, constId });
            }
            // 自动切换到卫星仪表盘并更新卡片
            switchToSatTab();
            updateSatDashboard();
        }

        sceneArea.addEventListener('pointerup', (event) => {
            onSatelliteClick(event);
        });

        // 启动时自动加载千帆星座
        initAllConstellations();

        // ====================== 动画循环 ======================
        let lastFrameTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const currentTime = performance.now();
            const frameDeltaTime = (currentTime - lastFrameTime) / 1000;
            lastFrameTime = currentTime;

                // 更新太阳位置 + 地球旋转（每帧从真实 UTC 时间计算，重启不丢失）
            updateSunPosition();

            // 相机环绕
            if (cameraOrbitMode > 0) {
                cameraOrbitAngle += orbitSpeeds[cameraOrbitMode] * frameDeltaTime;

                // 计算相机位置（圆形轨道）
                camera.position.x = cameraOrbitRadius * Math.cos(cameraOrbitAngle);
                camera.position.z = cameraOrbitRadius * Math.sin(cameraOrbitAngle);
                camera.position.y = cameraOrbitHeight;
            }

            // 卫星轨道动画
            updateSatellitePosition();

            // 更新所有星座卫星位置
            CONSTELLATIONS.forEach(cfg => {
                if (cfg.visible && cfg.group) {
                    updateConstellationPositions(cfg, new Date());
                    cfg.group.rotation.y = earth.rotation.y;
                }
            });

            // 呼吸闪烁（选中卫星）+ 轨道线跟随地球
            if (selectedSats.size > 0) {
                const breath = 0.02 + 0.04 * (0.5 + 0.5 * Math.sin(currentTime / 400));
                for (const [index, sel] of selectedSats) {
                    // 在所有星座中查找选中的卫星
                    for (const cfg of CONSTELLATIONS) {
                        const sprite = cfg.sprites[index];
                        if (sprite && sprite.userData.selected) {
                            sprite.scale.set(breath, breath, 1);
                            break;
                        }
                    }
                    if (sel.orbitLine) sel.orbitLine.rotation.y = earth.rotation.y;
                }
            }

            // 始终更新 OrbitControls，允许用户在环绕时控制视角
            controls.update();

            renderer.render(scene, camera);
        }

        // 窗口自适应
        window.addEventListener('resize', () => {
            const r = document.getElementById('scene-area').getBoundingClientRect();
            const w = r.width;
            const h = r.height;
            if (w > 0 && h > 0) {
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            }
        });

        // 启动应用
        async function startApp() {
            // TEC 插值器已在声明时初始化，无需加载 GloTEC 数据

            // 加载预计算数据（动画已在底部启动）
            await loadData();

            console.log('[Info] 应用启动完成');
        }

        startApp();

        // 延迟启动动画，确保布局完成
        window.addEventListener('load', () => {
            const r = document.getElementById('scene-area').getBoundingClientRect();
            const w = r.width;
            const h = r.height;
            if (w > 0 && h > 0) {
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            }
            updateSunPosition();
            animate();
        });

    </script>
</body>
</html>
