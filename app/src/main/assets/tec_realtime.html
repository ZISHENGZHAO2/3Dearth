<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时 TEC 热力图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        #app { display: flex; width: 100vw; height: 100vh; }

        /* 左侧 TEC 地图 80% */
        #map-panel {
            width: 80vw;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #top-nav {
            height: 36px;
            background: rgba(5,10,25,0.92);
            border-bottom: 1px solid rgba(68,136,170,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
        }
        .nav-page-btns {
            display: flex;
            gap: 6px;
        }
        .page-btn {
            background: rgba(68,136,170,0.15);
            border: 1px solid rgba(68,136,170,0.25);
            color: #88bbdd;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        .page-btn:hover {
            background: rgba(68,136,170,0.35);
            border-color: rgba(68,136,170,0.6);
        }
        .page-btn.active {
            background: rgba(68,136,170,0.45);
            border-color: #88ccff;
            color: #ffffff;
            font-weight: 600;
        }
        #top-nav .nav-time {
            color: #ffaa44;
            font-size: 13px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        #map-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        #map-area canvas {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            border: 1px solid rgba(68,136,170,0.3);
        }

        #map-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(136,187,221,0.7);
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            text-shadow: 0 0 4px #000;
        }

        /* 右侧控制面板 20% */
        #control-panel {
            width: 20vw;
            background: rgba(5,10,25,0.98);
            border-left: 1px solid rgba(68,136,170,0.4);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .panel-section {
            padding: 14px;
            border-bottom: 1px solid rgba(68,136,170,0.2);
        }
        .section-title {
            color: #88bbdd;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        /* 时间显示 */
        .time-grid {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .time-item {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(68,136,170,0.2);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }
        .time-item .label {
            color: #667788;
            font-size: 10px;
            margin-bottom: 4px;
        }
        .time-item .value {
            color: #88ddff;
            font-size: 18px;
            font-weight: bold;
        }

        /* 参数输入 */
        .param-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .param-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(68,136,170,0.2);
            border-radius: 6px;
            padding: 8px;
        }
        .param-item label {
            display: block;
            color: #667788;
            font-size: 10px;
            margin-bottom: 4px;
        }
        .param-item input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(68,136,170,0.4);
            color: #fff;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 12px;
            text-align: right;
        }
        .param-item input:focus { border-color: #88ccff; outline: none; }
        .param-item .unit {
            color: #667788;
            font-size: 10px;
            float: right;
            margin-top: 2px;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #0066cc, #0044aa);
            border: none;
            color: white;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 6px;
        }
        .btn-primary:hover { background: linear-gradient(135deg, #0088ff, #0066cc); }
        .btn-primary:disabled {
            background: #334455;
            cursor: not-allowed;
            color: #888;
        }

        #rtStatus {
            font-size: 11px;
            color: #667788;
            text-align: center;
            margin-top: 8px;
            min-height: 20px;
        }

        /* 色条 */
        #colorbar-container {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #colorbar-canvas {
            flex: 1;
            height: 14px;
            border-radius: 3px;
            border: 1px solid rgba(68,136,170,0.3);
        }
        .cb-label {
            color: #88bbdd;
            font-size: 10px;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        /* 加载动画 */
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 左侧：TEC 热力图 -->
        <div id="map-panel">
            <div id="top-nav">
                <div class="nav-page-btns">
                    <a class="page-btn" href="3DNavigation_error.html">🌍 星座信息系统</a>
                    <a class="page-btn active" href="tec_realtime.html">📊 TEC计算</a>
                    <a class="page-btn" href="orbit_decay.html">🛰️ 轨道衰减仿真</a>
                </div>
                <span class="nav-time" id="beijingClock">--:--:--</span>
            </div>
            <div id="map-area">
                <canvas id="tecCanvas"></canvas>
                <div id="map-info"></div>
            </div>
        </div>

        <!-- 右侧：控制面板 -->
        <div id="control-panel">

            <div class="panel-section">
                <div class="section-title">☀️ 太阳 / 地磁参数</div>
                <div class="param-grid">
                    <div class="param-item">
                        <label>F10.7</label>
                        <input id="rtF107" type="number" value="150" step="1">
                        <span class="unit">SFU</span>
                    </div>
                    <div class="param-item">
                        <label>F10.7A</label>
                        <input id="rtF107A" type="number" value="145" step="1">
                        <span class="unit">SFU</span>
                    </div>
                    <div class="param-item">
                        <label>Dst</label>
                        <input id="rtDst" type="number" value="0" step="1">
                        <span class="unit">nT</span>
                    </div>
                    <div class="param-item">
                        <label>Ap</label>
                        <input id="rtAp" type="number" value="2" step="0.1">
                        <span class="unit"></span>
                    </div>
                    <div class="param-item">
                        <label>Kp</label>
                        <input id="rtKp" type="number" value="1.3" step="0.1">
                        <span class="unit"></span>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">📊 历史记忆参数（可选）</div>
                <div style="font-size:10px; color:#667788; margin-bottom:8px;">留空则使用当前参数值作为默认值</div>
                <div class="param-grid">
                    <div class="param-item">
                        <label>Dst lag-1h</label>
                        <input id="rtDstLag1" type="number" placeholder="默认" step="1">
                        <span class="unit">nT</span>
                    </div>
                    <div class="param-item">
                        <label>Dst lag-3h</label>
                        <input id="rtDstLag3" type="number" placeholder="默认" step="1">
                        <span class="unit">nT</span>
                    </div>
                    <div class="param-item">
                        <label>Dst lag-6h</label>
                        <input id="rtDstLag6" type="number" placeholder="默认" step="1">
                        <span class="unit">nT</span>
                    </div>
                    <div class="param-item">
                        <label>Dst lag-12h</label>
                        <input id="rtDstLag12" type="number" placeholder="默认" step="1">
                        <span class="unit">nT</span>
                    </div>
                    <div class="param-item">
                        <label>Dst lag-24h</label>
                        <input id="rtDstLag24" type="number" placeholder="默认" step="1">
                        <span class="unit">nT</span>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">🎨 色标</div>
                <div id="colorbar-container">
                    <span class="cb-label">0</span>
                    <canvas id="colorbarCanvas"></canvas>
                    <span class="cb-label">100</span>
                </div>
                <div style="text-align:center;color:#667788;font-size:10px;margin-top:4px;">TEC (TECU)</div>
            </div>

            <div class="panel-section">
                <button class="btn-primary" id="btnLoadRT">🔄 加载实时 TEC</button>
                <div id="rtStatus"></div>
            </div>
        </div>
    </div>

    <script src="tec-engine.js"></script>

    <script>
        // ====================== 全局状态 ======================
        const tecEngine = new TecEngine();
        let tecEngineReady = false;

        // 预加载地球背景图
        let earthImgLoaded = false;
        const earthImg = new Image();
        earthImg.onload = function() { earthImgLoaded = true; console.log('[Earth BG] loaded OK'); };
        earthImg.onerror = function() { console.error('[Earth BG] load FAILED'); };
        earthImg.src = 'textures/earth_atmos_2048.jpg';
        if (earthImg.complete) {
            earthImgLoaded = true;
            console.log('[Earth BG] loaded from cache');
        }

        // 初始化 TEC 引擎
        (async function initTecEngine() {
            try {
                await tecEngine.init();
                tecEngineReady = true;
                console.log('[TEC Engine] Offline model loaded');
            } catch (e) {
                console.error('[TEC Engine] Load failed:', e);
            }
        })();

        // ====================== Canvas 初始化 ======================
        const canvas = document.getElementById('tecCanvas');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 480;
        canvas.width = W;
        canvas.height = H;

        const cbCanvas = document.getElementById('colorbarCanvas');
        const cbCtx = cbCanvas.getContext('2d');
        cbCanvas.width = 400;
        cbCanvas.height = 20;

        // ====================== 色条渲染 ======================
        function renderColorbar() {
            const w = cbCanvas.width, h = cbCanvas.height;
            const data = cbCtx.createImageData(w, h);
            for (let x = 0; x < w; x++) {
                const t = x / w;
                let r, g, b;
                if (t < 0.125)      { r = 0;   g = 0;   b = 0.5 + t * 4; }
                else if (t < 0.375) { r = 0;   g = (t - 0.125) * 4; b = 1; }
                else if (t < 0.625) { r = (t - 0.375) * 4; g = 1; b = 1 - (t - 0.375) * 4; }
                else if (t < 0.875) { r = 1;   g = 1 - (t - 0.625) * 4; b = 0; }
                else                { r = 1 - (t - 0.875) * 2; g = 0;   b = 0; }
                for (let y = 0; y < h; y++) {
                    const idx = (y * w + x) * 4;
                    data[idx]     = Math.floor(r * 255);
                    data[idx + 1] = Math.floor(g * 255);
                    data[idx + 2] = Math.floor(b * 255);
                    data[idx + 3] = 255;
                }
            }
            cbCtx.putImageData(data, 0, 0);
        }
        renderColorbar();

        // ====================== 时间更新（北京时间直接作为模型输入） ======================
        function updateRTTime() {
            const now = new Date();
            // 北京时间 = UTC + 8 小时
            const bjMs = now.getTime() + now.getTimezoneOffset() * 60000 + 8 * 3600000;
            const bj = new Date(bjMs);
            const bjYear = bj.getUTCFullYear();
            const bjMonth = bj.getUTCMonth() + 1;
            const bjDay = bj.getUTCDate();
            const bjHour = bj.getUTCHours();
            const startOfYear = Date.UTC(bjYear, 0, 0);
            const bjDoy = Math.floor((bjMs - startOfYear) / 86400000);

            // 直接使用北京时间作为模型输入
            return { year: bjYear, doy: bjDoy, ut_hour: bjHour };
        }
        updateRTTime();

        // ====================== 绘制网格 ======================
        function drawGrid() {
            ctx.strokeStyle = 'rgba(136,187,221,0.2)';
            ctx.lineWidth = 0.5;

            // 经线（每30度）
            for (let lon = -180; lon <= 180; lon += 30) {
                const x = ((lon + 180) / 360) * W;
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }

            // 纬线（每30度）
            for (let lat = -90; lat <= 90; lat += 30) {
                const y = ((90 - lat) / 180) * H;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // 赤道高亮
            ctx.strokeStyle = 'rgba(136,187,221,0.4)';
            ctx.lineWidth = 1;
            const eqY = H / 2;
            ctx.beginPath();
            ctx.moveTo(0, eqY);
            ctx.lineTo(W, eqY);
            ctx.stroke();

            // 经纬度标签
            ctx.fillStyle = 'rgba(136,187,221,0.5)';
            ctx.font = '9px monospace';
            ctx.textAlign = 'center';
            for (let lon = -180; lon < 180; lon += 60) {
                const x = ((lon + 180) / 360) * W;
                ctx.fillText(lon + '°', x, H - 4);
            }
            ctx.textAlign = 'right';
            for (let lat = -60; lat <= 60; lat += 30) {
                const y = ((90 - lat) / 180) * H;
                ctx.fillText(lat + '°', 36, y + 3);
            }
        }

        // ====================== 加载并渲染 TEC ======================
        async function loadRealtimeTEC() {
            const btn = document.getElementById('btnLoadRT');
            const status = document.getElementById('rtStatus');

            btn.disabled = true;
            btn.textContent = '⏳ 加载中...';
            status.textContent = '正在调用 TEC 预测引擎...';
            status.style.color = '#88bbdd';

            try {
                if (!tecEngineReady) {
                    status.textContent = '⚠️ TEC 引擎正在初始化，请稍后...';
                    status.style.color = '#ffaa00';
                    btn.disabled = false;
                    btn.textContent = '🔄 加载实时 TEC';
                    return;
                }

                const { year, doy, ut_hour } = updateRTTime();

                const f107 = parseFloat(document.getElementById('rtF107').value) || 150;
                const f107a = parseFloat(document.getElementById('rtF107A').value) || 145;
                const dst = parseFloat(document.getElementById('rtDst').value) || 0;
                const ap = parseFloat(document.getElementById('rtAp').value) || 2;
                const kp = parseFloat(document.getElementById('rtKp').value) || 1.3;

                // 构建历史记忆参数（Dst 滞后值）
                const memoryLags = { dst: {} };
                [1, 3, 6, 12, 24].forEach(lag => {
                    const val = document.getElementById(`rtDstLag${lag}`).value;
                    if (val !== '') memoryLags.dst[lag] = parseFloat(val);
                });

                status.textContent = `⏳ 预测中 (DOY ${doy}, UT ${ut_hour}:00)...`;
                status.style.color = '#88bbdd';

                const geojson = await tecEngine.predict({
                    year, doy, ut_hour,
                    drivers: { f107, f107a, dst, ap, kp },
                    memory_lags: memoryLags,
                });

                // 渲染
                renderTECMap(geojson);

                status.textContent = `✅ 已加载 (DOY ${doy}, UT ${ut_hour}:00)`;
                status.style.color = '#88ddff';
                console.log('[RT TEC] 实时TEC加载完成');
            } catch (e) {
                console.error('[RT TEC] 加载失败:', e);
                status.textContent = '❌ 加载失败: ' + (e.message || '未知错误');
                status.style.color = '#ff6666';
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 加载实时 TEC';
            }
        }

        // ====================== 渲染 TEC 热力图 ======================
        function renderTECMap(geojson) {
            // 解析数据到网格
            const tecGrid = {};
            const lats = new Set(), lons = new Set();
            for (const f of geojson.features) {
                const [lon, lat] = f.geometry.coordinates;
                const tec = f.properties.tec;
                if (tec != null && !isNaN(tec)) {
                    tecGrid[`${lat.toFixed(1)}_${lon.toFixed(1)}`] = tec;
                    lats.add(lat);
                    lons.add(lon);
                }
            }
            const latArr = [...lats].sort((a, b) => a - b);
            const lonArr = [...lons].sort((a, b) => a - b);

            if (latArr.length < 2 || lonArr.length < 2) {
                document.getElementById('rtStatus').textContent = '⚠️ 数据不足以渲染';
                return;
            }

            function interpolateTec(lat, lon) {
                let latIdx = latArr.findIndex(l => l >= lat);
                let lonIdx = lonArr.findIndex(l => l >= lon);
                if (latIdx < 0) latIdx = latArr.length - 1;
                if (lonIdx < 0) lonIdx = lonArr.length - 1;
                if (latIdx === 0) latIdx = 1;
                if (lonIdx === 0) lonIdx = 1;
                const lat0 = latArr[latIdx - 1], lat1 = latArr[latIdx];
                const lon0 = lonArr[lonIdx - 1], lon1 = lonArr[lonIdx];
                const e00 = tecGrid[`${lat0.toFixed(1)}_${lon0.toFixed(1)}`] || 0;
                const e10 = tecGrid[`${lat1.toFixed(1)}_${lon0.toFixed(1)}`] || 0;
                const e01 = tecGrid[`${lat0.toFixed(1)}_${lon1.toFixed(1)}`] || 0;
                const e11 = tecGrid[`${lat1.toFixed(1)}_${lon1.toFixed(1)}`] || 0;
                const tx = (lon1 !== lon0) ? (lon - lon0) / (lon1 - lon0) : 0;
                const ty = (lat1 !== lat0) ? (lat - lat0) / (lat1 - lat0) : 0;
                return e00 * (1 - tx) * (1 - ty) + e10 * (1 - tx) * ty +
                       e01 * tx * (1 - ty) + e11 * tx * ty;
            }

            // 第一步：画地球背景
            ctx.clearRect(0, 0, W, H);
            if (earthImgLoaded || earthImg.complete) {
                ctx.drawImage(earthImg, 0, 0, W, H);
            } else {
                ctx.fillStyle = '#0a0a2e';
                ctx.fillRect(0, 0, W, H);
            }

            // 第二步：离屏 canvas 渲染不透明热力图
            const offCanvas = document.createElement('canvas');
            offCanvas.width = W;
            offCanvas.height = H;
            const offCtx = offCanvas.getContext('2d');
            const imageData = offCtx.createImageData(W, H);
            const pixels = imageData.data;

            for (let py = 0; py < H; py++) {
                const lat = 90 - (py / H) * 180;
                for (let px = 0; px < W; px++) {
                    const lon = (px / W) * 360 - 180;
                    const tec = interpolateTec(lat, lon);
                    const t = Math.min(Math.max(tec / 100, 0), 1);
                    let r, g, b;
                    if (t < 0.125)      { r = 0;   g = 0;   b = 0.5 + t * 4; }
                    else if (t < 0.375)  { r = 0;   g = (t - 0.125) * 4; b = 1; }
                    else if (t < 0.625)  { r = (t - 0.375) * 4; g = 1; b = 1 - (t - 0.375) * 4; }
                    else if (t < 0.875)  { r = 1;   g = 1 - (t - 0.625) * 4; b = 0; }
                    else                 { r = 1 - (t - 0.875) * 2; g = 0;   b = 0; }
                    const idx = (py * W + px) * 4;
                    pixels[idx]     = Math.floor(r * 255);
                    pixels[idx + 1] = Math.floor(g * 255);
                    pixels[idx + 2] = Math.floor(b * 255);
                    pixels[idx + 3] = 255;
                }
            }
            offCtx.putImageData(imageData, 0, 0);

            // 第三步：半透明合成到主画布
            ctx.save();
            ctx.globalAlpha = 0.45;
            ctx.drawImage(offCanvas, 0, 0);
            ctx.restore();

            // 第四步：绘制网格和标签（不透明）
            drawGrid();
        }

        // ====================== 事件绑定 ======================
        document.getElementById('btnLoadRT').addEventListener('click', loadRealtimeTEC);

        // 页面加载后自动加载一次
        window.addEventListener('load', function() {
            updateRTTime();
            setTimeout(() => {
                loadRealtimeTEC();
            }, 500);
        });

        // 每小时自动刷新
        function scheduleHourlyRefresh() {
            const now = new Date();
            // 计算到下一个整点（北京时间）的毫秒数
            const bjMs = now.getTime() + now.getTimezoneOffset() * 60000 + 8 * 3600000;
            const bjDate = new Date(bjMs);
            const nextHour = new Date(bjDate);
            nextHour.setUTCHours(bjDate.getUTCHours() + 1, 0, 0, 0);
            const msUntilNext = nextHour.getTime() - bjMs;

            setTimeout(() => {
                console.log('[RT TEC] 整点刷新');
                updateRTTime();
                loadRealtimeTEC();
                // 之后每小时刷新一次
                setInterval(() => {
                    console.log('[RT TEC] 每小时自动刷新');
                    updateRTTime();
                    loadRealtimeTEC();
                }, 3600000);
            }, msUntilNext);

            console.log(`[RT TEC] 下次自动刷新时间: ${Math.round(msUntilNext / 60000)} 分钟后`);
        }
        scheduleHourlyRefresh();

        console.log('[RT TEC] 实时TEC页面加载完成');

        // ====================== 北京时间时钟 ======================
        function updateBeijingClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');
            const el = document.getElementById('beijingClock');
            if (el) el.textContent = `北京时间 ${h}:${m}:${s}`;
        }
        setInterval(updateBeijingClock, 1000);
        updateBeijingClock();
    </script>
</body>
</html>
