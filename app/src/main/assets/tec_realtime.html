<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时 TEC 热力图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        #app { display: flex; width: 100vw; height: 100vh; }

        /* 左侧 TEC 地图 80% */
        #map-panel {
            width: 80vw;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #top-nav {
            height: 36px;
            background: rgba(5,10,25,0.92);
            border-bottom: 1px solid rgba(68,136,170,0.4);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
        }
        .nav-page-btns {
            display: flex;
            gap: 6px;
        }
        .page-btn {
            background: rgba(68,136,170,0.15);
            border: 1px solid rgba(68,136,170,0.25);
            color: #88bbdd;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }
        .page-btn:hover {
            background: rgba(68,136,170,0.35);
            border-color: rgba(68,136,170,0.6);
        }
        .page-btn.active {
            background: rgba(68,136,170,0.45);
            border-color: #88ccff;
            color: #ffffff;
            font-weight: 600;
        }
        #top-nav .nav-time {
            color: #ffaa44;
            font-size: 13px;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        #map-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        #map-area canvas {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            border: 1px solid rgba(68,136,170,0.3);
        }
        #tecCanvas { position: absolute; top: 12px; left: 12px; width: calc(100% - 24px); height: calc(100% - 24px); }
        #satMarkerCanvas {
            position: absolute;
            top: 12px;
            left: 12px;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
            pointer-events: none;
            border: none;
            z-index: 2;
        }

        #map-info {
            position: absolute;
            bottom: 20px;

            color: rgba(136,187,221,0.7);
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            text-shadow: 0 0 4px #000;

        /* 右侧控制面板 20% */
        #control-panel {
            width: 20vw;
            background: rgba(5,10,25,0.98);
            border-left: 1px solid rgba(68,136,170,0.4);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .panel-section {
            padding: 10px;
            border-bottom: 1px solid rgba(68,136,170,0.2);
        }
        .section-title {
            color: #88bbdd;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        /* 时间显示 */
        .time-grid {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .time-item {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(68,136,170,0.2);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }
        .time-item .label {
            color: #667788;
            font-size: 10px;
            margin-bottom: 4px;
        }
        .time-item .value {
            color: #88ddff;
            font-size: 18px;
            font-weight: bold;
        }

        /* 参数输入 */
        .param-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }
        .param-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(68,136,170,0.2);
            border-radius: 5px;
            padding: 5px 7px;
        }
        .param-item label {
            display: block;
            color: #667788;
            font-size: 9px;
            margin-bottom: 2px;
        }
        .param-item input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(68,136,170,0.4);
            color: #fff;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 11px;
            text-align: right;
        }
        .param-item input:focus { border-color: #88ccff; outline: none; }
        .param-item .unit {
            color: #667788;
            font-size: 9px;
            float: right;
            margin-top: 1px;
        }

        .btn-primary {
            width: 100%;
            padding: 8px;
            background: linear-gradient(135deg, #0066cc, #0044aa);
            border: none;
            color: white;
            font-size: 12px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .btn-primary:hover { background: linear-gradient(135deg, #0088ff, #0066cc); }
        .btn-primary:disabled {
            background: #334455;
            cursor: not-allowed;
            color: #888;
        }

        .btn-secondary {
            width: 100%;
            padding: 7px;
            background: linear-gradient(135deg, #cc7700, #aa5500);
            border: none;
            color: white;
            font-size: 11px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }
        .btn-secondary:hover { background: linear-gradient(135deg, #ee8800, #cc6600); }
        .btn-secondary:disabled {
            background: #554433;
            cursor: not-allowed;
            color: #888;
        }

        #playback-status {
            margin-top: 6px;
            text-align: center;
        }
        #playback-text {
            font-size: 10px;
            color: #88bbdd;
            display: block;
            margin-bottom: 3px;
        }
        #playback-bar {
            width: 100%;
            height: 4px;
            background: #1a2a3a;
            border-radius: 2px;
            overflow: hidden;
        }
        #playback-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0066cc, #00ccff);
            border-radius: 2px;
            transition: width 0.15s ease;
        }

        #step-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }
        #step-label {
            font-size: 10px;
            color: #8899aa;
            white-space: nowrap;
        }
        #step-options {
            display: flex;
            gap: 3px;
            flex: 1;
        }
        .step-opt {
            flex: 1;
            text-align: center;
            font-size: 10px;
            padding: 3px 0;
            background: #1a2a3a;
            color: #667788;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .step-opt:hover {
            background: #2a3a4a;
            color: #88bbdd;
        }
        .step-opt.active {
            background: #004488;
            color: #ccddff;
            font-weight: bold;
        }

        /* 加载动画 */
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 左侧：TEC 热力图 -->
        <div id="map-panel">
            <div id="top-nav">
                <div class="nav-page-btns">
                    <a class="page-btn" href="3DNavigation_error.html">🌍 星座信息系统</a>
                    <a class="page-btn active" href="tec_realtime.html">📊 TEC计算</a>
                    <a class="page-btn" href="orbit_decay.html">🛰️ 轨道衰减仿真</a>
                </div>
                <span class="nav-time" id="beijingClock">--:--:--</span>

            <div id="map-area">

        <!-- 右侧：控制面板 -->
        <div id="control-panel">

            <div class="panel-section">
                <div class="section-title">☀️ 太阳 / 地磁参数</div>
                <div class="param-grid">
                    <div class="param-item">
                        <label>F10.7</label>
                        <input id="rtF107" type="number" value="150" step="1">

                    </div>
                    <div class="param-item">

                    </div>

                        <label>Kp</label>
                        <input id="rtKp" type="number" value="1.3" step="0.1">
                        <span class="unit"></span>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <div class="section-title">📊 历史记忆参数（可选）</div>
                <div style="font-size:10px; color:#667788; margin-bottom:5px;">留空则使用当前参数值</div>
                <div class="param-grid">
                    <div class="param-item">
                        <label>Dst lag-1h</label>
                        <input id="rtDstLag1" type="number" placeholder="默认" step="1">

                    </div>
                    <div class="param-item">
                        <label>Dst lag-3h</label>

                    <div class="param-item">
                        <label>Dst lag-6h</label>
                        <input id="rtDstLag6" type="number" placeholder="默认" step="1">
                        <span class="unit">nT</span>
                    </div>
                    <div class="param-item">
                        <label>Dst lag-12h</label>
                        <input id="rtDstLag12" type="number" placeholder="默认" step="1">
                        <span class="unit">nT</span>
                    </div>
                    <div class="param-item">
                        <label>Dst lag-24h</label>
                        <input id="rtDstLag24" type="number" placeholder="默认" step="1">
                        <span class="unit">nT</span>
                    </div>

            </div>

            <div class="panel-section" id="controls-section">
                <button class="btn-primary" id="btnLoadRT">计算TEC</button>
                <div id="step-selector">
                    <span id="step-label">步长</span>
                    <div id="step-options">
                        <span class="step-opt active" data-step="1">1h</span>
                        <span class="step-opt" data-step="0.5">30m</span>
                        <span class="step-opt" data-step="0.1667">10m</span>
                    </div>
                </div>
                <button class="btn-secondary" id="btnPredict24h">▶ 预测24小时TEC</button>
                <div id="playback-status" style="display:none;">

    <script src="tec-engine.js"></script>
    <script src="satellite.min.js"></script>

    <script>
        // ====================== 全局状态 ======================
        const tecEngine = new TecEngine();
        let tecEngineReady = false;

        // 预加载地球背景图
        let earthImgLoaded = false;
        const earthImg = new Image();
        earthImg.onload = function() { earthImgLoaded = true; console.log('[Earth BG] loaded OK'); };
        earthImg.onerror = function() { console.error('[Earth BG] load FAILED'); };
        earthImg.src = 'textures/earth_atmos_2048.jpg';
        if (earthImg.complete) {
            earthImgLoaded = true;
            console.log('[Earth BG] loaded from cache');
        }

        // 初始化 TEC 引擎
        (async function initTecEngine() {
            try {
                await tecEngine.init();
                tecEngineReady = true;
                console.log('[TEC Engine] Offline model loaded');
            } catch (e) {
                console.error('[TEC Engine] Load failed:', e);
            }
        })();

        // ====================== Canvas 初始化 ======================
        const canvas = document.getElementById('tecCanvas');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 480;
        canvas.width = W;
        canvas.height = H;

        // 卫星标记叠加层 Canvas
        const markerCanvas = document.getElementById('satMarkerCanvas');
        const markerCtx = markerCanvas.getContext('2d');
        markerCanvas.width = W;
        markerCanvas.height = H;

        // 地图内边距（经纬度标签显示在边距区域，右侧预留垂直色条）
        const MAP_MARGIN = { left: 35, right: 39, top: 15, bottom: 18 };
        const MAP_W = W - MAP_MARGIN.left - MAP_MARGIN.right;
        const MAP_H = H - MAP_MARGIN.top - MAP_MARGIN.bottom;

        // 经纬度映射工具
        function wrapLongitude(lon) {
            return ((lon + 180) % 360 + 360) % 360 - 180;
        }
        function normalizeLongitudeToPrev(lon, prevLon) {
            if (typeof prevLon !== 'number') return lon;
            let delta = lon - prevLon;
            while (delta > 180) {
                lon -= 360;
                delta = lon - prevLon;
            }
            while (delta < -180) {
                lon += 360;
                delta = lon - prevLon;
            }
            return lon;
        }
        function lonToX(lon) {
            const wrappedLon = wrapLongitude(lon);
            return MAP_MARGIN.left + ((wrappedLon + 180) / 360) * MAP_W;
        }
        function latToY(lat) {
            return MAP_MARGIN.top + ((90 - lat) / 180) * MAP_H;
        }
        function forEachWrappedX(lon, callback) {
            const x = lonToX(lon);
            const rightEdge = MAP_MARGIN.left + MAP_W;
            callback(x);
            if (x - MAP_MARGIN.left < 15) callback(x + MAP_W);
            if (rightEdge - x < 15) callback(x - MAP_W);
        }

        // ====================== 时间更新（北京时间直接作为模型输入） ======================
        function updateRTTime() {
            const now = new Date();
            // 北京时间 = UTC + 8 小时
            const bjMs = now.getTime() + now.getTimezoneOffset() * 60000 + 8 * 3600000;
            const bj = new Date(bjMs);
            const bjYear = bj.getUTCFullYear();
            const bjMonth = bj.getUTCMonth() + 1;
            const bjDay = bj.getUTCDate();
            const bjHour = bj.getUTCHours();
            const startOfYear = Date.UTC(bjYear, 0, 0);
            const bjDoy = Math.floor((bjMs - startOfYear) / 86400000);

            // 直接使用北京时间作为模型输入
            return { year: bjYear, doy: bjDoy, ut_hour: bjHour };
        }
        updateRTTime();

        // ====================== 绘制网格 ======================
        function drawGrid() {
            ctx.strokeStyle = 'rgba(136,187,221,0.2)';
            ctx.lineWidth = 0.5;

            // 经线（每30度）
            for (let lon = -180; lon <= 180; lon += 30) {
                const x = lonToX(lon);
                ctx.beginPath();
                ctx.moveTo(x, MAP_MARGIN.top);
                ctx.lineTo(x, MAP_MARGIN.top + MAP_H);
                ctx.stroke();
            }

            // 纬线（每30度）
            for (let lat = -90; lat <= 90; lat += 30) {
                const y = latToY(lat);
                ctx.beginPath();
                ctx.moveTo(MAP_MARGIN.left, y);
                ctx.lineTo(MAP_MARGIN.left + MAP_W, y);
                ctx.stroke();
            }

            // 赤道高亮
            ctx.strokeStyle = 'rgba(136,187,221,0.4)';
            ctx.lineWidth = 1;
            const eqY = latToY(0);
            ctx.beginPath();
            ctx.moveTo(MAP_MARGIN.left, eqY);
            ctx.lineTo(MAP_MARGIN.left + MAP_W, eqY);
            ctx.stroke();

            // ===== 经纬度标签（显示在地图边距区域） =====
            ctx.fillStyle = 'rgba(136,187,221,0.6)';
            ctx.font = '9px monospace';

            // 经度标签（底部）
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let lon = -180; lon < 180; lon += 60) {
                const x = lonToX(lon);
                ctx.fillText(lon + '°', x, MAP_MARGIN.top + MAP_H + 3);
            }

            // 纬度标签（左侧）
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let lat = -60; lat <= 60; lat += 30) {
                const y = latToY(lat);
                ctx.fillText(lat + '°', MAP_MARGIN.left - 5, y);
            }
        }

        // ====================== 加载并渲染 TEC ======================
        async function loadRealtimeTEC() {
            const btn = document.getElementById('btnLoadRT');
            btn.disabled = true;
            btn.textContent = '⏳ 计算中...';

            try {
                if (!tecEngineReady) {
                    btn.disabled = false;
                    btn.textContent = '计算TEC';
                    return;
                }

                const { year, doy, ut_hour } = updateRTTime();

                const f107 = parseFloat(document.getElementById('rtF107').value) || 150;
                const f107a = parseFloat(document.getElementById('rtF107A').value) || 145;
                const dst = parseFloat(document.getElementById('rtDst').value) || 0;
                const ap = parseFloat(document.getElementById('rtAp').value) || 2;
                const kp = parseFloat(document.getElementById('rtKp').value) || 1.3;

                // 构建历史记忆参数（Dst 滞后值）
                const memoryLags = { dst: {} };
                [1, 3, 6, 12, 24].forEach(lag => {
                    const val = document.getElementById(`rtDstLag${lag}`).value;
                    if (val !== '') memoryLags.dst[lag] = parseFloat(val);
                });

                const geojson = await tecEngine.predict({
                    year, doy, ut_hour,
                    drivers: { f107, f107a, dst, ap, kp },
                    memory_lags: memoryLags,
                });

                // 渲染（传入时间用于绘制晨昏线）
                renderTECMap(geojson, doy, ut_hour);

                console.log('[RT TEC] TEC计算完成');
            } catch (e) {
                console.error('[RT TEC] 计算失败:', e);
            } finally {
                btn.disabled = false;
                btn.textContent = '计算TEC';
            }
        }

        // ====================== 24小时TEC预测与播放 ======================
        let playbackTimer = null;
        let playbackFrames = [];
        let playbackIndex = 0;
        let playbackTimes = [];
        // 卫星轨迹预测缓存: satPredictedFrames[i] = [sat1, sat2, ...] 与 playbackFrames[i] 对应
        let satPredictedFrames = [];
        let satTleCache = null; // 当前播放使用的卫星TLE数据
        // 轨迹连续经度缓存，避免跨经线时突然跳转到反向位置
        const lastLonBySat = new Map();
        // 绘制时的上一帧经度缓存，用于刷新及预测绘制间的平滑显示
        const lastDrawnLonBySat = new Map();

        /**
         * 从 localStorage 读取显示列表卫星，如果包含 TLE 则创建 satrec 并计算未来位置
         * @param {Array} timeSteps - [{year, doy, utHour, bjHour, bjMin}, ...]
         * @returns {Array} frames - [ [{id, name, lat, lon, constellation, color}, ...], ... ]
         */
        function computeSatelliteTrajectories(timeSteps) {
            // 读取显示列表卫星
            let satList = [];
            try {
                const raw = localStorage.getItem('tec_display_satellites');
                if (raw) satList = JSON.parse(raw);
            } catch (e) { return []; }
            if (!Array.isArray(satList) || satList.length === 0) return [];

            const frames = [];
            const satWithTle = satList.filter(s => s.tle1 && s.tle2);

            if (satWithTle.length === 0) {
                // 没有TLE数据，卫星保持当前位置不变
                for (let i = 0; i < timeSteps.length; i++) {
                    frames.push(satList.map(s => ({ ...s })));
                }
                return frames;
            }

            // 创建 satrec 对象
            lastLonBySat.clear();
            const satrecs = [];
            for (const s of satWithTle) {
                try {
                    const satrec = satellite.twoline2satrec(s.tle1, s.tle2);
                    satrec._name = s.name;
                    satrec._constellation = s.constellation;
                    satrec._color = s.color;
                    satrec._id = s.id;
                    satrecs.push(satrec);
                } catch (e) {
                    // TLE无效，跳过
                }
            }

            // 对每个时间步计算卫星位置
            for (const step of timeSteps) {
                const frameSats = [];
                try {
                    const utcDate = (typeof step.utcMs === 'number')
                        ? new Date(step.utcMs)
                        : new Date(Date.UTC(step.year, 0, step.doy, step.bjHour, step.bjMin, 0) - 8 * 3600000);
                    const gmst = satellite.gstime(utcDate);

                    for (const satrec of satrecs) {
                        try {
                            const pv = satellite.propagate(satrec, utcDate);
                            if (!pv.position) continue;
                            const gd = satellite.eciToGeodetic(pv.position, gmst);
                            const lat = parseFloat((gd.latitude * 180 / Math.PI).toFixed(4));
                            let lon = parseFloat((gd.longitude * 180 / Math.PI).toFixed(4));
                            const prevLon = lastLonBySat.get(satrec._id);
                            lon = normalizeLongitudeToPrev(lon, prevLon);
                            lastLonBySat.set(satrec._id, lon);
                            frameSats.push({
                                id: satrec._id,
                                name: satrec._name,
                                lat, lon,
                                constellation: satrec._constellation,
                                color: satrec._color
                            });
                        } catch (e) {
                            // 传播失败，跳过此卫星
                            console.warn('[sat] 传播失败', satrec._name, e);
                        }
                    }
                } catch (e) {
                    // 整帧计算失败，保留空帧
                    console.error('[sat] 整帧计算失败', e);
                }

                frames.push(frameSats);
            }

            return frames;
        }

        async function predict24hTEC() {
            const btn = document.getElementById('btnPredict24h');
            const statusDiv = document.getElementById('playback-status');
            const statusText = document.getElementById('playback-text');
            const fillBar = document.getElementById('playback-fill');

            // 若正在播放则停止
            if (playbackTimer) {
                clearInterval(playbackTimer);
                playbackTimer = null;
                btn.textContent = '▶ 预测24小时TEC';
                btn.disabled = false;
                statusDiv.style.display = 'none';
                // 恢复显示实时卫星位置
                satPredictedFrames = [];
                refreshSatelliteMarkers();
                return;
            }

            btn.textContent = '⏹ 停止播放';
            btn.disabled = true;
            statusDiv.style.display = 'block';
            statusText.textContent = '⏳ 预计算中...';
            fillBar.style.width = '0%';

            try {
                if (!tecEngineReady) {
                    statusText.textContent = '⚠️ TEC 引擎初始化中，请稍后...';
                    btn.disabled = false;
                    btn.textContent = '▶ 预测24小时TEC';
                    return;
                }

                // 读取当前输入参数
                const f107 = parseFloat(document.getElementById('rtF107').value) || 150;
                const f107a = parseFloat(document.getElementById('rtF107A').value) || 145;
                const dst = parseFloat(document.getElementById('rtDst').value) || 0;
                const ap = parseFloat(document.getElementById('rtAp').value) || 2;
                const kp = parseFloat(document.getElementById('rtKp').value) || 1.3;
                const memoryLags = { dst: {} };
                [1, 3, 6, 12, 24].forEach(lag => {
                    const val = document.getElementById(`rtDstLag${lag}`).value;
                    if (val !== '') memoryLags.dst[lag] = parseFloat(val);
                });

                // 读取步长选择
                const activeStep = document.querySelector('.step-opt.active');
                const stepHours = parseFloat(activeStep ? activeStep.dataset.step : '1');
                const stepMinutes = Math.round(stepHours * 60);
                const stepMs = stepMinutes * 60000;
                const totalFrames = Math.round(24 * 60 / stepMinutes);

                // 计算当前北京时间
                const now = new Date();
                const bjMs = now.getTime() + 8 * 3600000;
                const baseBJDate = new Date(bjMs);
                const baseUTDate = new Date(bjMs - 8 * 3600000);

                // 预计算
                playbackFrames = [];
                playbackTimes = [];

                for (let i = 0; i < totalFrames; i++) {
                    const currentBJMs = baseBJDate.getTime() + i * stepMs;
                    const currentUTMs = baseUTDate.getTime() + i * stepMs;
                    const currentBJDate = new Date(currentBJMs);
                    const currentUTDate = new Date(currentUTMs);

                    const year = currentBJDate.getUTCFullYear();
                    const startOfYear = Date.UTC(year, 0, 0);
                    const doy = Math.floor((currentBJMs - startOfYear) / 86400000);
                    const bjHourInt = currentBJDate.getUTCHours();
                    const bjMin = currentBJDate.getUTCMinutes();

                    // UTC 时（北京-8），取整小时供模型使用
                    const utHour = currentUTDate.getUTCHours();
                    // 渲染用的精细 UT 时（含分钟）
                    const utHourFrac = utHour + currentUTDate.getUTCMinutes() / 60 + currentUTDate.getUTCSeconds() / 3600;

                    statusText.textContent = `⏳ 预计算中 ${i + 1}/${totalFrames}...`;
                    fillBar.style.width = `${((i + 1) / totalFrames) * 100}%`;

                    const geojson = await tecEngine.predict({
                        year, doy, ut_hour: utHour,
                        drivers: { f107, f107a, dst, ap, kp },
                        memory_lags: memoryLags,
                    });

                    playbackFrames.push(geojson);
                    playbackTimes.push({ year, doy, utHour: utHourFrac, bjHour: bjHourInt, bjMin, utcMs: currentUTMs });
                }

                // 预计算卫星轨迹（与 TEC 时间步对齐）
                statusText.textContent = '⏳ 计算卫星轨迹...';
                satPredictedFrames = computeSatelliteTrajectories(playbackTimes);
                // 缓存当前卫星列表以便刷新
                try {
                    const raw = localStorage.getItem('tec_display_satellites');
                    satTleCache = raw ? JSON.parse(raw) : null;
                } catch (e) { satTleCache = null; }

                // 预计算完成，开始播放
                playbackIndex = 0;
                statusText.textContent = '▶ 播放中...';

                // 立即显示第一帧
                function fmtTime(t) {
                    return `${String(t.bjHour).padStart(2, '0')}:${String(t.bjMin).padStart(2, '0')}`;
                }
                const first = playbackTimes[0];
                renderTECMap(playbackFrames[0], first.doy, first.utHour);
                // 显示第一帧卫星预测位置
                if (satPredictedFrames.length > 0) {
                    drawPredictedSatMarkers(satPredictedFrames[0]);
                }
                statusText.textContent = `▶ 播放中  ${fmtTime(first)} (1/${totalFrames})`;
                fillBar.style.width = `${(1 / totalFrames) * 100}%`;

                btn.disabled = false;

                // 每隔 350ms 播放一帧
                playbackTimer = setInterval(() => {
                    playbackIndex++;
                    if (playbackIndex >= totalFrames) {
                        clearInterval(playbackTimer);
                        playbackTimer = null;
                        btn.textContent = '▶ 预测24小时TEC';
                        statusText.textContent = '✅ 播放完成';
                        fillBar.style.width = '100%';
                        // 恢复显示实时卫星位置
                        satPredictedFrames = [];
                        refreshSatelliteMarkers();
                        return;
                    }

                    const t = playbackTimes[playbackIndex];
                    renderTECMap(playbackFrames[playbackIndex], t.doy, t.utHour);
                    // 如有卫星预测数据，显示预测位置
                    if (satPredictedFrames.length > playbackIndex) {
                        drawPredictedSatMarkers(satPredictedFrames[playbackIndex]);
                    } else {
                        refreshSatelliteMarkers();
                    }
                    statusText.textContent = `▶ 播放中  ${fmtTime(t)} (${playbackIndex + 1}/${totalFrames})`;
                    fillBar.style.width = `${((playbackIndex + 1) / totalFrames) * 100}%`;
                }, 350);

            } catch (e) {
                console.error('[24h TEC] 预测失败:', e);
                statusText.textContent = '❌ 预测失败';
                btn.disabled = false;
                btn.textContent = '▶ 预测24小时TEC';
            }
        }

        // ====================== 渲染 TEC 热力图 ======================
        function renderTECMap(geojson, doy, utHour) {
            // 解析数据到网格（已知 TEC 引擎网格：纬度 2.5° 间隔，经度 5° 间隔）
            const latArr = [], lonArr = [];
            const latSet = new Set(), lonSet = new Set();
            // 第一遍扫描获取行列数
            for (const f of geojson.features) {
                const [lon, lat] = f.geometry.coordinates;
                latSet.add(lat);
                lonSet.add(lon);
            }
            latArr.push(...latSet);
            lonArr.push(...lonSet);
            latArr.sort((a, b) => a - b);
            lonArr.sort((a, b) => a - b);

            if (latArr.length < 2 || lonArr.length < 2) {
                console.warn('[TEC] 数据不足以渲染');
                return;
            }

            const nLat = latArr.length, nLon = lonArr.length;
            const latStep = (nLat > 1) ? (latArr[nLat - 1] - latArr[0]) / (nLat - 1) : 2.5;
            const lonStep = (nLon > 1) ? (lonArr[nLon - 1] - lonArr[0]) / (nLon - 1) : 5;
            const minLat = latArr[0], minLon = lonArr[0];

            // 将 tecGrid 转为 Flat Float64Array（O(1) 索引访问，替代对象+字符串键）
            const tecArray = new Float64Array(nLat * nLon);
            for (const f of geojson.features) {
                const [lon, lat] = f.geometry.coordinates;
                const tec = f.properties.tec;
                if (tec != null && !isNaN(tec)) {
                    const i = Math.round((lat - minLat) / latStep);
                    const j = Math.round((lon - minLon) / lonStep);
                    if (i >= 0 && i < nLat && j >= 0 && j < nLon) {
                        tecArray[i * nLon + j] = tec;
                    }
                }
            }

            // O(1) 双线性插值（数学索引代替 findIndex 线性搜索）
            function interpolateTec(lat, lon) {
                const fi = (lat - minLat) / latStep;
                const fj = (lon - minLon) / lonStep;
                let i0 = Math.floor(fi);
                let j0 = Math.floor(fj);
                i0 = Math.max(0, Math.min(i0, nLat - 2));
                j0 = Math.max(0, Math.min(j0, nLon - 2));

                const fracI = fi - i0;
                const fracJ = fj - j0;
                const stride = nLon;
                const idx00 = i0 * stride + j0;
                const e00 = tecArray[idx00];
                const e10 = tecArray[idx00 + stride];
                const e01 = tecArray[idx00 + 1];
                const e11 = tecArray[idx00 + stride + 1];

                return e00 * (1 - fracI) * (1 - fracJ) +
                       e10 * fracI * (1 - fracJ) +
                       e01 * (1 - fracI) * fracJ +
                       e11 * fracI * fracJ;
            }

            // 第一步：画地球背景（裁剪到地图内矩形区域）
            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#0a0a2e';
            ctx.fillRect(0, 0, W, H);
            if (earthImgLoaded || earthImg.complete) {
                ctx.save();
                ctx.beginPath();
                ctx.rect(MAP_MARGIN.left, MAP_MARGIN.top, MAP_W, MAP_H);
                ctx.clip();
                ctx.drawImage(earthImg, MAP_MARGIN.left, MAP_MARGIN.top, MAP_W, MAP_H);
                ctx.restore();
            }

            // 第二步：离屏 canvas（地图尺寸）渲染不透明热力图
            const offCanvas = document.createElement('canvas');
            offCanvas.width = MAP_W;
            offCanvas.height = MAP_H;
            const offCtx = offCanvas.getContext('2d');
            const imageData = offCtx.createImageData(MAP_W, MAP_H);
            const pixels = imageData.data;

            for (let py = 0; py < MAP_H; py++) {
                const lat = 90 - (py / MAP_H) * 180;
                for (let px = 0; px < MAP_W; px++) {
                    const lon = (px / MAP_W) * 360 - 180;
                    const tec = interpolateTec(lat, lon);
                    const t = Math.min(Math.max(tec / 100, 0), 1);
                    let r, g, b;
                    if (t < 0.125)      { r = 0;   g = 0;   b = 0.5 + t * 4; }
                    else if (t < 0.375)  { r = 0;   g = (t - 0.125) * 4; b = 1; }
                    else if (t < 0.625)  { r = (t - 0.375) * 4; g = 1; b = 1 - (t - 0.375) * 4; }
                    else if (t < 0.875)  { r = 1;   g = 1 - (t - 0.625) * 4; b = 0; }
                    else                 { r = 1 - (t - 0.875) * 2; g = 0;   b = 0; }
                    const idx = (py * MAP_W + px) * 4;
                    pixels[idx]     = Math.floor(r * 255);
                    pixels[idx + 1] = Math.floor(g * 255);
                    pixels[idx + 2] = Math.floor(b * 255);
                    pixels[idx + 3] = 255;
                }
            }
            offCtx.putImageData(imageData, 0, 0);

            // 第三步：半透明合成到主画布的地图区域
            ctx.save();
            ctx.globalAlpha = 0.45;
            ctx.drawImage(offCanvas, MAP_MARGIN.left, MAP_MARGIN.top);
            ctx.restore();

            // 第四步：绘制夜间阴影区
            drawNightShadow(doy, utHour);

            // 第五步：绘制网格和标签（不透明）
            drawGrid();

            // 第六步：绘制晨昏线
            drawTerminator(doy, utHour);

            // 第七步：右侧垂直 TECU 色条
            drawVerticalColorbar();

            // 第八步：绘制显示列表中的卫星标记（叠加层）
            if (playbackTimer && satPredictedFrames.length > playbackIndex) {
                drawPredictedSatMarkers(satPredictedFrames[playbackIndex]);
            } else {
                refreshSatelliteMarkers();
            }
        }

        // ====================== 卫星标记（叠加层） ======================
        /** 从 localStorage 读取显示列表卫星位置，绘制到叠加 canvas */
        function refreshSatelliteMarkers() {
            // 清空叠加层
            markerCtx.clearRect(0, 0, W, H);

            let data;
            try {
                const raw = localStorage.getItem('tec_display_satellites');
                if (!raw) return;
                data = JSON.parse(raw);
            } catch (e) { return; }
            if (!Array.isArray(data) || data.length === 0) return;

            for (const sat of data) {
                const y = latToY(sat.lat);
                if (y < MAP_MARGIN.top || y > MAP_MARGIN.top + MAP_H) continue;

                forEachWrappedX(sat.lon, x => {
                    if (x < MAP_MARGIN.left || x > MAP_MARGIN.left + MAP_W) return;

                    // 外发光圈
                    const grad = markerCtx.createRadialGradient(x, y, 0, x, y, 8);
                    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
                    grad.addColorStop(0.3, 'rgba(255,220,80,0.6)');
                    grad.addColorStop(1, 'rgba(255,220,80,0)');
                    markerCtx.fillStyle = grad;
                    markerCtx.beginPath();
                    markerCtx.arc(x, y, 8, 0, Math.PI * 2);
                    markerCtx.fill();

                    // 🛰️ 图标（居中在卫星位置）
                    markerCtx.font = '14px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
                    markerCtx.textAlign = 'center';
                    markerCtx.textBaseline = 'middle';
                    markerCtx.shadowColor = 'rgba(0,0,0,0.85)';
                    markerCtx.shadowBlur = 4;
                    markerCtx.fillText('🛰️', x + 1, y - 1);
                    markerCtx.shadowBlur = 0;

                    // 卫星名称标签
                    markerCtx.fillStyle = 'rgba(255,255,255,0.95)';
                    markerCtx.font = '11px "Segoe UI", sans-serif';
                    markerCtx.textAlign = 'left';
                    markerCtx.textBaseline = 'bottom';
                    markerCtx.shadowColor = 'rgba(0,0,0,0.85)';
                    markerCtx.shadowBlur = 4;
                    markerCtx.fillText(sat.name, x + 6, y - 3);
                    markerCtx.shadowBlur = 0;

                    // 星座名称小标签
                    if (sat.constellation) {
                        markerCtx.fillStyle = 'rgba(136,187,221,0.65)';
                        markerCtx.font = '9px monospace';
                        markerCtx.textAlign = 'left';
                        markerCtx.textBaseline = 'top';
                        markerCtx.shadowColor = 'rgba(0,0,0,0.85)';
                        markerCtx.shadowBlur = 4;
                        markerCtx.fillText(sat.constellation, x + 6, y + 3);
                        markerCtx.shadowBlur = 0;
                    }
                });
            }
        }

        /**
         * 绘制预测的卫星位置（24h 预测播放时使用）
         * @param {Array} sats - [{id, name, lat, lon, constellation, color}, ...]
         */
        function drawPredictedSatMarkers(sats) {
            // 清空叠加层
            markerCtx.clearRect(0, 0, W, H);

            // 回退机制：当前帧为空时，回退到最后一帧有数据的帧
            if (!Array.isArray(sats) || sats.length === 0) {
                if (playbackTimer && satPredictedFrames.length > 0 && playbackIndex > 0) {
                    for (let fi = playbackIndex - 1; fi >= 0; fi--) {
                        const frame = satPredictedFrames[fi];
                        if (frame && frame.length > 0) {
                            sats = frame;
                            break;
                        }
                    }
                }
                if (!Array.isArray(sats) || sats.length === 0) return;
            }

            // 用轨迹尾部绘制预测路径尾迹（最近几帧已绘制的点）
            for (const sat of sats) {
                if (typeof sat.lat !== 'number' || typeof sat.lon !== 'number' || isNaN(sat.lat) || isNaN(sat.lon)) continue;
                const y = latToY(sat.lat);
                if (y < MAP_MARGIN.top || y > MAP_MARGIN.top + MAP_H) continue;

                forEachWrappedX(sat.lon, x => {
                    if (x < MAP_MARGIN.left || x > MAP_MARGIN.left + MAP_W) return;

                    // 轨迹预测样式：半透明青色外发光（区别于实时标记的黄色）
                    const grad = markerCtx.createRadialGradient(x, y, 0, x, y, 10);
                    grad.addColorStop(0, 'rgba(255,255,255,0.95)');
                    grad.addColorStop(0.3, 'rgba(80,220,255,0.7)');
                    grad.addColorStop(1, 'rgba(80,220,255,0)');
                    markerCtx.fillStyle = grad;
                    markerCtx.beginPath();
                    markerCtx.arc(x, y, 10, 0, Math.PI * 2);
                    markerCtx.fill();

                    // 🛰️ 图标
                    markerCtx.font = '14px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif';
                    markerCtx.textAlign = 'center';
                    markerCtx.textBaseline = 'middle';
                    markerCtx.shadowColor = 'rgba(0,0,0,0.85)';
                    markerCtx.shadowBlur = 4;
                    markerCtx.fillText('🛰️', x + 1, y - 1);
                    markerCtx.shadowBlur = 0;

                    // 卫星名称
                    markerCtx.fillStyle = 'rgba(255,255,255,0.95)';
                    markerCtx.font = '11px "Segoe UI", sans-serif';
                    markerCtx.textAlign = 'left';
                    markerCtx.textBaseline = 'bottom';
                    markerCtx.shadowColor = 'rgba(0,0,0,0.85)';
                    markerCtx.shadowBlur = 4;
                    markerCtx.fillText(sat.name, x + 6, y - 3);
                    markerCtx.shadowBlur = 0;

                    // 星座名称
                    if (sat.constellation) {
                        markerCtx.fillStyle = 'rgba(80,220,255,0.65)';
                        markerCtx.font = '9px monospace';
                        markerCtx.textAlign = 'left';
                        markerCtx.textBaseline = 'top';
                        markerCtx.shadowColor = 'rgba(0,0,0,0.85)';
                        markerCtx.shadowBlur = 4;
                        markerCtx.fillText(sat.constellation, x + 6, y + 3);
                        markerCtx.shadowBlur = 0;
                    }
                });
            }

            // 如果正在播放，绘制尾迹（使用历史帧位置）
            if (playbackTimer && satPredictedFrames.length > 0 && playbackIndex > 0) {
                const trailStart = Math.max(0, playbackIndex - 8); // 最多显示8帧尾迹
                for (let fi = trailStart; fi < playbackIndex; fi++) {
                    const frame = satPredictedFrames[fi];
                    if (!frame) continue;
                    const alpha = 0.1 + 0.5 * (fi - trailStart) / (playbackIndex - trailStart);
                    for (const sat of frame) {
                        const y = latToY(sat.lat);
                        if (y < MAP_MARGIN.top || y > MAP_MARGIN.top + MAP_H) continue;
                        forEachWrappedX(sat.lon, x => {
                            if (x < MAP_MARGIN.left || x > MAP_MARGIN.left + MAP_W) return;
                            markerCtx.fillStyle = `rgba(80, 220, 255, ${alpha * 0.3})`;
                            markerCtx.beginPath();
                            markerCtx.arc(x, y, 3, 0, Math.PI * 2);
                            markerCtx.fill();
                        });
                    }
                }
            }
        }

        // 每 3 秒自动刷新卫星标记（从 localStorage 读取最新位置），播放中跳过
        setInterval(() => {
            if (!playbackTimer) refreshSatelliteMarkers();
        }, 3000);

        // ====================== 垂直 TECU 色条 ======================
        function drawVerticalColorbar() {
            const cbLeft = MAP_MARGIN.left + MAP_W + 5;  // 色条左侧 X
            const cbTop = MAP_MARGIN.top;
            const cbW = 14, cbH = MAP_H;

            // 色条背景边框
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(cbLeft - 1, cbTop - 1, cbW + 2, cbH + 2);
            ctx.strokeStyle = 'rgba(68,136,170,0.4)';
            ctx.lineWidth = 1;
            ctx.strokeRect(cbLeft - 1, cbTop - 1, cbW + 2, cbH + 2);

            // 绘制渐变色条（从下到上，0→100 TECU）
            for (let py = 0; py < cbH; py++) {
                const t = 1 - py / cbH;  // 底部 t=0，顶部 t=1
                let r, g, b;
                if (t < 0.125)      { r = 0;   g = 0;   b = 0.5 + t * 4; }
                else if (t < 0.375) { r = 0;   g = (t - 0.125) * 4; b = 1; }
                else if (t < 0.625) { r = (t - 0.375) * 4; g = 1; b = 1 - (t - 0.375) * 4; }
                else if (t < 0.875) { r = 1;   g = 1 - (t - 0.625) * 4; b = 0; }
                else                { r = 1 - (t - 0.875) * 2; g = 0;   b = 0; }
                ctx.fillStyle = `rgb(${Math.floor(r*255)},${Math.floor(g*255)},${Math.floor(b*255)})`;
                ctx.fillRect(cbLeft, cbTop + py, cbW, 1);
            }

            // TECU 刻度标签（右侧）
            ctx.fillStyle = 'rgba(136,187,221,0.6)';
            ctx.font = '8px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const tecValues = [0, 20, 40, 60, 80, 100];
            for (const v of tecValues) {
                const t = v / 100;
                const y = cbTop + cbH * (1 - t);
                ctx.fillText(v, cbLeft + cbW + 4, y);
            }

            // "TECU" 标签在色条顶部
            ctx.fillStyle = 'rgba(136,187,221,0.5)';
            ctx.font = '8px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('TECU', cbLeft + cbW / 2, cbTop - 3);
        }

        // ====================== 夜间阴影 ======================
        function drawNightShadow(doy, utHour) {
            // 太阳赤纬
            const declination = 23.44 * Math.sin(2 * Math.PI / 365 * (doy - 81));
            const decRad = declination * Math.PI / 180;
            // 太阳直射点子午线经度
            const subsolarLon = (12 - utHour) / 24 * 360;
            const subsolarLonRad = subsolarLon * Math.PI / 180;

            // 离屏 canvas（地图尺寸）绘制阴影
            const shadowCanvas = document.createElement('canvas');
            shadowCanvas.width = MAP_W;
            shadowCanvas.height = MAP_H;
            const shadowCtx = shadowCanvas.getContext('2d');
            const imageData = shadowCtx.createImageData(MAP_W, MAP_H);
            const pixels = imageData.data;

            for (let py = 0; py < MAP_H; py++) {
                const lat = 90 - (py / MAP_H) * 180;
                const latRad = lat * Math.PI / 180;
                for (let px = 0; px < MAP_W; px++) {
                    const lon = (px / MAP_W) * 360 - 180;
                    const lonRad = lon * Math.PI / 180;

                    // 太阳天顶角余弦
                    const cosZenith = Math.sin(latRad) * Math.sin(decRad) +
                                      Math.cos(latRad) * Math.cos(decRad) *
                                      Math.cos(lonRad - subsolarLonRad);

                    const idx = (py * MAP_W + px) * 4;
                    if (cosZenith < 0) {
                        // 夜间：半透明深色
                        pixels[idx]     = 5;
                        pixels[idx + 1] = 5;
                        pixels[idx + 2] = 30;
                        pixels[idx + 3] = 150;
                    } else {
                        pixels[idx]     = 0;
                        pixels[idx + 1] = 0;
                        pixels[idx + 2] = 0;
                        pixels[idx + 3] = 0;
                    }
                }
            }
            shadowCtx.putImageData(imageData, 0, 0);

            // 合成到主画布
            ctx.drawImage(shadowCanvas, MAP_MARGIN.left, MAP_MARGIN.top);
        }

        // ====================== 晨昏线 ======================
        function drawTerminator(doy, utHour) {
            // 太阳赤纬
            const declination = 23.44 * Math.sin(2 * Math.PI / 365 * (doy - 81));
            const decRad = declination * Math.PI / 180;
            const tanDec = Math.tan(decRad);

            // 太阳直射点子午线经度：UT 12:00 时直射点在 0° 经度
            const subsolarLon = (12 - utHour) / 24 * 360;

            ctx.strokeStyle = 'rgba(255, 200, 50, 0.7)';
            ctx.lineWidth = 1.5;
            ctx.setLineDash([5, 4]);

            // 处理春秋分（赤纬接近 0°）的特殊情况
            const isEquinox = Math.abs(tanDec) < 1e-8;

            if (isEquinox) {
                // 春秋分：晨昏线为两条经线（直射点 ±90°）
                const lon1 = ((subsolarLon + 90 + 180) % 360) - 180;
                const x1 = MAP_MARGIN.left + ((lon1 + 180) / 360) * MAP_W;
                ctx.beginPath();
                ctx.moveTo(x1, MAP_MARGIN.top);
                ctx.lineTo(x1, MAP_MARGIN.top + MAP_H);
                ctx.stroke();

                const lon2 = ((subsolarLon - 90 + 180) % 360) - 180;
                const x2 = MAP_MARGIN.left + ((lon2 + 180) / 360) * MAP_W;
                ctx.beginPath();
                ctx.moveTo(x2, MAP_MARGIN.top);
                ctx.lineTo(x2, MAP_MARGIN.top + MAP_H);
                ctx.stroke();
            } else {
                // 一般情况：逐像素计算晨昏线纬度
                ctx.beginPath();
                let started = false;
                for (let px = 0; px <= MAP_W; px++) {
                    const lon = (px / MAP_W) * 360 - 180;
                    const lonRad = lon * Math.PI / 180;
                    const cosDLon = Math.cos(lonRad - subsolarLon * Math.PI / 180);

                    let lat = Math.atan(-cosDLon / tanDec) * 180 / Math.PI;
                    // 裁剪到有效范围
                    lat = Math.max(-90, Math.min(90, lat));

                    const cx = MAP_MARGIN.left + px;
                    const cy = MAP_MARGIN.top + ((90 - lat) / 180) * MAP_H;

                    if (cy >= MAP_MARGIN.top - 2 && cy <= MAP_MARGIN.top + MAP_H + 2) {
                        if (!started) {
                            ctx.moveTo(cx, cy);
                            started = true;
                        } else {
                            ctx.lineTo(cx, cy);
                        }
                    } else {
                        started = false;
                    }
                }
                ctx.stroke();
            }

            ctx.setLineDash([]);

            // 图例文字
            ctx.fillStyle = 'rgba(255, 200, 50, 0.6)';
            ctx.font = '9px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText('─ 晨昏线', MAP_MARGIN.left + 6, MAP_MARGIN.top + 6);
        }

        // ====================== 事件绑定 ======================
        document.getElementById('btnLoadRT').addEventListener('click', loadRealtimeTEC);
        document.getElementById('btnPredict24h').addEventListener('click', predict24hTEC);

        // 步长选择切换
        document.querySelectorAll('.step-opt').forEach(el => {
            el.addEventListener('click', function() {
                if (playbackTimer) return; // 播放中不可切换
                document.querySelectorAll('.step-opt').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // 页面加载后自动加载一次
        window.addEventListener('load', function() {
            updateRTTime();
            // 尽早显示卫星标记
            setTimeout(refreshSatelliteMarkers, 300);
            setTimeout(() => {
                loadRealtimeTEC();
            }, 500);
        });

        // 每小时自动刷新（播放 24h TEC 时暂不自动刷新）
        function scheduleHourlyRefresh() {
            const now = new Date();
            // 计算到下一个整点（北京时间）的毫秒数
            const bjMs = now.getTime() + now.getTimezoneOffset() * 60000 + 8 * 3600000;
            const bjDate = new Date(bjMs);
            const nextHour = new Date(bjDate);
            nextHour.setUTCHours(bjDate.getUTCHours() + 1, 0, 0, 0);
            const msUntilNext = nextHour.getTime() - bjMs;

            setTimeout(() => {
                if (!playbackTimer) {
                    console.log('[RT TEC] 整点刷新');
                    updateRTTime();
                    loadRealtimeTEC();
                }
                // 之后每小时刷新一次
                setInterval(() => {
                    if (!playbackTimer) {
                        console.log('[RT TEC] 每小时自动刷新');
                        updateRTTime();
                        loadRealtimeTEC();
                    }
                }, 3600000);
            }, msUntilNext);

            console.log(`[RT TEC] 下次自动刷新时间: ${Math.round(msUntilNext / 60000)} 分钟后`);
        }
        scheduleHourlyRefresh();

        console.log('[RT TEC] 实时TEC页面加载完成');

        // ====================== 北京时间时钟 ======================
        function updateBeijingClock() {
            const now = new Date();
            const h = now.getHours().toString().padStart(2, '0');
            const m = now.getMinutes().toString().padStart(2, '0');
            const s = now.getSeconds().toString().padStart(2, '0');
            const el = document.getElementById('beijingClock');
            if (el) el.textContent = `北京时间 ${h}:${m}:${s}`;
        }
        setInterval(updateBeijingClock, 1000);
        updateBeijingClock();
    </script>
</body>
